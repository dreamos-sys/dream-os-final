<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <h1 class="text-xl font-bold mb-4">🧪 Minimal Test</h1>
    
    <!-- Tombol test langsung -->
    <button onclick="openCommandCenter()" class="bg-teal-600 px-4 py-2 rounded mb-4">
        🔘 Buka Command Center (Direct Click)
    </button>
    
    <!-- Container Command Center -->
    <div id="command-center" class="module-container space-y-3" style="display:none">
        <div id="cmd-dashboard"></div>
    </div>
    
    <!-- Dashboard utama (dummy) -->
    <div id="stats-card" class="glass p-4 rounded">
        <p>📊 Dashboard Utama</p>
    </div>

    <script>
        // Fungsi super simple
        function openCommandCenter() {
            console.log('✅ openCommandCenter called!');
            document.getElementById('stats-card').style.display = 'none';
            const cc = document.getElementById('command-center');
            const cd = document.getElementById('cmd-dashboard');
            if (cc) {
                cc.classList.remove('module-container');
                cc.classList.add('active');
                cc.style.display = 'block';
            }
            if (cd) {
                cd.innerHTML = '<div class="glass p-4 rounded"><h2 class="text-lg font-bold">🌍 Command Center WORKS!</h2><p class="text-sm mt-2">Jika kamu lihat ini, berarti fungsi jalan! 🎉</p><button onclick="showMain()" class="mt-3 px-3 py-1 bg-white/10 rounded text-xs">← Home</button></div>';
            }
        }
        function showMain() {
            document.getElementById('stats-card').style.display = 'block';
            const cc = document.getElementById('command-center');
            if (cc) {
                cc.classList.add('module-container');
                cc.classList.remove('active');
                cc.style.display = 'none';
            }
        }
        // Expose to global
        window.openCommandCenter = openCommandCenter;
        window.showMain = showMain;
        console.log('✅ Test page loaded!');
    </script>
</body>
</html>
