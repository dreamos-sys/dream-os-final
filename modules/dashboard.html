<div class="flex flex-col h-full flex-1 w-full bg-slate-950">
    <header id="app-header" class="px-4 py-3 glass-card border-b border-white/5 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <img src="assets/logo-sultan.png" alt="Dream OS" class="w-8 h-8 rounded-xl shadow-lg object-cover">
            <div>
                <h1 class="text-xs font-bold text-slate-100 leading-tight">Dream OS</h1>
                <span class="text-[8px] text-teal-400 font-mono">Nano-Quantum</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-logout" class="p-2 text-slate-500 hover:text-red-400 magnet">
                <i data-lucide="log-out" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-28 space-y-4">
        <div class="glass-card p-4 rounded-3xl border border-white/[0.03] gradient-border">
            <div class="flex items-center gap-2 mb-2">
                <i data-lucide="activity" class="w-4 h-4 text-teal-400"></i>
                <h4 class="text-xs font-bold text-teal-400">Statistics</h4>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-2">
                <div class="bg-white/5 p-2 rounded-xl border border-white/5">
                    <p class="text-[8px] text-slate-400">Users</p>
                    <p class="text-sm font-semibold text-white">1,450</p>
                </div>
                <div class="bg-white/5 p-2 rounded-xl border border-white/5">
                    <p class="text-[8px] text-slate-400">Tx</p>
                    <p class="text-sm font-semibold text-white">890</p>
                </div>
            </div>
        </div>
        
        <div id="staff-grid-wrapper"></div>
    </main>
</div>
