<div id="staff-grid" class="grid grid-cols-3 gap-3"></div>
<script>
    window.renderMainGrid = function() {
        const grid = document.getElementById('staff-grid');
        const gridData = [
            { icon: 'globe', name: 'Command', desc: 'Ops' },
            { icon: 'calendar', name: 'Booking', desc: 'Res' },
            { icon: 'alert-triangle', name: 'K3 Form', desc: 'Audit' },
            { icon: 'shield', name: 'Sekuriti', desc: 'Safety' },
            { icon: 'sparkles', name: 'Janitor In', desc: 'Indoor' },
            { icon: 'leaf', name: 'Janitor Out', desc: 'Outdoor' },
            { icon: 'wrench', name: 'Maintenance', desc: 'Fix' },
            { icon: 'building-2', name: 'Asset', desc: 'Building' },
            { icon: 'package', name: 'Stok Alat', desc: 'Aset' }
        ];
        if (grid) {
            grid.innerHTML = gridData.map(item => `
                <div class="glass-card p-4 rounded-3xl flex flex-col items-center justify-center gap-2 cursor-pointer menu-card magnet" onclick="alert('Modul ${item.name} Ready')">
                    <i data-lucide="${item.icon}" class="w-5 h-5 text-teal-400"></i>
                    <span class="text-[8px] font-bold text-slate-200">${item.name}</span>
                    <span class="text-[7px] text-slate-600 font-mono">${item.desc}</span>
                </div>
            `).join('');
        }
    };
</script>
