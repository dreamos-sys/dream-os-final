<div id="ghost-overlay" class="ghost-overlay">
    <div class="p-3 border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i data-lucide="ghost" class="w-4 h-4 text-ghost-400"></i>
            <span class="text-[9px] font-bold text-slate-300">GHOST MONITORING</span>
        </div>
        <button id="ghost-close" class="p-1 text-slate-500 hover:text-white">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
    </div>
    <div class="p-4 grid grid-cols-2 gap-3" id="ghost-tools">
        <div class="glass-card p-3 rounded-xl border border-teal-500/20">
            <i data-lucide="terminal" class="w-4 h-4 text-teal-400 mb-2"></i>
            <p class="text-[9px] font-bold">Nmap Check</p>
            <p class="text-[8px] text-slate-500">Localhost & Net discover</p>
            <button class="w-full text-[8px] bg-teal-500/20 py-1.5 px-3 rounded-lg border border-teal-500/20 mt-2" onclick="navigator.clipboard.writeText('nmap -sV 127.0.0.1'); alert('Copied')">Copy</button>
        </div>
    </div>
    <div class="p-3 border-t border-white/5 text-center">
        <p class="text-[8px] text-slate-600 font-mono">● Termux Ready</p>
    </div>
</div>
