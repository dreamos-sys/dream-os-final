<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline • Dream OS</title>
  <style>
    body { font-family: system-ui; text-align: center; padding: 40px; background: #f8fafc; color: #0f172a; }
    .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 360px; margin: 0 auto; }
    h1 { color: #10b981; margin: 0 0 12px; }
    p { color: #475569; margin: 8px 0 20px; }
    button { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📴 Anda Offline</h1>
    <p>Beberapa fitur tidak tersedia. Hubungkan ke internet untuk pengalaman terbaik.</p>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
