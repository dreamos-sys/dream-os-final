<div class="glass p-4 rounded-xl">
  <h2 class="text-lg font-bold mb-3">📅 Booking Module (Hybrid)</h2>
  <input type="text" id="booking-title" placeholder="Judul" class="w-full p-2 rounded mb-2 bg-black/30">
  <input type="date" id="booking-date" class="w-full p-2 rounded mb-2 bg-black/30">
  <button onclick="createBookingHybrid()" class="bg-teal-600 p-2 rounded">Simpan</button>
  <div id="booking-list" class="mt-3"></div>
</div>
<script>
  function createBookingHybrid() {
    const title = document.getElementById('booking-title').value;
    const date = document.getElementById('booking-date').value;
    if (title && date) {
      if (window.DreamEventBus) {
        window.DreamEventBus.emit('booking.created', { title, date });
        alert('Booking dibuat! Carousel akan terupdate.');
      } else {
        alert('Event bus tidak tersedia');
      }
    } else {
      alert('Isi judul dan tanggal');
    }
  }
</script>
