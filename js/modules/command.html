<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
window.bookings = JSON.parse(localStorage.getItem('dreamos_bookings') || '[{"id":1,"title":"Rapat Koordinasi","date":"2026-05-15","status":"pending"}]');

function validateBookingConstraints(startStr, endStr, room) {
    var start = new Date(startStr);
    var end = new Date(endStr);
    var day = start.getDay();
    var startMin = start.getHours() * 60 + start.getMinutes();
    var endMin = end.getHours() * 60 + end.getMinutes();
    
    if (day === 0 || day === 6) {
        // Sabtu/Minggu: hanya admin/direktur yang bisa
        var role = localStorage.getItem('dreamos_role') || 'kabag';
        if (role !== 'admin' && role !== 'direktur') {
            return "Sabtu & Minggu hanya bisa dibooking oleh Admin/Direktur.";
        }
    }
    if (day >= 1 && day <= 5) {
        if (startMin < 7*60+30 || endMin > 16*60) {
            return "Jam operasional Senin-Jumat hanya 07:30 - 16:00.";
        }
    }
    if (day === 5) {
        if ((room === "Aula GDC" || room === "Aula Serbaguna") && startMin < 13*60 && endMin > 10*60+30) {
            return "Jumat 10:30-13:00 aula diblokir (persiapan shalat Jumat).";
        }
    }
    var now = new Date();
    var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (start < new Date(todayStart.getTime() + 24*60*60*1000)) {
        return "Booking minimal untuk besok (H-1).";
    }
    return null;
}

window.addBookingV2 = function() {
    var name = document.getElementById('booking-name').value.trim();
    var divisi = document.getElementById('booking-divisi').value.trim();
    var phone = document.getElementById('booking-phone').value.trim();
    var room = document.getElementById('booking-room').value;
    var start = document.getElementById('booking-start').value;
    var end = document.getElementById('booking-end').value;
    var desc = document.getElementById('booking-desc').value.trim();
    var errorEl = document.getElementById('booking-error');
    
    if (!name || !divisi || !room || !start || !end) {
        errorEl.innerText = 'Mohon isi semua field wajib (*)';
        errorEl.classList.remove('hidden');
        return;
    }
    if (new Date(start) >= new Date(end)) {
        errorEl.innerText = 'Waktu Akhir harus setelah Waktu Mulai';
        errorEl.classList.remove('hidden');
        return;
    }
    
    var validationError = validateBookingConstraints(start, end, room);
    if (validationError) {
        errorEl.innerText = '⛔ ' + validationError;
        errorEl.classList.remove('hidden');
        return;
    }
    
    var conflict = window.bookings.find(function(b) {
        if (b.room !== room) return false;
        if (b.status === 'rejected') return false;
        var bStart = new Date(b.start);
        var bEnd = new Date(b.end);
        var newStart = new Date(start);
        var newEnd = new Date(end);
        return (newStart < bEnd && newEnd > bStart);
    });
    
    if (conflict) {
        errorEl.innerText = '⚠️ Bentrok! Ruangan sudah dibooking oleh ' + conflict.name + ' (' + conflict.divisi + ')';
        errorEl.classList.remove('hidden');
        return;
    }
    
    window.bookings.push({
        id: Date.now(),
        name: name,
        divisi: divisi,
        phone: phone,
        room: room,
        start: start,
        end: end,
        desc: desc,
        status: 'pending',
        approvalLevel: 1
    });
    localStorage.setItem('dreamos_bookings', JSON.stringify(window.bookings));
    renderAll();
    // Reset form
    document.getElementById('booking-name').value = '';
    document.getElementById('booking-divisi').value = '';
    document.getElementById('booking-phone').value = '';
    document.getElementById('booking-start').value = '';
    document.getElementById('booking-end').value = '';
    document.getElementById('booking-desc').value = '';
    errorEl.classList.add('hidden');
};

// Perbarui renderAll untuk booking list
var originalRenderAll = renderAll;
renderAll = function() {
    originalRenderAll();
    var list = document.getElementById('booking-list');
    if (list) {
        list.innerHTML = window.bookings.map(function(b) {
            return '<div class="bg-white/5 p-3 rounded-xl flex flex-col gap-1 '+(b.status==='approved'?'border-l-2 border-green-400':'')+''+(b.status==='rejected'?'border-l-2 border-red-400':'')+'">'+
                '<div class="flex justify-between"><span class="font-semibold text-sm">'+b.name+'</span><span class="text-xs text-white/40">'+b.divisi+'</span></div>'+
                '<div class="text-xs text-white/60">📍 '+b.room+'</div>'+
                '<div class="text-xs text-white/40">📅 '+new Date(b.start).toLocaleString()+' → '+new Date(b.end).toLocaleString()+'</div>'+
                '<div class="text-xs text-white/40 italic">'+b.desc+'</div>'+
                '<div class="flex justify-between items-center"><span class="text-xs '+ (b.status==='approved'?'text-green-400':'text-amber-400') +'">'+b.status+'</span>'+
                (b.status==='pending' ? '<button onclick="approveBooking('+b.id+')" class="text-green-400 text-xs">✅ Setujui</button>' : '')+
                '</div></div>';
        }).join('');
        document.getElementById('booking-count').innerText = window.bookings.length + ' booking';
    }
};

</script>
<script>
// ===== DATA GLOBAL =====
window.bookings = JSON.parse(localStorage.getItem('dreamos_bookings') || '[{"id":1,"title":"Rapat Koordinasi","date":"2026-05-15","status":"pending"}]');
window.rabs = JSON.parse(localStorage.getItem('dreamos_rabs') || '[{"id":1,"nama":"Seminar AI","nominal":5000000,"status":"pending"}]');
window.realisasi = JSON.parse(localStorage.getItem('dreamos_realisasi') || '[]');
window.aset = JSON.parse(localStorage.getItem('dreamos_aset') || '[{"nama":"Laptop","jumlah":5},{"nama":"Proyektor","jumlah":3},{"nama":"AC","jumlah":10}]');
window.audit = JSON.parse(localStorage.getItem('dreamos_audit') || '[]');
window.periodicFunds = JSON.parse(localStorage.getItem('dreamos_periodic_funds') || '[]');
window.tips = JSON.parse(localStorage.getItem('dreamos_tips') || '[]');
window.maintenances = JSON.parse(localStorage.getItem('dreamos_maintenances') || '[{"id":1,"item":"AC Ruang Rapat","desc":"Cuci AC","date":"2026-02-10","cost":250000,"tech":"PT Suhu Sejuk","status":"progress"}]');
window.userRole = localStorage.getItem('dreamos_role') || 'kabag';
window.chartInstance = null;

function saveAll() {
  localStorage.setItem('dreamos_bookings', JSON.stringify(window.bookings));
  localStorage.setItem('dreamos_rabs', JSON.stringify(window.rabs));
  localStorage.setItem('dreamos_realisasi', JSON.stringify(window.realisasi));
  localStorage.setItem('dreamos_aset', JSON.stringify(window.aset));
  localStorage.setItem('dreamos_periodic_funds', JSON.stringify(window.periodicFunds));
  localStorage.setItem('dreamos_tips', JSON.stringify(window.tips));
  localStorage.setItem('dreamos_maintenances', JSON.stringify(window.maintenances));
  localStorage.setItem('dreamos_audit', JSON.stringify(window.audit));
}

function renderAll() {
  document.getElementById('booking-list').innerHTML = window.bookings.map(function(b) { return '<div class="bg-white/5 p-3 rounded-xl flex justify-between"><div><div class="font-semibold">'+b.title+'</div><div class="text-xs text-white/40">'+b.date+' - '+b.status+'</div></div><button onclick="approveBooking('+b.id+')" class="text-green-400 text-sm">✅</button></div>'; }).join('');
  document.getElementById('rab-list').innerHTML = window.rabs.map(function(r) { return '<div class="bg-white/5 p-3 rounded-xl">'+r.nama+' - Rp '+r.nominal.toLocaleString()+' - '+r.status+'</div>'; }).join('');
  document.getElementById('maint-list').innerHTML = window.maintenances.map(function(m) { return '<div class="bg-white/5 p-3 rounded-xl"><div class="font-semibold">'+m.item+' - '+m.desc+'</div><div class="text-xs text-white/40">'+m.date+' | Rp '+(m.cost||0).toLocaleString()+' | '+ (m.tech||'-') +'</div></div>'; }).join('');
  updateDashboard();
}

function updateDashboard() {
  var pending = window.bookings.filter(function(b){return b.status==='pending'}).length;
  var totalRab = window.rabs.reduce(function(s,r){return s+r.nominal},0);
  var real = window.realisasi.reduce(function(s,r){return s+(r.nominal||0)},0);
  var tips = window.tips.reduce(function(s,t){return s+t.nominal},0);
  document.getElementById('pending-count').innerText = pending;
  document.getElementById('rab-total').innerText = 'Rp '+totalRab.toLocaleString();
  document.getElementById('realisasi-bulan').innerText = 'Rp '+real.toLocaleString();
  document.getElementById('tips-total').innerText = 'Rp '+tips.toLocaleString();

  if(typeof Chart !== 'undefined'){
    var ctx = document.getElementById('budgetChart');
    if(ctx){
      ctx = ctx.getContext('2d');
      if(window.chartInstance) window.chartInstance.destroy();
      window.chartInstance = new Chart(ctx, {
        type:'bar',
        data:{labels:['Anggaran','Realisasi'],datasets:[{label:'Rp',data:[totalRab,real],backgroundColor:['#2dd4bf','#f59e0b']}]},
        options:{responsive:true,plugins:{legend:{labels:{color:'white'}}}}
      });
    }
  }
}

// ===== SWITCH ROLE DENGAN KONFIRMASI =====
window.switchRole = function() {
  if(!confirm('Anda yakin ingin mengganti hak akses?')) return;
  var roles = ['koordinator','kabag','direktur'];
  var cur = window.userRole || 'kabag';
  var idx = roles.indexOf(cur);
  var next = roles[(idx+1)%roles.length];
  window.userRole = next;
  localStorage.setItem('dreamos_role', next);
  document.getElementById('role-badge').innerText = 'Role: '+next;
  renderAll();
};

window.switchTab = function(id) {
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.add('hidden')});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('bg-teal-500/20')});
  var t = document.getElementById('tab-'+id);
  if(t) t.classList.remove('hidden');
  var btn = document.querySelector('[onclick*="switchTab(\''+id+'\')"]');
  if(btn) btn.classList.add('bg-teal-500/20');
  if(id==='dashboard') updateDashboard();
};

window.addBooking = function(){
  var t = document.getElementById('booking-title').value;
  var d = document.getElementById('booking-date').value;
  if(t&&d){ window.bookings.push({id:Date.now(),title:t,date:d,status:'pending'}); saveAll(); renderAll(); }
};
window.addRAB = function(){
  var n = document.getElementById('rab-name').value;
  var v = parseInt(document.getElementById('rab-nominal').value);
  if(n&&v){ window.rabs.push({id:Date.now(),nama:n,nominal:v,status:'pending'}); saveAll(); renderAll(); }
};
window.addMaint = function(){
  var item = document.getElementById('maint-item').value;
  var desc = document.getElementById('maint-desc').value;
  var date = document.getElementById('maint-date').value;
  var cost = parseInt(document.getElementById('maint-cost').value)||0;
  var tech = document.getElementById('maint-tech').value;
  if(item&&desc&&date){ window.maintenances.push({id:Date.now(),item:item,desc:desc,date:date,cost:cost,tech:tech,status:'progress'}); saveAll(); renderAll(); }
};
window.approveBooking = function(id){
  var b = window.bookings.find(function(x){return x.id===id});
  if(b){b.status='approved'; saveAll(); renderAll();}
};

saveAll();
renderAll();

    if (list) {
        list.innerHTML = window.bookings.map(function(b) {
            return '<div class="bg-white/5 p-3 rounded-xl flex flex-col gap-1 '+(b.status==='approved'?'border-l-2 border-green-400':'')+''+(b.status==='rejected'?'border-l-2 border-red-400':'')+'">'+
                '<div class="flex justify-between"><span class="font-semibold text-sm">'+b.name+'</span><span class="text-xs text-white/40">'+b.divisi+'</span></div>'+
                '<div class="text-xs text-white/60">📍 '+b.room+'</div>'+
                '<div class="text-xs text-white/40">📅 '+new Date(b.start).toLocaleString()+' → '+new Date(b.end).toLocaleString()+'</div>'+
                '<div class="text-xs text-white/40 italic">'+b.desc+'</div>'+
                '<div class="flex justify-between items-center"><span class="text-xs '+ (b.status==='approved'?'text-green-400':'text-amber-400') +'">'+b.status+'</span>'+
                (b.status==='pending' ? '<button onclick="approveBooking('+b.id+')" class="text-green-400 text-xs">✅ Setujui</button>' : '')+
                '</div></div>';
        }).join('');
        document.getElementById('booking-count').innerText = window.bookings.length + ' booking';
    }
};

</script>
