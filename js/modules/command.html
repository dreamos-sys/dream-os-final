<div class="glass p-4 rounded-xl" id="command-container-inner">
  <div class="flex justify-between items-center mb-3 pb-2 border-b border-white/20">
    <div class="flex gap-2">
      <span class="text-xs bg-teal-600/30 px-2 py-1 rounded-full" id="role-badge">Role: kabag</span>
      <button id="switch-role" class="text-xs underline text-teal-300">Switch Role</button>
    </div>
    <div class="text-xs text-white/40 font-mono">ISO 27001 SECURED</div>
  </div>

  <div class="flex gap-1 mb-4 flex-wrap border-b border-white/20 pb-2">
    <button class="tab-btn active bg-teal-600/30 px-3 py-1 text-xs rounded-full" onclick="window.switchTab('dashboard')">📊 DASHBOARD</button>
    <button class="tab-btn px-3 py-1 text-xs rounded-full" onclick="window.switchTab('audit')">📜 AUDIT</button>
  </div>

  <div id="tab-dashboard" class="tab-content">
    <div class="grid grid-cols-2 gap-2 mb-3">
      <div class="bg-white/5 p-3 rounded-xl text-center">
        <div class="text-[10px] text-white/60">PENDING</div>
        <div class="text-xl font-bold text-amber-400" id="pending-count">0</div>
      </div>
      <div class="bg-white/5 p-3 rounded-xl text-center">
        <div class="text-[10px] text-white/60">TOTAL RAB</div>
        <div class="text-xl font-bold text-emerald-400" id="rab-total">0</div>
      </div>
    </div>
    <div class="bg-white/5 p-3 rounded-xl border border-white/10">
        <div class="text-sm font-bold mb-2">🔔 Notifikasi Sistem</div>
        <div id="notif-list" class="text-[10px] text-white/40 italic">Menunggu data...</div>
    </div>
  </div>
  
  <div id="tab-audit" class="tab-content hidden">
    <div id="audit-list" class="text-[9px] font-mono space-y-1"></div>
  </div>
</div>

<script>
// Pake IIFE biar gak tabrakan sama global
(function() {
    console.log('🚀 Modul Command Berhasil Dimuat');

    // Fungsi Pengaman (Null-Guard)
    const updateEl = (id, val) => {
        const el = document.getElementById(id);
        if(el) el.innerText = val;
    };

    window.switchTab = function(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        const target = document.getElementById('tab-' + id);
        if(target) target.classList.remove('hidden');
        console.log('📂 Switch tab to:', id);
    };

    window.initCommandCenter = function() {
        console.log('⚙️ Inisialisasi Data Command Center...');
        try {
            // Ambil data dari localStorage
            const bookings = JSON.parse(localStorage.getItem('dreamos_bookings') || '[]');
            const rabs = JSON.parse(localStorage.getItem('dreamos_rabs') || '[]');
            
            updateEl('pending-count', bookings.filter(b => b.status === 'pending').length);
            updateEl('rab-total', 'Rp ' + rabs.reduce((a,b) => a + (b.nominal || 0), 0).toLocaleString());
            updateEl('notif-list', '✅ Sistem Sinkron');
            
            console.log('✅ Render Berhasil');
        } catch (e) {
            console.error('❌ Render Gagal:', e);
        }
    };

    // Trigger otomatis dengan delay kecil biar DOM nempel dulu
    setTimeout(() => {
        if(typeof window.initCommandCenter === 'function') window.initCommandCenter();
    }, 100);
})();
</script>
