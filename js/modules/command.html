<div class="glass p-4 rounded-xl">
  <!-- Header -->
  <div class="flex justify-between items-center mb-3 pb-2 border-b border-white/20">
    <div class="flex gap-2">
      <span class="text-xs bg-teal-600/30 px-2 py-1 rounded-full" id="role-badge">Role: kabag</span>
      <button id="switch-role" class="text-xs underline text-teal-300">Switch Role</button>
    </div>
    <div class="text-xs text-white/40">Audit Trail aktif</div>
  </div>

  <!-- Tabs dengan ONCLICK INLINE -->
  <div class="flex gap-1 mb-4 flex-wrap border-b border-white/20 pb-2">
    <button class="tab-btn px-3 py-1 text-xs rounded-full bg-teal-600/30" onclick="window._switchTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn px-3 py-1 text-xs rounded-full" onclick="window._switchTab('booking')">📅 Booking</button>
    <button class="tab-btn px-3 py-1 text-xs rounded-full" onclick="window._switchTab('approval')">✅ Approval</button>
    <button class="tab-btn px-3 py-1 text-xs rounded-full" onclick="window._switchTab('rab')">💰 RAB & Realisasi</button>
    <button class="tab-btn px-3 py-1 text-xs rounded-full" onclick="window._switchTab('dana')">📅 Dana Periodik</button>
    <button class="tab-btn px-3 py-1 text-xs rounded-full" onclick="window._switchTab('maintenance')">🛠️ Maintenance</button>
    <button class="tab-btn px-3 py-1 text-xs rounded-full" onclick="window._switchTab('report')">📈 Laporan</button>
    <button class="tab-btn px-3 py-1 text-xs rounded-full" onclick="window._switchTab('inventaris')">🏢 Inventaris</button>
    <button class="tab-btn px-3 py-1 text-xs rounded-full" onclick="window._switchTab('audit')">📜 Audit Trail</button>
  </div>

  <!-- Konten Tab -->
  <div id="tab-dashboard" class="tab-content">...</div>
  <div id="tab-booking" class="tab-content hidden">...</div>
  <!-- ... (semua konten tab sama persis seperti sebelumnya) ... -->
</div>
<script>
  // Fungsi pindah tab (dipasang di window agar bisa dipanggil inline)
  window._switchTab = function(tabId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-teal-600/30'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    var target = document.getElementById('tab-' + tabId);
    if (target) target.classList.remove('hidden');
    // Tandai tombol aktif
    var activeBtn = document.querySelector('.tab-btn[onclick*="'+tabId+'"]');
    if (activeBtn) activeBtn.classList.add('active', 'bg-teal-600/30');
  };
</script>
