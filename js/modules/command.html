<div class="space-y-4 animate-in slide-in-from-bottom-4 duration-500">
    <div id="budget-summary" class="glass-pearl p-4 rounded-2xl border border-emerald-500/20 shadow-lg">
        </div>

    <div class="flex gap-2">
        <button onclick="addTransaction()" class="flex-1 py-3 bg-emerald-600/20 border border-emerald-500/30 rounded-xl text-[10px] font-bold text-emerald-400 flex items-center justify-center gap-2">
            <i data-lucide="plus-circle" class="w-3 h-3"></i> TAMBAH TRANSAKSI
        </button>
        <button onclick="resetBudget()" class="px-4 py-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400">
            <i data-lucide="trash-2" class="w-3 h-3"></i>
        </button>
    </div>

    <div class="glass rounded-2xl overflow-hidden border border-white/5">
        <div class="bg-white/5 p-3 text-[10px] font-bold border-b border-white/10 flex justify-between uppercase tracking-tighter">
            <span>Uraian Pekerjaan</span>
            <span>Jumlah</span>
        </div>
        <div id="transaction-list" class="divide-y divide-white/5 max-h-[300px] overflow-y-auto">
            </div>
    </div>
</div>

<script>
    // Database Budget Sultan (Persistence)
    const DEFAULT_BUDGET = 5000000;
    let transactions = JSON.parse(localStorage.getItem('dream_os_budget')) || [
        { title: 'Beli Hosting & Domain', amount: 1500000, status: 'DONE' },
        { title: 'Sewa Dev (Gemini)', amount: 2000000, status: 'PROSES' }
    ];

    function saveAndRender() {
        localStorage.setItem('dream_os_budget', JSON.stringify(transactions));
        renderBudget();
    }

    function renderBudget() {
        const totalUsed = transactions.reduce((sum, t) => sum + t.amount, 0);
        const remaining = DEFAULT_BUDGET - totalUsed;
        const percent = (totalUsed / DEFAULT_BUDGET) * 100;

        document.getElementById('budget-summary').innerHTML = `
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-xs font-bold text-emerald-400 uppercase tracking-widest">Master Budget</h3>
                <span class="text-[9px] text-white/40">v1.3.2.2</span>
            </div>
            <div class="text-2xl font-bold mb-1">Rp ${remaining.toLocaleString('id-ID')}</div>
            <p class="text-[10px] text-white/40 mb-3 uppercase">Sisa Alokasi Dana</p>
            <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden mb-2">
                <div class="bg-gradient-to-r from-emerald-500 to-teal-400 h-full shadow-[0_0_10px_rgba(16,185,129,0.4)] transition-all duration-1000" style="width: ${percent}%"></div>
            </div>
            <div class="flex justify-between text-[9px] font-medium">
                <span class="text-emerald-400">Terpakai: Rp ${totalUsed.toLocaleString('id-ID')}</span>
                <span class="text-white/40">${percent.toFixed(1)}%</span>
            </div>
        `;

        document.getElementById('transaction-list').innerHTML = transactions.map((t, i) => `
            <div class="p-3 flex justify-between items-center active:bg-white/5">
                <div>
                    <div class="text-[11px] font-semibold">${t.title}</div>
                    <div class="text-[9px] text-white/40 uppercase">${t.status}</div>
                </div>
                <div class="text-right">
                    <div class="text-[11px] font-bold text-white">Rp ${t.amount.toLocaleString('id-ID')}</div>
                    <button onclick="deleteTx(${i})" class="text-[8px] text-red-400/50 uppercase font-bold">Hapus</button>
                </div>
            </div>
        `).reverse().join('');
        
        if(window.lucide) lucide.createIcons();
    }

    window.addTransaction = function() {
        const title = prompt("Uraian Pekerjaan:");
        const amount = parseInt(prompt("Jumlah (Rp):", "100000"));
        if(title && amount) {
            transactions.push({ title, amount, status: 'PENDING' });
            saveAndRender();
        }
    };

    window.deleteTx = function(i) {
        if(confirm('Hapus transaksi ini?')) {
            transactions.splice(i, 1);
            saveAndRender();
        }
    };

    window.resetBudget = function() {
        if(confirm('Reset semua data budget?')) {
            transactions = [];
            saveAndRender();
        }
    };

    renderBudget();
</script>
<script>
// ==================== ANTI-SPOOFING & ENCRYPTED GEO CORE ====================
(function() {
    // Kunci enkripsi untuk zona (derived dari seed spiritual)
    const GEO_KEY = "سُبْحَانَ الَّذِي أَسْرَىٰ";

    // Enkripsi/dekripsi XOR sederhana (upgrade ke Web Crypto untuk produksi)
    const cipher = {
        encrypt: (text) => {
            return btoa(text.split('').map((c, i) => 
                String.fromCharCode(c.charCodeAt(0) ^ GEO_KEY.charCodeAt(i % GEO_KEY.length))
            ).join(''));
        },
        decrypt: (enc) => {
            try {
                return atob(enc).split('').map((c, i) => 
                    String.fromCharCode(c.charCodeAt(0) ^ GEO_KEY.charCodeAt(i % GEO_KEY.length))
                ).join('');
            } catch(e) { return '[]'; }
        }
    };

    // Simpan zona dengan enkripsi
    function saveZones(zones) {
        localStorage.setItem('dreamos_geo_zones', cipher.encrypt(JSON.stringify(zones)));
    }

    // Muat zona dengan dekripsi
    function loadZones() {
        const raw = localStorage.getItem('dreamos_geo_zones');
        if (!raw) return [];
        return JSON.parse(cipher.decrypt(raw));
    }

    // Override fungsi window.geo untuk menggunakan enkripsi
    window.geo = {
        get zones() { return loadZones(); },
        set zones(val) { saveZones(val); },
        
        // ... (Haversine distance, getCurrentLocation, checkZones tetap sama) ...

        // VERIFIKASI SILANG DENGAN IP (ANTI-SPOOFING)
        verifyWithIP: async function(gpsLat, gpsLon) {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const dist = this.distance(gpsLat, gpsLon, data.latitude, data.longitude);
                // Jika jarak GPS vs IP > 100 km, anggap spoof
                if (dist > 100) {
                    console.warn(`[GEO-SHIELD] Spoof detected! GPS-IP gap: ${dist.toFixed(0)} km`);
                    return false;
                }
                return true;
            } catch(e) {
                // Jika IP check gagal, TOLAK (Zero Trust)
                console.warn('[GEO-SHIELD] IP verification failed, access denied.');
                return false;
            }
        },

        // TRIGGER AKTIF (BISA LOCKDOWN)
        triggerActions: function(matchedZones, location) {
            matchedZones.forEach(zone => {
                if(zone.actions) {
                    zone.actions.forEach(action => {
                        if (action === 'auto-checkin' || action === 'log-attendance') {
                            addAudit('Geo Check-in', `Check-in at ${zone.name} (${location.lat.toFixed(4)}, ${location.lng.toFixed(4)})`);
                        }
                        if (action === 'lockdown') {
                            // Panggil fungsi lockdown global jika ada
                            if (window.lockdown) window.lockdown();
                        }
                    });
                }
            });
        }
    };

    // Override refreshLocation untuk sertakan IP Check
    const originalRefresh = window.refreshLocation;
    window.refreshLocation = async function() {
        // Panggil fungsi asli untuk update UI
        await originalRefresh();
        
        // Lakukan verifikasi silang diam-diam
        try {
            const loc = await window.geo.getCurrentLocation();
            const isLegit = await window.geo.verifyWithIP(loc.lat, loc.lng);
            if (!isLegit) {
                document.getElementById('geo-status').textContent = '❌ LOCATION SPOOF DETECTED';
                if (window.lockdown) window.lockdown();
            }
        } catch(e) { console.warn(e); }
    };

    // Override addZonePrompt untuk simpan terenkripsi
    const originalAddZone = window.addZonePrompt;
    window.addZonePrompt = function() {
        originalAddZone();
        // Pastikan zona baru langsung dienkripsi
        saveZones(window.geo.zones);
    };

    console.log('[GEO-SHIELD] Hardened v1.1 active. IP verification & encryption on.');
})();
</script>
