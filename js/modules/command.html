<div style="background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.005) 100%); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; padding: 1.5rem; height: 100%; overflow-y: auto;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);">
    <div style="display: flex; gap: 0.5rem;">
      <span style="font-size: 0.75rem; background: rgba(16, 185, 129, 0.2); padding: 0.25rem 0.75rem; border-radius: 999px;" id="role-badge">Role: kabag</span>
      <button onclick="switchRole()" style="font-size: 0.7rem; color: #10b981; text-decoration: underline;">Switch Role</button>
    </div>
    <div style="font-size: 0.65rem; color: rgba(255,255,255,0.4);">Audit Trail aktif</div>
  </div>

  <div style="display: flex; gap: 0.25rem; margin-bottom: 1rem; flex-wrap: wrap; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);">
    <button class="tab-btn" onclick="switchTab('dashboard')" style="padding: 0.25rem 0.75rem; font-size: 0.65rem; border-radius: 999px; background: rgba(16,185,129,0.3);" id="tab-btn-dashboard">📊 Dashboard</button>
    <button class="tab-btn" onclick="switchTab('booking')" style="padding: 0.25rem 0.75rem; font-size: 0.65rem; border-radius: 999px;">📅 Booking</button>
    <button class="tab-btn" onclick="switchTab('approval')" style="padding: 0.25rem 0.75rem; font-size: 0.65rem; border-radius: 999px;">✅ Approval</button>
    <button class="tab-btn" onclick="switchTab('rab')" style="padding: 0.25rem 0.75rem; font-size: 0.65rem; border-radius: 999px;">💰 RAB & Realisasi</button>
    <button class="tab-btn" onclick="switchTab('dana')" style="padding: 0.25rem 0.75rem; font-size: 0.65rem; border-radius: 999px;">📅 Dana Periodik</button>
    <button class="tab-btn" onclick="switchTab('maintenance')" style="padding: 0.25rem 0.75rem; font-size: 0.65rem; border-radius: 999px;">🛠️ Maintenance</button>
    <button class="tab-btn" onclick="switchTab('report')" style="padding: 0.25rem 0.75rem; font-size: 0.65rem; border-radius: 999px;">📈 Laporan</button>
    <button class="tab-btn" onclick="switchTab('inventaris')" style="padding: 0.25rem 0.75rem; font-size: 0.65rem; border-radius: 999px;">🏢 Inventaris</button>
    <button class="tab-btn" onclick="switchTab('audit')" style="padding: 0.25rem 0.75rem; font-size: 0.65rem; border-radius: 999px;">📜 Audit Trail</button>
  </div>

  <!-- Semua konten tab -->
  <div id="tab-dashboard" class="tab-content" style="display: block;">
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 0.75rem;">
      <div style="background: rgba(255,255,255,0.03); padding: 0.5rem; border-radius: 1rem; text-align: center;"><div style="font-size: 0.6rem; color: rgba(255,255,255,0.4);">Booking Pending</div><div style="font-size: 1.25rem; font-weight: bold; color: #f59e0b;" id="pending-count">0</div></div>
      <div style="background: rgba(255,255,255,0.03); padding: 0.5rem; border-radius: 1rem; text-align: center;"><div style="font-size: 0.6rem; color: rgba(255,255,255,0.4);">Total RAB Diajukan</div><div style="font-size: 1.25rem; font-weight: bold; color: #34d399;" id="rab-total">0</div></div>
      <div style="background: rgba(255,255,255,0.03); padding: 0.5rem; border-radius: 1rem; text-align: center;"><div style="font-size: 0.6rem; color: rgba(255,255,255,0.4);">Realisasi Bulan Ini</div><div style="font-size: 1.25rem; font-weight: bold; color: #2dd4bf;" id="realisasi-bulan">0</div></div>
      <div style="background: rgba(255,255,255,0.03); padding: 0.5rem; border-radius: 1rem; text-align: center;"><div style="font-size: 0.6rem; color: rgba(255,255,255,0.4);">Total Dana Tips</div><div style="font-size: 1.25rem; font-weight: bold; color: #60a5fa;" id="tips-total">0</div></div>
    </div>
    <div style="background: rgba(255,255,255,0.03); padding: 0.75rem; border-radius: 1rem; margin-bottom: 0.75rem;">
      <div style="font-size: 0.8rem; font-weight: bold; margin-bottom: 0.5rem;">📈 Anggaran vs Realisasi (Bulan Ini)</div>
      <canvas id="budgetChart" height="120" style="width: 100%;"></canvas>
    </div>
    <div style="background: rgba(255,255,255,0.03); padding: 0.75rem; border-radius: 1rem;">
      <div style="font-size: 0.8rem; font-weight: bold; margin-bottom: 0.5rem;">🔔 Notifikasi</div>
      <div id="notif-list" style="font-size: 0.65rem; color: rgba(255,255,255,0.4);">✅ Semua aman</div>
    </div>
  </div>

  <div id="tab-booking" class="tab-content" style="display: none;">
    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.75rem;"><input type="text" id="booking-title" placeholder="Judul Booking" style="flex: 1; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);"><input type="date" id="booking-date" style="background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);"><button onclick="addBooking()" style="background: #10b981; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.7rem; font-weight: bold;">+</button></div>
    <div id="booking-list" style="max-height: 300px; overflow-y: auto;"></div>
  </div>

  <div id="tab-approval" class="tab-content" style="display: none;">
    <div style="background: rgba(255,255,255,0.03); padding: 0.5rem; border-radius: 0.5rem; margin-bottom: 0.5rem;"><div style="font-size: 0.8rem; font-weight: bold;">📋 Approval Booking</div><div id="approval-booking-list" style="font-size: 0.7rem; margin-top: 0.5rem;"></div></div>
    <div style="background: rgba(255,255,255,0.03); padding: 0.5rem; border-radius: 0.5rem;"><div style="font-size: 0.8rem; font-weight: bold;">💰 Approval RAB</div><div id="approval-rab-list" style="font-size: 0.7rem; margin-top: 0.5rem;"></div></div>
  </div>

  <div id="tab-rab" class="tab-content" style="display: none;">
    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;"><input type="text" id="rab-name" placeholder="Nama Kegiatan" style="flex: 1; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);"><input type="number" id="rab-nominal" placeholder="Nominal" style="width: 100px; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);"><button onclick="addRAB()" style="background: #10b981; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.7rem; font-weight: bold;">Ajukan</button></div>
    <div id="rab-list" style="font-size: 0.7rem; max-height: 200px; overflow-y: auto;"></div>
  </div>

  <div id="tab-dana" class="tab-content" style="display: none;"><div style="font-size: 0.7rem; color: rgba(255,255,255,0.5);">Fitur Dana Periodik & Tips siap digunakan.</div></div>
  <div id="tab-maintenance" class="tab-content" style="display: none;">
    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.75rem;"><input type="text" id="maint-item" placeholder="Barang (AC, Lift)" style="flex: 1; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);"><input type="text" id="maint-desc" placeholder="Jenis Servis" style="flex: 1; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);"><input type="date" id="maint-date" style="background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);"><button onclick="addMaint()" style="background: #10b981; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.7rem; font-weight: bold;">+</button></div>
    <div id="maint-list" style="font-size: 0.7rem; max-height: 300px; overflow-y: auto;"></div>
  </div>
  <div id="tab-report" class="tab-content" style="display: none;"><div style="font-size: 0.7rem; color: rgba(255,255,255,0.5);">Fitur Laporan siap digunakan.</div></div>
  <div id="tab-inventaris" class="tab-content" style="display: none;">
    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;"><input type="text" id="aset-name" placeholder="Nama Aset" style="flex: 1; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);"><input type="number" id="aset-qty" placeholder="Jumlah" style="width: 80px; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.5rem; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.1);"><button onclick="addAset()" style="background: #10b981; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.7rem; font-weight: bold;">Tambah</button></div>
    <div id="aset-list" style="font-size: 0.7rem; max-height: 200px; overflow-y: auto;"></div>
  </div>
  <div id="tab-audit" class="tab-content" style="display: none;">
    <div id="audit-list" style="font-size: 0.65rem; font-family: monospace; max-height: 400px; overflow-y: auto;"></div>
    <button onclick="clearAudit()" style="margin-top: 0.5rem; background: rgba(239,68,68,0.5); padding: 0.25rem 0.5rem; border-radius: 0.5rem; font-size: 0.6rem;">Clear Audit</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// Inisialisasi data global
window.bookings = JSON.parse(localStorage.getItem('dreamos_bookings') || '[{"id":1,"title":"Rapat Koordinasi","date":"2026-05-15","status":"pending"}]');
window.rabs = JSON.parse(localStorage.getItem('dreamos_rabs') || '[{"id":1,"nama":"Seminar AI","nominal":5000000,"status":"pending"}]');
window.realisasi = JSON.parse(localStorage.getItem('dreamos_realisasi') || '[]');
window.aset = JSON.parse(localStorage.getItem('dreamos_aset') || '[{"nama":"Laptop","jumlah":5},{"nama":"Proyektor","jumlah":3},{"nama":"AC","jumlah":10}]');
window.audit = JSON.parse(localStorage.getItem('dreamos_audit') || '[]');
window.periodicFunds = JSON.parse(localStorage.getItem('dreamos_periodic_funds') || '[]');
window.tips = JSON.parse(localStorage.getItem('dreamos_tips') || '[]');
window.maintenances = JSON.parse(localStorage.getItem('dreamos_maintenances') || '[{"id":1,"item":"AC Ruang Rapat","desc":"Cuci AC","date":"2026-02-10","cost":250000,"tech":"PT Suhu Sejuk","status":"progress"}]');
window.userRole = localStorage.getItem('dreamos_role') || 'kabag';
window.chartInstance = null;

// Helper
function saveAll() {
  localStorage.setItem('dreamos_bookings', JSON.stringify(window.bookings));
  localStorage.setItem('dreamos_rabs', JSON.stringify(window.rabs));
  localStorage.setItem('dreamos_realisasi', JSON.stringify(window.realisasi));
  localStorage.setItem('dreamos_aset', JSON.stringify(window.aset));
  localStorage.setItem('dreamos_periodic_funds', JSON.stringify(window.periodicFunds));
  localStorage.setItem('dreamos_tips', JSON.stringify(window.tips));
  localStorage.setItem('dreamos_maintenances', JSON.stringify(window.maintenances));
  localStorage.setItem('dreamos_audit', JSON.stringify(window.audit));
}

// Render semua
function renderAll() {
  // Booking
  var bl = document.getElementById('booking-list');
  if (bl) bl.innerHTML = window.bookings.map(function(b) { return '<div style="background: rgba(255,255,255,0.03); padding: 0.5rem; border-radius: 0.5rem; display: flex; justify-content: space-between; margin-bottom: 0.25rem;"><div><div style="font-weight: bold;">'+b.title+'</div><div style="font-size: 0.6rem; color: rgba(255,255,255,0.4);">'+b.date+' - '+b.status+'</div></div><button onclick="approveBooking('+b.id+')" style="color: #34d399; font-size: 0.7rem;">✅</button></div>'; }).join('');

  // RAB
  var rl = document.getElementById('rab-list');
  if (rl) rl.innerHTML = window.rabs.map(function(r) { return '<div style="background: rgba(255,255,255,0.03); padding: 0.5rem; border-radius: 0.5rem; margin-bottom: 0.25rem;">'+r.nama+' - Rp '+r.nominal.toLocaleString()+' - '+r.status+'</div>'; }).join('');

  // Maintenance
  var ml = document.getElementById('maint-list');
  if (ml) ml.innerHTML = window.maintenances.map(function(m) { return '<div style="background: rgba(255,255,255,0.03); padding: 0.5rem; border-radius: 0.5rem; margin-bottom: 0.25rem;"><div style="font-weight: bold;">'+m.item+' - '+m.desc+'</div><div style="font-size: 0.6rem; color: rgba(255,255,255,0.4);">Tanggal: '+m.date+' | Biaya: Rp '+(m.cost||0).toLocaleString()+' | Teknisi: '+(m.tech||'-')+' | Status: '+(m.status||'progress')+'</div></div>'; }).join('');

  // Aset
  var al = document.getElementById('aset-list');
  if (al) al.innerHTML = window.aset.map(function(a) { return '<div>'+a.nama+' x'+a.jumlah+' <button onclick="deleteAset(\''+a.nama+'\')" style="color: #ef4444; font-size: 0.6rem;">Hapus</button></div>'; }).join('');

  // Audit
  var aud = document.getElementById('audit-list');
  if (aud) aud.innerHTML = window.audit.slice(0,50).map(function(a) { return '<div>'+new Date(a.timestamp).toLocaleString()+' - '+a.role+': '+a.action+' - '+a.details+'</div>'; }).join('');

  // Approval lists
  var abl = document.getElementById('approval-booking-list');
  if (abl) abl.innerHTML = window.bookings.filter(function(b) { return b.status === 'pending'; }).map(function(b) { return '<div>'+b.title+' <button onclick="approveBooking('+b.id+')" style="color: #34d399; font-size: 0.7rem;">Approve</button></div>'; }).join('');
  var arl = document.getElementById('approval-rab-list');
  if (arl) arl.innerHTML = window.rabs.filter(function(r) { return r.status === 'pending'; }).map(function(r) { return '<div>'+r.nama+' - Rp '+r.nominal+' <button onclick="approveRAB('+r.id+')" style="color: #34d399; font-size: 0.7rem;">Approve</button></div>'; }).join('');

  updateDashboard();
}

function updateDashboard() {
  var pendingCount = window.bookings.filter(function(b) { return b.status === 'pending'; }).length;
  var totalRab = window.rabs.reduce(function(s, r) { return s + r.nominal; }, 0);
  var realisasiBulan = window.realisasi.reduce(function(s, r) { return s + (r.nominal || 0); }, 0);
  var totalTips = window.tips.reduce(function(s, t) { return s + t.nominal; }, 0);

  document.getElementById('pending-count').innerText = pendingCount;
  document.getElementById('rab-total').innerText = 'Rp ' + totalRab.toLocaleString();
  document.getElementById('realisasi-bulan').innerText = 'Rp ' + realisasiBulan.toLocaleString();
  document.getElementById('tips-total').innerText = 'Rp ' + totalTips.toLocaleString();

  if (typeof Chart !== 'undefined') {
    var ctx = document.getElementById('budgetChart');
    if (ctx) {
      ctx = ctx.getContext('2d');
      if (window.chartInstance) window.chartInstance.destroy();
      window.chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Anggaran', 'Realisasi'],
          datasets: [{ label: 'Rp', data: [totalRab, realisasiBulan], backgroundColor: ['#2dd4bf', '#f59e0b'] }]
        },
        options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } } }
      });
    }
  }
}

// Fungsi tombol
window.addBooking = function() {
  var title = document.getElementById('booking-title').value;
  var date = document.getElementById('booking-date').value;
  if (title && date) {
    window.bookings.push({ id: Date.now(), title: title, date: date, status: 'pending' });
    saveAll();
    renderAll();
    document.getElementById('booking-title').value = '';
  }
};

window.addRAB = function() {
  var nama = document.getElementById('rab-name').value;
  var nominal = parseInt(document.getElementById('rab-nominal').value);
  if (nama && nominal) {
    window.rabs.push({ id: Date.now(), nama: nama, nominal: nominal, status: 'pending' });
    saveAll();
    renderAll();
    document.getElementById('rab-name').value = '';
    document.getElementById('rab-nominal').value = '';
  }
};

window.addMaint = function() {
  var item = document.getElementById('maint-item').value;
  var desc = document.getElementById('maint-desc').value;
  var date = document.getElementById('maint-date').value;
  if (item && desc && date) {
    window.maintenances.push({ id: Date.now(), item: item, desc: desc, date: date, cost: 0, tech: '', status: 'progress' });
    saveAll();
    renderAll();
  }
};

window.addAset = function() {
  var nama = document.getElementById('aset-name').value;
  var qty = parseInt(document.getElementById('aset-qty').value);
  if (nama && qty) {
    window.aset.push({ nama: nama, jumlah: qty });
    saveAll();
    renderAll();
  }
};

window.approveBooking = function(id) {
  var b = window.bookings.find(function(x) { return x.id === id; });
  if (b) { b.status = 'approved'; saveAll(); renderAll(); }
};

window.approveRAB = function(id) {
  var r = window.rabs.find(function(x) { return x.id === id; });
  if (r) { r.status = 'approved'; saveAll(); renderAll(); }
};

window.deleteAset = function(nama) {
  window.aset = window.aset.filter(function(a) { return a.nama !== nama; });
  saveAll();
  renderAll();
};

window.clearAudit = function() {
  window.audit = [];
  localStorage.setItem('dreamos_audit', '[]');
  renderAll();
};

// Inisialisasi
document.addEventListener('DOMContentLoaded', function() {
  renderAll();
});
</script>
