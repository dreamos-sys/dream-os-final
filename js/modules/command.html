<div class="p-4 h-full overflow-y-auto">
  <!-- Header: Role & Switch Role -->
  <div class="flex justify-between items-center mb-4 pb-3 border-b border-white/10">
    <div class="flex items-center gap-2">
      <span id="role-badge" class="bg-teal-500/20 px-3 py-1 rounded-full text-sm font-medium">Role: kabag</span>
      <button onclick="switchRole()" class="text-xs text-teal-400 underline hover:text-teal-300 transition">Switch Role</button>
    </div>
    <span class="text-xs text-white/40">Audit Trail aktif</span>
  </div>

  <!-- Tab Horizontal Scroll -->
  <div class="flex overflow-x-auto gap-2 mb-5 pb-2 border-b border-white/10" style="-webkit-overflow-scrolling: touch; scrollbar-width: none;">
    <button class="tab-btn flex-shrink-0 px-4 py-2 text-sm rounded-full bg-teal-500/20" onclick="switchTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn flex-shrink-0 px-4 py-2 text-sm rounded-full" onclick="switchTab('booking')">📅 Booking</button>
    <button class="tab-btn flex-shrink-0 px-4 py-2 text-sm rounded-full" onclick="switchTab('approval')">✅ Approval</button>
    <button class="tab-btn flex-shrink-0 px-4 py-2 text-sm rounded-full" onclick="switchTab('rab')">💰 RAB & Realisasi</button>
    <button class="tab-btn flex-shrink-0 px-4 py-2 text-sm rounded-full" onclick="switchTab('dana')">📅 Dana Periodik</button>
    <button class="tab-btn flex-shrink-0 px-4 py-2 text-sm rounded-full" onclick="switchTab('maintenance')">🛠️ Maintenance</button>
    <button class="tab-btn flex-shrink-0 px-4 py-2 text-sm rounded-full" onclick="switchTab('report')">📈 Laporan</button>
    <button class="tab-btn flex-shrink-0 px-4 py-2 text-sm rounded-full" onclick="switchTab('inventaris')">🏢 Inventaris</button>
    <button class="tab-btn flex-shrink-0 px-4 py-2 text-sm rounded-full" onclick="switchTab('audit')">📜 Audit Trail</button>
  </div>

  <!-- Konten Tab -->
  <div id="tab-dashboard" class="tab-content">
    <div class="grid grid-cols-2 gap-4 mb-5">
      <div class="bg-white/5 p-4 rounded-2xl text-center"><div class="text-xs text-white/50 mb-1">Booking Pending</div><div class="text-2xl font-bold text-amber-400" id="pending-count">0</div></div>
      <div class="bg-white/5 p-4 rounded-2xl text-center"><div class="text-xs text-white/50 mb-1">Total RAB Diajukan</div><div class="text-2xl font-bold text-emerald-400" id="rab-total">0</div></div>
      <div class="bg-white/5 p-4 rounded-2xl text-center"><div class="text-xs text-white/50 mb-1">Realisasi Bulan Ini</div><div class="text-2xl font-bold text-teal-400" id="realisasi-bulan">0</div></div>
      <div class="bg-white/5 p-4 rounded-2xl text-center"><div class="text-xs text-white/50 mb-1">Total Dana Tips</div><div class="text-2xl font-bold text-blue-400" id="tips-total">0</div></div>
    </div>
    <div class="bg-white/5 p-5 rounded-2xl mb-5">
      <div class="text-base font-semibold mb-3">📈 Anggaran vs Realisasi (Bulan Ini)</div>
      <canvas id="budgetChart" height="150" class="w-full"></canvas>
    </div>
    <div class="bg-white/5 p-5 rounded-2xl">
      <div class="text-base font-semibold mb-2">🔔 Notifikasi</div>
      <div id="notif-list" class="text-sm text-white/60">✅ Semua aman</div>
    </div>
  </div>

  <div id="tab-booking" class="tab-content hidden">
    <div class="flex flex-col gap-3 mb-5">
      <input type="text" id="booking-title" placeholder="Judul Booking" class="bg-black/30 p-3 rounded-xl text-sm border border-white/10">
      <input type="date" id="booking-date" class="bg-black/30 p-3 rounded-xl text-sm border border-white/10">
      <button onclick="addBooking()" class="bg-teal-600 py-3 px-6 rounded-xl font-bold text-sm active:scale-95 transition">+ Tambah Booking</button>
    </div>
    <div id="booking-list" class="space-y-2 max-h-80 overflow-y-auto"></div>
  </div>

  <div id="tab-rab" class="tab-content hidden">
    <div class="flex flex-col gap-3 mb-5">
      <input type="text" id="rab-name" placeholder="Nama Kegiatan" class="bg-black/30 p-3 rounded-xl text-sm border border-white/10">
      <input type="number" id="rab-nominal" placeholder="Nominal" class="bg-black/30 p-3 rounded-xl text-sm border border-white/10">
      <button onclick="addRAB()" class="bg-teal-600 py-3 px-6 rounded-xl font-bold text-sm active:scale-95 transition">Ajukan</button>
    </div>
    <div id="rab-list" class="space-y-2 max-h-80 overflow-y-auto text-sm"></div>
  </div>

  <div id="tab-maintenance" class="tab-content hidden">
    <div class="flex flex-col gap-3 mb-5">
      <input type="text" id="maint-item" placeholder="Barang (AC, Lift)" class="bg-black/30 p-3 rounded-xl text-sm border border-white/10">
      <input type="text" id="maint-desc" placeholder="Jenis Servis" class="bg-black/30 p-3 rounded-xl text-sm border border-white/10">
      <input type="date" id="maint-date" class="bg-black/30 p-3 rounded-xl text-sm border border-white/10">
      <input type="number" id="maint-cost" placeholder="Biaya" class="bg-black/30 p-3 rounded-xl text-sm border border-white/10">
      <input type="text" id="maint-tech" placeholder="Teknisi" class="bg-black/30 p-3 rounded-xl text-sm border border-white/10">
      <button onclick="addMaint()" class="bg-teal-600 py-3 px-6 rounded-xl font-bold text-sm active:scale-95 transition">+ Tambah</button>
    </div>
    <div id="maint-list" class="space-y-2 max-h-80 overflow-y-auto text-sm"></div>
  </div>

  <!-- tab lain sebagai placeholder -->
  <div id="tab-approval" class="tab-content hidden"><div class="text-sm text-white/40 p-4">Approval aktif.</div></div>
  <div id="tab-dana" class="tab-content hidden"><div class="text-sm text-white/40 p-4">Dana Periodik & Tips siap.</div></div>
  <div id="tab-report" class="tab-content hidden"><div class="text-sm text-white/40 p-4">Laporan siap.</div></div>
  <div id="tab-inventaris" class="tab-content hidden"><div class="text-sm text-white/40 p-4">Inventaris siap.</div></div>
  <div id="tab-audit" class="tab-content hidden"><div class="text-sm text-white/40 p-4">Audit Trail siap.</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ===== DATA GLOBAL =====
window.bookings = JSON.parse(localStorage.getItem('dreamos_bookings') || '[{"id":1,"title":"Rapat Koordinasi","date":"2026-05-15","status":"pending"}]');
window.rabs = JSON.parse(localStorage.getItem('dreamos_rabs') || '[{"id":1,"nama":"Seminar AI","nominal":5000000,"status":"pending"}]');
window.realisasi = JSON.parse(localStorage.getItem('dreamos_realisasi') || '[]');
window.aset = JSON.parse(localStorage.getItem('dreamos_aset') || '[{"nama":"Laptop","jumlah":5},{"nama":"Proyektor","jumlah":3},{"nama":"AC","jumlah":10}]');
window.audit = JSON.parse(localStorage.getItem('dreamos_audit') || '[]');
window.periodicFunds = JSON.parse(localStorage.getItem('dreamos_periodic_funds') || '[]');
window.tips = JSON.parse(localStorage.getItem('dreamos_tips') || '[]');
window.maintenances = JSON.parse(localStorage.getItem('dreamos_maintenances') || '[{"id":1,"item":"AC Ruang Rapat","desc":"Cuci AC","date":"2026-02-10","cost":250000,"tech":"PT Suhu Sejuk","status":"progress"}]');
window.userRole = localStorage.getItem('dreamos_role') || 'kabag';
window.chartInstance = null;

function saveAll() {
  localStorage.setItem('dreamos_bookings', JSON.stringify(window.bookings));
  localStorage.setItem('dreamos_rabs', JSON.stringify(window.rabs));
  localStorage.setItem('dreamos_realisasi', JSON.stringify(window.realisasi));
  localStorage.setItem('dreamos_aset', JSON.stringify(window.aset));
  localStorage.setItem('dreamos_periodic_funds', JSON.stringify(window.periodicFunds));
  localStorage.setItem('dreamos_tips', JSON.stringify(window.tips));
  localStorage.setItem('dreamos_maintenances', JSON.stringify(window.maintenances));
  localStorage.setItem('dreamos_audit', JSON.stringify(window.audit));
}

function renderAll() {
  document.getElementById('booking-list').innerHTML = window.bookings.map(function(b) { return '<div class="bg-white/5 p-3 rounded-xl flex justify-between"><div><div class="font-semibold">'+b.title+'</div><div class="text-xs text-white/40">'+b.date+' - '+b.status+'</div></div><button onclick="approveBooking('+b.id+')" class="text-green-400 text-sm">✅</button></div>'; }).join('');
  document.getElementById('rab-list').innerHTML = window.rabs.map(function(r) { return '<div class="bg-white/5 p-3 rounded-xl">'+r.nama+' - Rp '+r.nominal.toLocaleString()+' - '+r.status+'</div>'; }).join('');
  document.getElementById('maint-list').innerHTML = window.maintenances.map(function(m) { return '<div class="bg-white/5 p-3 rounded-xl"><div class="font-semibold">'+m.item+' - '+m.desc+'</div><div class="text-xs text-white/40">'+m.date+' | Rp '+(m.cost||0).toLocaleString()+' | '+ (m.tech||'-') +'</div></div>'; }).join('');
  updateDashboard();
}

function updateDashboard() {
  var pending = window.bookings.filter(function(b){return b.status==='pending'}).length;
  var totalRab = window.rabs.reduce(function(s,r){return s+r.nominal},0);
  var real = window.realisasi.reduce(function(s,r){return s+(r.nominal||0)},0);
  var tips = window.tips.reduce(function(s,t){return s+t.nominal},0);
  document.getElementById('pending-count').innerText = pending;
  document.getElementById('rab-total').innerText = 'Rp '+totalRab.toLocaleString();
  document.getElementById('realisasi-bulan').innerText = 'Rp '+real.toLocaleString();
  document.getElementById('tips-total').innerText = 'Rp '+tips.toLocaleString();

  if(typeof Chart !== 'undefined'){
    var ctx = document.getElementById('budgetChart');
    if(ctx){
      ctx = ctx.getContext('2d');
      if(window.chartInstance) window.chartInstance.destroy();
      window.chartInstance = new Chart(ctx, {
        type:'bar',
        data:{labels:['Anggaran','Realisasi'],datasets:[{label:'Rp',data:[totalRab,real],backgroundColor:['#2dd4bf','#f59e0b']}]},
        options:{responsive:true,plugins:{legend:{labels:{color:'white'}}}}
      });
    }
  }
}

// ===== SWITCH ROLE DENGAN KONFIRMASI =====
window.switchRole = function() {
  if(!confirm('Anda yakin ingin mengganti hak akses?')) return;
  var roles = ['koordinator','kabag','direktur'];
  var cur = window.userRole || 'kabag';
  var idx = roles.indexOf(cur);
  var next = roles[(idx+1)%roles.length];
  window.userRole = next;
  localStorage.setItem('dreamos_role', next);
  document.getElementById('role-badge').innerText = 'Role: '+next;
  renderAll();
};

window.switchTab = function(id) {
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.add('hidden')});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('bg-teal-500/20')});
  var t = document.getElementById('tab-'+id);
  if(t) t.classList.remove('hidden');
  var btn = document.querySelector('[onclick*="switchTab(\''+id+'\')"]');
  if(btn) btn.classList.add('bg-teal-500/20');
  if(id==='dashboard') updateDashboard();
};

window.addBooking = function(){
  var t = document.getElementById('booking-title').value;
  var d = document.getElementById('booking-date').value;
  if(t&&d){ window.bookings.push({id:Date.now(),title:t,date:d,status:'pending'}); saveAll(); renderAll(); }
};
window.addRAB = function(){
  var n = document.getElementById('rab-name').value;
  var v = parseInt(document.getElementById('rab-nominal').value);
  if(n&&v){ window.rabs.push({id:Date.now(),nama:n,nominal:v,status:'pending'}); saveAll(); renderAll(); }
};
window.addMaint = function(){
  var item = document.getElementById('maint-item').value;
  var desc = document.getElementById('maint-desc').value;
  var date = document.getElementById('maint-date').value;
  var cost = parseInt(document.getElementById('maint-cost').value)||0;
  var tech = document.getElementById('maint-tech').value;
  if(item&&desc&&date){ window.maintenances.push({id:Date.now(),item:item,desc:desc,date:date,cost:cost,tech:tech,status:'progress'}); saveAll(); renderAll(); }
};
window.approveBooking = function(id){
  var b = window.bookings.find(function(x){return x.id===id});
  if(b){b.status='approved'; saveAll(); renderAll();}
};

saveAll();
renderAll();
</script>
