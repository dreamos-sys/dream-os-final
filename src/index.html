<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream OS v21 Pro</title>
  <base href="/">
  <!-- Inline debug script: runs BEFORE modules -->
  <script>
    console.log('🔍 index.html: Inline script executing');
    document.addEventListener('DOMContentLoaded', () => {
      console.log('✅ DOMContentLoaded');
    });
  </script>
</head>
<body style="margin:0;padding:2rem;font-family:system-ui;background:#f0f9ff">
  <!-- Fallback visible content: shows if JS fails -->
  <div id="fallback" style="
    max-width: 600px; margin: 0 auto; padding: 2rem;
    background: white; border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  ">
    <h2>🚀 Dream OS Loading...</h2>
    <p>If you see this message for >3 seconds, JavaScript may not be executing.</p>
    <p style="color:#64748b;font-size:0.875rem">
      Check browser console for errors. Try hard refresh or incognito mode.
    </p>
  </div>
  
  <!-- App mount point -->
  <div id="app"></div>
  
  <!-- Hide fallback after JS loads -->
  <script>
    // Hide fallback once main module starts
    setTimeout(() => {
      const fb = document.getElementById('fallback');
      if (fb) fb.style.display = 'none';
    }, 100);
  </script>
  
  <!-- Main app module -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
