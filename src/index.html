<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b132b">
  <meta name="description" content="Dream OS v2.1 - Smart AI Agent for K3 & Management">
  <title>Dream OS v2.1 | Login</title>
  
  <!-- Fonts: Inter (UI) + Amiri (Arabic Calligraphy) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-deep: #0b132b;
      --bg-mid: #1c2541;
      --primary: #5bc0be;
      --accent: #3a506b;
      --text-main: #f8f9fa;
      --text-muted: #a0aec0;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --blur: blur(20px);
      --radius-lg: 24px;
      --radius-md: 16px;
      --font-ui: 'Inter', system-ui, sans-serif;
      --font-arabic: 'Amiri', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: var(--font-ui);
      background: linear-gradient(135deg, var(--bg-deep), var(--bg-mid));
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Liquid Mesh Background */
    body::before {      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 10% 20%, rgba(91, 192, 190, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
      animation: meshShift 20s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes meshShift {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-glow {
      width: 100px;
      height: 100px;
      margin: 0 auto 1.5rem;
      background: radial-gradient(circle, rgba(91, 192, 190, 0.4), transparent);
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;    }

    .logo-glow::after {
      content: '🏆';
      font-size: 3rem;
      filter: drop-shadow(0 0 15px rgba(91, 192, 190, 0.6));
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      letter-spacing: -0.5px;
    }

    .version { color: var(--primary); }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .arabic-section {
      margin: 1.5rem 0;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .bismillah {
      font-family: var(--font-arabic);
      font-size: 1.8rem;
      color: var(--primary);
      line-height: 1.4;
      margin-bottom: 0.5rem;
    }

    .shalawat {
      font-family: var(--font-arabic);
      font-size: 1.4rem;
      color: var(--text-main);
      line-height: 1.5;    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .input-group {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 3rem 1rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-md);
      color: var(--text-main);
      font-size: 1rem;
      transition: all 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(91, 192, 190, 0.2);
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
    }

    .toggle-password:hover { color: var(--primary); }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 0.75rem;      border-radius: var(--radius-md);
      font-size: 0.875rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .btn-access {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary), #3a506b);
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(91, 192, 190, 0.3);
    }

    .btn-access:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(91, 192, 190, 0.4);
    }

    .btn-access:active { transform: translateY(0); }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; }
      .title { font-size: 1.75rem; }
      .bismillah { font-size: 1.5rem; }
      .shalawat { font-size: 1.2rem; }
    }

    /* Accessibility */    :focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-glow"></div>
      
      <h1 class="title">Dream OS <span class="version">v2.1</span></h1>
      <p class="subtitle">Limited Edition 2026 - Bash Powered</p>
      
      <div class="arabic-section">
        <p class="bismillah" lang="ar" dir="rtl">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</p>
        <p class="shalawat" lang="ar" dir="rtl">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ</p>
      </div>
      
      <form id="loginForm" class="login-form" onsubmit="return false;">
        <div class="input-group">
          <input type="password" id="password" placeholder="Enter access key..." autocomplete="current-password" required>
          <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
        
        <div id="errorMsg" class="error-message">
          <i class="fas fa-times-circle"></i> 
          <span>Kode salah · <span id="attempts">4</span> percobaan tersisa</span>
        </div>
        
        <button type="submit" class="btn-access">
          <i class="fas fa-sign-in-alt"></i> INITIALIZE SYSTEM
        </button>
      </form>
      
      <div class="footer">
        <p>Dream Team © 2026 · Limited Edition</p>
      </div>
    </div>
  </div>

  <script>
    const VALID_PASSWORD = 'Mr.M_Architect_2025';
    let attempts = 4;

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('password');
      const error = document.getElementById('errorMsg');
      const attemptsSpan = document.getElementById('attempts');
      
      if (input.value === VALID_PASSWORD) {
        // Success: Fade out login, load dashboard
        document.querySelector('.login-card').style.opacity = '0';
        document.querySelector('.login-card').style.transform = 'scale(0.95)';
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 400);
      } else {
        attempts--;
        attemptsSpan.textContent = attempts;
        error.style.display = 'flex';
        input.value = '';
        input.focus();
        
        if (attempts === 0) {
          setTimeout(() => {
            alert('🔒 Sistem terkunci. Silakan coba lagi nanti.');
            location.reload();
          }, 500);
        }
      }
    });

    document.getElementById('password').addEventListener('input', function() {
      document.getElementById('errorMsg').style.display = 'none';
    });
  </script>
</body>
</html>
