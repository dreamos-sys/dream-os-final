<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Dream OS v1.0 • Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        spiritual: { 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b' },
                        slate: { 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; background: #020617; }
        .font-arabic { font-family: 'Amiri', serif; }
        .view { display: none; }
        .view.active { display: flex; }
        #auth-view.active { display: flex; }
        
        /* Glassmorphism Optimized */
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Cyber Glow via Pseudo-Element (Efficient) */
        .glow-border { position: relative; }
        .glow-border::after { content:''; position:absolute; inset:-1px; background:linear-gradient(135deg,#fbbf24,#22c55e); border-radius:inherit; z-index:-1; opacity:0.15; transition:opacity 0.2s; }
        .glow-border:active::after { opacity:0.3; }
        
        /* Magnetic Touch Feedback */
        .magnet { transition: transform 0.15s cubic-bezier(0.4,0,0.2,1); }
        .magnet:active { transform: scale(0.96); }        
        #dream-logo { transition: transform 0.1s; }
        #dream-logo:active { transform: scale(0.93); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-slate-200 h-screen overflow-hidden">

    <!-- AUTH SCREEN -->
    <section id="auth-view" class="view active flex-col items-center justify-center h-full p-6 text-center bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950">
        <div id="dream-logo" class="mb-6 cursor-pointer select-none magnet">
            <img src="assets/logo-sultan.png" alt="Dream OS" class="w-28 h-28 rounded-3xl shadow-[0_0_35px_rgba(245,158,11,0.25)] object-cover">
            <p class="text-[10px] text-amber-500 mt-4 font-bold tracking-[0.25em]">DREAM OS <span class="text-emerald-400">v1.0</span></p>
        </div>
        <h1 class="font-arabic text-3xl text-amber-500/90 mb-2">بِسْمِ اللَّهِ</h1>
        <p class="text-[10px] text-emerald-400 mb-8 font-semibold tracking-wide">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
        
        <div class="w-full max-w-xs glass p-6 rounded-3xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6)] glow-border">
            <div class="relative mb-4">
                <input type="password" id="access-key" placeholder="Access Key" 
                    class="w-full px-4 py-3.5 bg-slate-900/70 rounded-2xl border border-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-500/40 text-center tracking-widest pr-12 text-slate-200 placeholder-slate-600 text-sm">
                <button id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-amber-400 p-1">
                    <i data-lucide="eye" class="w-5 h-5" id="eye-off"></i>
                    <i data-lucide="eye-off" class="w-5 h-5 hidden" id="eye-on"></i>
                </button>
            </div>
            <button id="btn-login" class="w-full py-3.5 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white text-xs font-bold uppercase tracking-wider rounded-2xl shadow-[0_12px_24px_-10px_rgba(16,185,129,0.35)] magnet">Access System</button>
            <p class="text-[9px] text-slate-600 mt-4 font-mono">Out of The Box Inside • ISO 27001</p>
        </div>
    </section>

    <!-- MAIN APP -->
    <div id="app-view" class="view flex-col h-full">
        <header class="px-4 py-3 glass border-b border-slate-800/60 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <img src="assets/logo-sultan.png" alt="Dream OS" class="w-9 h-9 rounded-xl shadow-lg object-cover">
                <div>
                    <h1 class="text-sm font-bold text-slate-100 leading-tight">Dream OS</h1>
                    <span class="text-[9px] text-emerald-400 font-mono">v1.0 Genesis</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="role-badge" class="px-2.5 py-0.5 bg-slate-900/80 border border-slate-800 text-[9px] font-bold rounded uppercase tracking-wider text-emerald-400">STAFF</span>
                <button id="btn-logout" class="p-2 text-slate-500 hover:text-red-400 magnet">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto overflow-x-hidden p-3 pb-28 space-y-3 bg-slate-950">            <div class="bg-gradient-to-r from-emerald-600 to-emerald-700 p-4 rounded-2xl text-white shadow-[0_12px_32px_-12px_rgba(16,185,129,0.25)]">
                <p class="text-xs opacity-80">Selamat Pagi, Saudara.</p>
                <h2 class="text-lg font-bold mt-0.5">Siap Melayani.</h2>
            </div>
            <div class="grid grid-cols-3 gap-3" id="staff-grid"></div>
            <div id="view-command" class="hidden space-y-3 mt-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold text-amber-500">Command Center</h2>
                    <span class="text-[9px] bg-slate-900 border border-slate-800 px-2 py-0.5 rounded text-emerald-400 font-mono">AI Active</span>
                </div>
                <div class="grid grid-cols-2 gap-3" id="command-grid"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800/60 flex justify-around items-center h-16 safe-bottom z-50">
            <button class="nav-btn active flex flex-col items-center justify-center gap-1 w-16 h-full text-amber-400" data-target="dashboard">
                <i data-lucide="home" class="w-5 h-5"></i><span class="text-[9px] font-medium tracking-wide">Home</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-500" data-target="profile">
                <i data-lucide="user" class="w-5 h-5"></i><span class="text-[9px] font-medium tracking-wide">User</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-500" data-target="qr">
                <i data-lucide="scan-line" class="w-5 h-5"></i><span class="text-[9px] font-medium tracking-wide">QR</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-500" data-target="info">
                <i data-lucide="info" class="w-5 h-5"></i><span class="text-[9px] font-medium tracking-wide">Info</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-500" data-target="config">
                <i data-lucide="settings" class="w-5 h-5"></i><span class="text-[9px] font-medium tracking-wide">Config</span>
            </button>
        </nav>
    </div>

    <script>
        const state = { role: 'STAFF', ghostTaps: 0, ghostTimer: null };
        const grids = {
            staff: [
                {icon:'calendar',label:'Booking',desc:'Pemesanan'},{icon:'alert-triangle',label:'K3 Form',desc:'Laporan'},
                {icon:'wrench',label:'Maintenance',desc:'Perbaikan'},{icon:'shield',label:'Sekuriti',desc:'Keamanan'},
                {icon:'sparkles',label:'Janitor In',desc:'Indoor'},{icon:'leaf',label:'Janitor Out',desc:'Outdoor'},
                {icon:'package',label:'Stok Alat',desc:'Inventaris'},{icon:'clipboard-list',label:'Laporan',desc:'Harian'},
                {icon:'building-2',label:'Inventaris',desc:'Aset'}
            ],
            command: [
                {icon:'bar-chart-3',label:'Kinerja',desc:'Global'},{icon:'wallet',label:'Keuangan',desc:'SPJ'},
                {icon:'database',label:'Inventaris',desc:'Aset'},{icon:'users',label:'Vendor',desc:'Tracker'},
                {icon:'user-check',label:'SDM',desc:'Tugas'},{icon:'file-text',label:'Laporan',desc:'Bulanan'},
                {icon:'search',label:'Audit',desc:'Trail'},{icon:'sliders',label:'Config',desc:'System'}
            ]
        };        const $=id=>document.getElementById(id);
        const renderGrid=(cid,data)=>{
            const c=$(cid); if(!c)return;
            c.innerHTML=data.map(i=>`<div class="magnet bg-slate-900/70 border border-slate-800 p-3 rounded-2xl flex flex-col items-center justify-center gap-2 min-h-[96px] glow-border" onclick="handleGridClick('${i.label}')"><i data-lucide="${i.icon}" class="w-6 h-6 text-amber-400"></i><span class="text-[10px] font-bold text-slate-300 text-center leading-tight tracking-wide">${i.label}</span><span class="text-[8px] text-slate-500 font-mono">${i.desc}</span></div>`).join('');
            setTimeout(()=>lucide.createIcons(),50);
        };
        const handleGridClick=l=>alert(`🔧 Modul ${l}\n\nReady for v1.1`);
        window.addEventListener('DOMContentLoaded',()=>{
            console.log('✅ Dream OS v1.0 Cyber-Spiritual Initialized');
            renderGrid('staff-grid',grids.staff); renderGrid('command-grid',grids.command);
            const toggle=$('toggle-pw'),eyeOff=$('eye-off'),eyeOn=$('eye-on'),inp=$('access-key');
            toggle.onclick=()=>{const p=inp.type==='password'; inp.type=p?'text':'password'; eyeOff.classList.toggle('hidden',!p); eyeOn.classList.toggle('hidden',p);};
            $('btn-login').onclick=()=>{const k=$('access-key').value; if(!k)return alert('Masukkan Access Key!'); state.role=k.includes('admin')||k.includes('kepala')?'KEPALA_BAGIAN':'STAFF'; $('role-badge').textContent=state.role.replace('_',' '); $('auth-view').classList.remove('active'); $('app-view').classList.add('active'); if(state.role==='KEPALA_BAGIAN')$('view-command').classList.remove('hidden'); setTimeout(()=>lucide.createIcons(),50);};
            $('btn-logout').onclick=()=>{$('app-view').classList.remove('active'); $('auth-view').classList.add('active'); $('access-key').value=''; state.role='STAFF';};
            document.querySelectorAll('.nav-btn').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.nav-btn').forEach(x=>{x.classList.remove('active','text-amber-400');x.classList.add('text-slate-500');}); b.classList.add('active','text-amber-400'); b.classList.remove('text-slate-500'); const t=b.dataset.target; if(t==='dashboard')$('view-command').classList.add('hidden'); else if(t==='config'&&state.role==='KEPALA_BAGIAN')$('view-command').classList.remove('hidden'); else alert(`📱 ${t.toUpperCase()}\nReady for v1.1`);};});
            $('dream-logo').addEventListener('pointerdown',()=>{state.ghostTaps++; $('dream-logo').style.transform=`scale(${1-state.ghostTaps*0.03})`; if(state.ghostTaps===1)state.ghostTimer=setTimeout(()=>{state.ghostTaps=0; $('dream-logo').style.transform='scale(1)';},2000); if(state.ghostTaps>=7){clearTimeout(state.ghostTimer); state.ghostTaps=0; $('dream-logo').style.transform='scale(1)'; alert('👻 GHOST PROTOCOL ACTIVATED\n\nStealth Mode, OSINT & Fingerprint Ready.');};});
            lucide.createIcons();
        });
    </script>
</body>
</html>
