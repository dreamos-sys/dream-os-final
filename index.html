<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS Sovereign</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Reem+Kufi+Fun:wght@400..700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --gold: #d97706; --bg: #fcfdfd; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; overflow: hidden; color: var(--text); 
        }

        /* 🎨 THE STANDARD BACKGROUND: Ghaib Nano-Pattern + Mesh Glow */
        .batik-overlay {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            /* Layer 1: Soft Mesh Glow */
            background: radial-gradient(circle at 50% -20%, rgba(16, 185, 129, 0.08), transparent),
                        radial-gradient(circle at 0% 100%, rgba(217, 119, 6, 0.05), transparent);
        }
        
        /* Layer 2: Nano-Pattern (Kecil, Smart, Ghaib) - Low Contrast */
        .batik-overlay::after {
            content: ""; position: absolute; inset: 0; opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2310b981' fill-opacity='0.4' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='1'/%3E%3Cpath d='M10 10l2-2-2-2-2 2z'/%3E%3C/g%3E%3C/svg%3E");
            mask-image: radial-gradient(circle, black, transparent 80%);
        }

        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 15px; }
        .active { display: flex !important; }

        /* 👁️ Login Area */
        .card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            padding: 35px 25px; border-radius: 40px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.03); 
            text-align: center; width: 100%; max-width: 340px; 
            margin-top: 12vh; border: 1px solid rgba(255,255,255,0.8); 
        }
        .bismillah-static { font-family: 'Reem Kufi Fun', sans-serif; font-size: 1.6rem; color: var(--gold); font-weight: 700; margin-bottom: 15px; }

        /* 🏛️ Dashboard Header */
        .header-container { display: flex; align-items: center; width: 100%; padding: 10px 5px; }
        .header-logo { width: 55px; height: 55px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.05)); }
        .header-text { flex: 1; text-align: center; margin-right: 55px; }

        .bismillah-dashboard { font-family: 'Reem Kufi Fun', sans-serif; font-size: 1.5rem; color: var(--gold); font-weight: 700; }
        /* Shalawat font & color consistent with v2.1.7 */
        .shalawat-dashboard { font-family: 'Amiri', serif; font-size: 0.9rem; color: var(--emerald); font-weight: 600; line-height: 1.4; margin-top: 4px; }
        /* Verbatim Jikir badge consistent with v2.1.7 */
        .zikir-badge { font-size: 0.6rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-top: 6px; letter-spacing: 1px; background: #f1f5f9; padding: 2px 10px; border-radius: 20px; display: inline-block; }

        /* 7 Slide Carousel (Accepted) */
        .carousel { 
            width: 100%; height: 110px; 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(5px);
            border-radius: 28px; margin: 15px 0; 
            border: 1px solid rgba(16, 185, 129, 0.1); 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }
        .slide { display: none; padding: 15px; text-align: center; font-size: 0.82rem; font-weight: 600; animation: fadeIn 0.8s; }
        .slide.active { display: block; }

        /* 9 Grid */
        .grid-9 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .mod { 
            background: #fff; padding: 18px 5px; border-radius: 26px; text-align: center; 
            border: 1px solid #f1f5f9; box-shadow: 0 8px 20px rgba(0,0,0,0.02); 
            transition: 0.3s;
        }
        .mod:active { transform: scale(0.9); background: #f0fdf4; }
        .mod i { font-size: 1.6rem; color: var(--emerald); margin-bottom: 7px; display: block; }
        .mod span { font-size: 0.6rem; font-weight: 800; color: #475569; text-transform: uppercase; }

        /* 5 Nav */
        .nav-5 { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #f1f5f9; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #cbd5e1; font-size: 1.3rem; }
        .nav-item.active { color: var(--emerald); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="batik-overlay"></div>

    <section id="login-screen" class="screen active">
        <div class="card">
            <img src="logo-sultan.png" width="85" style="margin-bottom:15px">
            <div class="bismillah-static">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div style="position:relative; width:100%; margin-bottom:20px">
                <input type="password" id="accessKey" placeholder="Access Key" style="width:100%; padding:18px; border-radius:20px; border:2px solid #f1f5f9; outline:none; background:#f8fafc">
                <i class="fas fa-eye" id="togglePass" style="position:absolute; right:18px; top:50%; transform:translateY(-50%); color:#94a3b8; cursor:pointer"></i>
            </div>
            <button id="loginBtn" style="width:100%; padding:18px; background:var(--emerald); color:white; border:none; border-radius:22px; font-weight:900;">ACCESS SYSTEM</button>
        </div>
    </section>

    <section id="dashboard-screen" class="screen">
        <header class="header-container">
            <img src="logo-sultan.png" class="header-logo">
            <div class="header-text">
                <div class="bismillah-dashboard">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
                <div class="shalawat-dashboard">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ</div>
                <div id="zikir-dynamic" class="zikir-badge">ZIKIR: (AS SAMEE')</div>
            </div>
        </header>

        <div class="carousel" id="carousel-box"></div>

        <div class="grid-9">
            <div class="mod"><i class="fas fa-desktop"></i><span>CMD CENTER</span></div>
            <div class="mod"><i class="fas fa-calendar-check"></i><span>BOOKING</span></div>
            <div class="mod"><i class="fas fa-biohazard"></i><span>K3 FORM</span></div>
            <div class="mod"><i class="fas fa-user-shield"></i><span>SEKURITI</span></div>
            <div class="mod"><i class="fas fa-pump-soap"></i><span>JAN INDOOR</span></div>
            <div class="mod"><i class="fas fa-leaf"></i><span>JAN OUTDOOR</span></div>
            <div class="mod"><i class="fas fa-box-open"></i><span>STOK ALAT</span></div>
            <div class="mod"><i class="fas fa-wrench"></i><span>MAINTENANCE</span></div>
            <div class="mod"><i class="fas fa-warehouse"></i><span>INVENTARIS</span></div>
        </div>

        <nav class="nav-5">
            <div class="nav-item active"><i class="fas fa-home"></i></div>
            <div class="nav-item"><i class="fas fa-user"></i></div>
            <div class="nav-item"><i class="fas fa-qrcode" style="font-size:1.8rem; color:var(--emerald)"></i></div>
            <div class="nav-item"><i class="fas fa-info-circle"></i></div>
            <div class="nav-item"><i class="fas fa-cog"></i></div>
        </nav>
    </section>

    <script type="module" src="src/main.js"></script>
</body>
</html>
