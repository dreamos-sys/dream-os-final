<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Dream OS • Nano Quantum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        teal: { 400: '#2dd4bf', 500: '#14b8a6' },
                        emerald: { 400: '#34d399', 500: '#10b981' },
                        ghost: { 400: '#a78bfa', 500: '#8b5cf6' }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; background: #020617; }
        .font-arabic { font-family: 'Amiri', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .view { display: none; }
        .view.active { display: flex; }
        #auth-view.active { display: flex; }
        .glass-nano { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.04); }
        .glow-border { position: relative; }
        .glow-border::after { content:''; position:absolute; inset:-1px; background:linear-gradient(135deg, #14b8a6, #34d399); border-radius:inherit; z-index:-1; opacity:0.15; }
        .magnet { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .magnet:active { transform: scale(0.95); }
        #dream-logo { transition: transform 0.1s; cursor: pointer; }
        #dream-logo:active { transform: scale(0.92); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        .ghost-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(16px); z-index: 1000; display: none; flex-direction: column; }
        .ghost-overlay.active { display: flex; }
    </style>
</head>
<body class="text-slate-200 h-screen overflow-hidden flex flex-col bg-slate-950">

    <section id="auth-view" class="view active flex-col items-center justify-center h-full p-6 text-center">
        <div id="dream-logo" class="mb-6 select-none magnet flex flex-col items-center">
            <img src="assets/logo-sultan.png" alt="Dream OS" class="w-28 h-28 rounded-3xl shadow-[0_0_25px_rgba(45,212,191,0.2)] object-cover mb-4">
            <p class="text-[9px] text-teal-400 font-mono tracking-[0.25em]">DREAM OS <span class="text-emerald-400">v1.0</span></p>
        </div>
        
        <div class="mb-6 max-w-xs glass-nano p-4 rounded-2xl glow-border">
            <h1 class="font-arabic text-xl text-teal-400/90 mb-1">بِسْمِ اللَّهِ</h1>
            <p class="font-arabic text-[10px] text-emerald-400 mb-1">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
            <p class="text-[8px] text-slate-500 font-mono uppercase tracking-widest">The Power Soul of Shalawat</p>
        </div>
        
        <div class="glass-nano p-5 rounded-2xl w-full max-w-xs shadow-2xl border border-white/5">
            <div class="relative mb-4">
                <input type="password" id="access-key" placeholder="Access Key" 
                    class="w-full px-4 py-2.5 bg-slate-900/80 text-xs text-center tracking-widest rounded-xl border border-slate-800 focus:outline-none focus:ring-1 focus:ring-teal-400 text-slate-200 placeholder-slate-600">
                <button id="toggle-pw" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-teal-400 p-1 z-20">
                    <i data-lucide="eye" class="w-4 h-4" id="eye-off"></i>
                    <i data-lucide="eye-off" class="w-4 h-4 hidden" id="eye-on"></i>
                </button>
            </div>
            <button id="btn-login" class="w-full py-3 bg-gradient-to-r from-teal-600 to-emerald-600 text-white text-xs font-bold uppercase tracking-wider rounded-xl shadow-lg shadow-emerald-500/20 magnet">ACCESS SYSTEM</button>
        </div>
    </section>

    <div id="app-view" class="view flex-col h-full flex-1">
        <header id="app-header" class="hidden px-4 py-3 glass-nano border-b border-white/5 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <img src="assets/logo-sultan.png" alt="Dream OS" class="w-8 h-8 rounded-xl shadow-lg object-cover">
                <div>
                    <h1 class="text-xs font-bold text-slate-100 leading-tight">Dream OS</h1>
                    <span class="text-[9px] text-teal-400 font-mono">Nano-Quantum</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <span id="role-badge" class="px-2 py-0.5 bg-slate-900 border border-slate-800 text-[8px] font-bold uppercase tracking-wider text-teal-400">STAFF</span>
                <button id="btn-logout" class="p-2 text-slate-500 hover:text-red-400 magnet">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-24 space-y-4 bg-slate-950">
            <div id="view-home" class="view-section active space-y-4">
                <div id="carousel-container" class="glass-nano p-4 rounded-xl hidden">
                    <div id="carousel-slides"></div>
                    <div class="flex justify-center gap-2 mt-3" id="carousel-dots"></div>
                </div>
                <div id="staff-grid" class="grid grid-cols-3 gap-3 hidden"></div>
            </div>

            <div id="view-command" class="view-section hidden space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-bold text-teal-400">Command Center</h2>
                    <span class="text-[8px] bg-slate-900 px-2 py-0.5 rounded text-emerald-400 font-mono">AI Active</span>
                </div>
                <div class="glass-nano p-2 rounded-lg border border-slate-900">
                    <input type="text" placeholder="Cari data..." class="w-full bg-transparent text-xs text-slate-300 focus:outline-none placeholder-slate-700">
                </div>
                <div id="command-results" class="hidden space-y-1"></div>
                <div id="command-grid" class="grid grid-cols-2 gap-2"></div>
            </div>

            <div id="view-user" class="view-section hidden space-y-3">
                <div class="glass-nano p-6 rounded-xl text-center">
                    <h3 class="text-xs font-bold text-white mb-1">User Profile</h3>
                    <p class="text-[8px] text-teal-400 mb-3">Role: <span id="profile-role">STAFF</span></p>
                    <button id="btn-logout-profile" class="w-full py-2 bg-red-600/30 border border-red-500/20 text-[10px] font-bold rounded-lg magnet">Logout</button>
                </div>
            </div>
            
            <div id="view-qr" class="view-section hidden space-y-3">
                <div class="glass-nano p-6 rounded-xl text-center">
                    <h3 class="text-xs font-bold text-white mb-2">Smart Scanner</h3>
                    <button onclick="alert('Camera Ready')" class="w-full py-2 bg-gradient-to-r from-teal-500 to-emerald-500 text-[10px] font-bold rounded-lg text-white">Open Scanner</button>
                </div>
            </div>

            <div id="view-info" class="view-section hidden space-y-3">
                <div class="glass-nano p-6 rounded-xl text-center">
                    <h3 class="text-xs font-bold text-teal-400">Dream OS</h3>
                    <p class="text-[8px] text-slate-500 mt-1">Nano Quantum Architecture</p>
                </div>
            </div>

            <div id="view-config" class="view-section hidden space-y-3">
                <div class="glass-nano p-4 rounded-xl">
                    <h3 class="text-xs font-bold text-teal-400 mb-2">Settings</h3>
                </div>
            </div>
        </main>

        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass-nano border-t border-white/5 flex justify-around items-center h-14 safe-bottom z-40 hidden">
            <button class="nav-btn active flex flex-col items-center justify-center gap-0.5 w-full h-full text-teal-400" data-target="home">
                <i data-lucide="home" class="w-4 h-4"></i><span class="text-[8px]">HOME</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-0.5 w-full h-full text-slate-500" data-target="user">
                <i data-lucide="user" class="w-4 h-4"></i><span class="text-[8px]">USER</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-0.5 w-full h-full text-slate-500" data-target="qr">
                <i data-lucide="scan-line" class="w-4 h-4"></i><span class="text-[8px]">MENU</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-0.5 w-full h-full text-slate-500" data-target="info">
                <i data-lucide="info" class="w-4 h-4"></i><span class="text-[8px]">INFO</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-0.5 w-full h-full text-slate-500" data-target="config">
                <i data-lucide="settings" class="w-4 h-4"></i><span class="text-[8px]">CONFIG</span>
            </button>
        </nav>
    </div>

    <div id="ghost-overlay" class="ghost-overlay">
        <div class="p-3 border-b border-white/5 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="ghost" class="w-4 h-4 text-ghost-400"></i>
                <span class="text-xs font-bold text-ghost-400">GHOST MONITORING</span>
            </div>
            <button id="ghost-close" class="p-1 text-slate-400 hover:text-white">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="p-4 grid grid-cols-2 gap-3" id="ghost-tools"></div>
        <div class="p-3 border-t border-white/5 text-center">
            <p class="text-[8px] text-slate-600 font-mono">
                <span id="ghost-status">● Termux Ready</span> • Audit: <span id="ghost-audit">0</span>
            </p>
        </div>
    </div>

    <script>
        const state = { role: 'STAFF', ghostTaps: 0, ghostTimer: null, audit: 0 };
        
        const carousel = {
            slides: [
                { icon: 'hand', title: 'Selamat Datang', content: '<p class="text-[10px] text-slate-400">Sistem siap beroperasi, Bi idznillah.</p>' },
                { icon: 'calendar', title: 'Jadwal Booking', content: '<p class="text-[10px] text-slate-400">Rapat & Koordinasi</p>' }
            ],
            init() {
                const s = document.getElementById('carousel-slides');
                const d = document.getElementById('carousel-dots');
                if(!s) return;
                s.innerHTML = this.slides.map((e, i) => `
                    <div class="carousel-slide ${i===0?'active':''}">
                        <div class="flex items-center gap-2 mb-1">
                            <i data-lucide="${e.icon}" class="w-4 h-4 text-teal-400"></i>
                            <span class="text-xs font-bold text-teal-400">${e.title}</span>
                        </div>
                        ${e.content}
                    </div>`).join('');
                d.innerHTML = this.slides.map((_, i) => `<div class="dot ${i===0?'active':''}"></div>`).join('');
                document.getElementById('carousel-container').classList.remove('hidden');
                lucide.createIcons();
            }
        };

        const grid = [
            {icon: 'calendar', name: 'Booking', desc: 'Pemesanan'},
            {icon: 'alert-triangle', name: 'K3 Form', desc: 'Laporan'},
            {icon: 'wrench', name: 'Maint', desc: 'Perbaikan'}
        ];

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('toggle-pw').onclick = () => {
                const i = document.getElementById('access-key');
                const p = i.type === 'password';
                i.type = p ? 'text' : 'password';
                document.getElementById('eye-off').classList.toggle('hidden', !p);
                document.getElementById('eye-on').classList.toggle('hidden', p);
            };

            document.getElementById('btn-login').onclick = () => {
                const key = document.getElementById('access-key').value;
                if(!key) return alert('Masukkan Access Key!');

                state.role = key.includes('admin') ? 'KEPALA_BAGIAN' : 'STAFF';
                document.getElementById('role-badge').textContent = state.role.replace('_', ' ');
                document.getElementById('profile-role').textContent = state.role.replace('_', ' ');

                document.getElementById('auth-view').classList.remove('active');
                document.getElementById('app-view').classList.add('active');
                
                document.getElementById('app-header').style.display = 'flex';
                document.getElementById('app-header').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('staff-grid').classList.remove('hidden');

                document.getElementById('staff-grid').innerHTML = grid.map(item => `
                    <div class="glass-nano border border-slate-800 p-3 rounded-xl flex flex-col items-center justify-center gap-2 cursor-pointer magnet" onclick="alert('Modul ${item.name}')">
                        <i data-lucide="${item.icon}" class="w-5 h-5 text-teal-400"></i>
                        <span class="text-[9px] font-semibold text-slate-300">${item.name}</span>
                        <span class="text-[8px] text-slate-500 font-mono">${item.desc}</span>
                    </div>
                `).join('');

                carousel.init();
                lucide.createIcons();
            };

            const logout = () => {
                document.getElementById('app-view').classList.remove('active');
                document.getElementById('auth-view').classList.add('active');
                document.getElementById('access-key').value = '';
            };
            document.getElementById('btn-logout').onclick = logout;
            document.getElementById('btn-logout-profile').onclick = logout;

            document.querySelectorAll('.nav-btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('.nav-btn').forEach(x => {
                        x.classList.remove('active', 'text-teal-400');
                        x.classList.add('text-slate-500');
                    });
                    b.classList.add('active', 'text-teal-400');
                    const target = b.getAttribute('data-target');
                    document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
                    document.getElementById('view-' + target).classList.remove('hidden');
                };
            });

            // GHOST MODE 7x Tap
            document.getElementById('dream-logo').addEventListener('pointerdown', () => {
                state.ghostTaps++;
                if(state.ghostTaps === 1) state.ghostTimer = setTimeout(() => state.ghostTaps = 0, 2000);
                if(state.ghostTaps >= 7) {
                    clearTimeout(state.ghostTimer);
                    state.ghostTaps = 0;
                    document.getElementById('ghost-overlay').classList.add('active');
                    
                    document.getElementById('ghost-tools').innerHTML = `
                        <div class="glass-nano p-3 rounded-xl border-ghost-500/20 border">
                            <i data-lucide="radar" class="w-4 h-4 text-ghost-400 mb-1"></i>
                            <p class="text-[10px] font-bold">Nmap Scanner</p>
                            <p class="text-[8px] text-slate-500">Scan Port</p>
                            <button class="w-full text-[9px] bg-ghost-500/20 py-1 px-2 rounded mt-2 border border-ghost-400/30" onclick="navigator.clipboard.writeText('nmap -sV 127.0.0.1'); alert('Copied')">Copy Command</button>
                        </div>
                    `;
                    lucide.createIcons();
                }
            });

            document.getElementById('ghost-close').onclick = () => {
                document.getElementById('ghost-overlay').classList.remove('active');
            };

            lucide.createIcons();
        });
    </script>
</body>
</html>
