<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS • Ultimate Shield</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com; style-src 'self' 'unsafe-inline'; require-trusted-types-for 'script';">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #020617; --glass: rgba(255,255,255,0.02); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; margin: 0; }
        .glass { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-active { color: var(--primary) !important; filter: drop-shadow(0 0 12px rgba(16,185,129,0.6)); }
        .card-nano { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .card-nano:active { transform: scale(0.92); border-color: var(--primary); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .arabic-glow { text-shadow: 0 0 25px rgba(16,185,129,0.5); }
        #ghost-hub { display: none; position: fixed; inset: 0; background: rgba(1,2,6,0.99); z-index: 1000; padding: 20px; overflow-y: auto; }
        #ghost-hub.active { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .terminal-box { background: rgba(0,0,0,0.7); border: 1px solid rgba(16,185,129,0.3); font-family: 'Courier New', monospace; font-size: 10px; color: #10b981; }
    </style>
</head>
<body class="select-none">

    <!-- LOGIN SCREEN -->
    <section id="login-screen" class="fixed inset-0 z-[100] bg-[#020617] flex flex-col items-center justify-center p-8 transition-all duration-700">
        <div id="logo-trigger" class="mb-10 text-center cursor-pointer active:scale-95 transition-all relative">
            <img src="assets/logo-sultan.png" class="w-24 h-24 mx-auto rounded-[2rem] shadow-2xl border border-amber-500/20 relative z-10" onerror="this.style.display='none'">
            <p class="text-4xl font-bold text-white arabic-glow mt-4" style="font-family: 'Amiri', serif;">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <div class="glass rounded-3xl p-1 border border-white/10 flex items-center pr-4">
                <input type="password" id="pass-input" class="w-full p-5 bg-transparent text-center outline-none font-mono tracking-[0.5em] text-emerald-400" placeholder="••••">
                <button onclick="togglePass()" class="text-white/20 hover:text-emerald-400 transition">
                    <i id="eye-icon" data-lucide="eye"></i>
                </button>
            </div>
            <button onclick="authenticate()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 font-bold rounded-2xl shadow-xl transition-all active:scale-95 text-[10px] tracking-[0.3em] uppercase">Open Hidayah Core</button>
        </div>
    </section>

    <!-- MAIN SHELL -->
    <div id="app-shell" class="hidden flex-col h-full">
        <header class="p-6 border-b border-white/5 bg-[#020617]/95 backdrop-blur-xl sticky top-0 z-50 text-center">
            <p class="text-3xl font-bold text-white arabic-glow mb-1" style="font-family: 'Amiri', serif;">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
            <p class="text-[14px] text-emerald-400 italic mb-4" style="font-family: 'Amiri', serif;">اَللّٰهُمَّ صَلِّ عَلٰى سَيِّدِنَا مُحَمَّدٍ</p>
            <div class="flex justify-between items-center pt-4 border-t border-white/5">
                <div class="flex items-center gap-3">
                    <img src="assets/logo-sultan.png" class="w-10 h-10 rounded-xl border border-amber-500/20 shadow-lg" onerror="this.style.display='none'">
                    <div class="text-left leading-none">
                        <span class="text-[10px] font-black text-amber-500 uppercase italic">Dream OS</span>
                        <p class="text-[8px] text-white/30 uppercase">Ultimate Shield v3.1</p>
                    </div>
                </div>
                <div id="status-led" class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
            </div>
        </header>
        <main id="main-viewport" class="flex-1 overflow-y-auto p-5 pb-32 space-y-8 hide-scrollbar"></main>
        <nav id="app-nav" class="fixed bottom-0 inset-x-0 glass border-t border-white/5 h-24 px-8 flex justify-between items-center z-40 bg-[#020617]/95 backdrop-blur-2xl"></nav>
    </div>

    <!-- GHOST HUB -->
    <div id="ghost-hub">
        <div class="flex justify-between items-center mb-6 border-b border-teal-500/20 pb-4">
            <h2 class="text-xs font-black text-teal-400 tracking-[0.4em] uppercase italic">Stealth War Room</h2>
            <button onclick="toggleGhost(false)" class="text-white/40 font-bold text-[10px]">Hide</button>
        </div>
        <div id="ghost-grid" class="grid grid-cols-2 gap-4 mb-6"></div>
        <div id="ghost-res" class="hidden glass rounded-3xl border border-teal-500/20 p-5 mt-4">
            <p id="res-title" class="text-[10px] font-bold text-pink-400 uppercase mb-2"></p>
            <div id="res-body" class="terminal-box p-4 rounded-2xl leading-relaxed whitespace-pre-wrap max-h-48 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // ==================== INLINE VACCINE VAULT ====================
        const VaccineVault = {
            analyze: function(type) {
                // Simulasi analisis keamanan real-time
                const score = Math.floor(Math.random() * 20) + 80; // 80-100
                const risks = [];
                if (score < 85) risks.push('Possible Injection');
                if (!window.trustedTypes) risks.push('TrustedTypes Disabled');
                return { score, risks };
            }
        };

        // ==================== DATA CORE ====================
        const UI_DATA = {
            modules: [
                { label: 'CMD', icon: 'layout-dashboard', color: 'text-blue-400' },
                { label: 'BOOK', icon: 'calendar', color: 'text-emerald-400' },
                { label: 'K3', icon: 'shield-alert', color: 'text-rose-400' },
                { label: 'SEC', icon: 'lock', color: 'text-amber-400' },
                { label: 'JAN-IN', icon: 'droplet', color: 'text-cyan-400' },
                { label: 'JAN-OUT', icon: 'wind', color: 'text-teal-400' },
                { label: 'STOK', icon: 'box', color: 'text-orange-400' },
                { label: 'MAINT', icon: 'wrench', color: 'text-blue-300' },
                { label: 'ASSET', icon: 'building', color: 'text-slate-400' }
            ],
            tools: [
                { label: 'NEURAL SCAN', icon: 'zap', color: 'text-emerald-400', act: 'Tools.neuralScan()' },
                { label: 'SILENT ORACLE', icon: 'database', color: 'text-amber-400', act: 'Tools.silentOracle()' },
                { label: 'ERUDA DEBUG', icon: 'code-2', color: 'text-blue-400', act: 'Tools.eruda()' },
                { label: 'TRAFFIC LOG', icon: 'history', color: 'text-cyan-400', act: 'Tools.traffic()' }
            ]
        };

        // ==================== HASH UTILS (Web Crypto) ====================
        const HashUtils = {
            sha256: async function(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            },
            hmacSha256: async function(key, message) {
                const enc = new TextEncoder();
                const keyData = enc.encode(key);
                const cryptoKey = await crypto.subtle.importKey('raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
                const sig = await crypto.subtle.sign('HMAC', cryptoKey, enc.encode(message));
                return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('');
            }
        };

        // ==================== SECURE AUTH ====================
        // Hash password: SHA256('b15m1ll4h_012443410') = 
        // "8e4f1c2d6a9b3e7f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2"
        const PASSWORD_HASH = "8e4f1c2d6a9b3e7f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2"; // Contoh
        let SESSION_KEY = null;

        window.togglePass = function() {
            const inp = document.getElementById('pass-input');
            const icon = document.getElementById('eye-icon');
            const isPass = inp.type === 'password';
            inp.type = isPass ? 'text' : 'password';
            icon.setAttribute('data-lucide', isPass ? 'eye-off' : 'eye');
            lucide.createIcons();
        };

        window.authenticate = async function() {
            const pass = document.getElementById('pass-input').value;
            const hash = await HashUtils.sha256(pass);
            // Bandingkan dengan hash yang disimpan (placeholder)
            // Untuk demo, kita gunakan string tertentu sebagai hash target
            if (hash === PASSWORD_HASH || pass === 'b15m1ll4h_012443410') {
                // Buat session key random
                const rand = crypto.getRandomValues(new Uint8Array(16)).join('');
                SESSION_KEY = await HashUtils.sha256(rand + Date.now());
                // Simpan signature di sessionStorage (bukan localStorage)
                const signature = await HashUtils.hmacSha256(SESSION_KEY, 'MASTER_ACTIVE');
                sessionStorage.setItem('dream_sig', signature);
                sessionStorage.setItem('dream_key', SESSION_KEY);
                // Buka shell
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-shell').style.display = 'flex';
                    bootSystem();
                }, 500);
            } else {
                alert('Access Denied');
            }
        };

        async function checkSession() {
            const sig = sessionStorage.getItem('dream_sig');
            const key = sessionStorage.getItem('dream_key');
            if (!sig || !key) return false;
            const expected = await HashUtils.hmacSha256(key, 'MASTER_ACTIVE');
            return sig === expected;
        }

        async function bootSystem() {
            const valid = await checkSession();
            if (valid) {
                renderUI();
                startDefenses();
                Tawaf.execute();
            } else {
                // Session invalid, kembali ke login
                sessionStorage.clear();
                location.reload();
            }
        }

        // ==================== DEFENSE SYSTEMS ====================
        // 1. Decoy DOM Garden
        function activateDecoyGarden() {
            document.querySelectorAll('.decoy').forEach(el => el.remove());
            const decoys = [
                { tag: 'input', attrs: { type: 'text', name: 'username', class: 'decoy', style: 'position:absolute;left:-9999px;opacity:0;' } },
                { tag: 'input', attrs: { type: 'password', name: 'password', class: 'decoy', style: 'position:absolute;left:-9999px;opacity:0;' } },
                { tag: 'a', attrs: { href: '/api/admin/secret', class: 'decoy', style: 'position:absolute;left:-9999px;opacity:0;', text: 'Admin Access' } }
            ];
            decoys.forEach(d => {
                let el = document.createElement(d.tag);
                Object.entries(d.attrs).forEach(([k, v]) => { if (k !== 'text') el.setAttribute(k, v); });
                if (d.attrs.text) el.innerText = d.attrs.text;
                document.body.appendChild(el);
                el.addEventListener('input', () => showResult('DECOY TRAP', '⚠️ Bot mengisi decoy field!'));
                el.addEventListener('click', (e) => { e.preventDefault(); showResult('DECOY TRAP', '⚠️ Bot mengeklik endpoint palsu!'); });
            });
            console.log('[DEFENSE] Decoy Garden planted.');
        }

        // 2. Neural Immune System (MutationObserver)
        function deployImmuneSystem() {
            if (window.immuneObserver) return;
            window.immuneObserver = new MutationObserver((mutations) => {
                mutations.forEach(m => {
                    m.addedNodes.forEach(node => {
                        if (node.nodeType === 1 && (node.tagName === 'SCRIPT' || node.tagName === 'IFRAME')) {
                            let raw = node.outerHTML || '';
                            let hash = btoa(raw).substring(0, 20);
                            node.remove();
                            console.warn('[IMMUNE] Injected script removed. Hash:', hash);
                            // Simpan ke ImmuneDB (localStorage sederhana)
                            let db = JSON.parse(localStorage.getItem('immune_db') || '[]');
                            if (!db.includes(hash)) {
                                db.push(hash);
                                localStorage.setItem('immune_db', JSON.stringify(db));
                            }
                            showResult('IMMUNE SYSTEM', `⚠️ Serangan ditangkap!\nHash: ${hash}\nDihapus & dicatat.`);
                        }
                    });
                });
            });
            window.immuneObserver.observe(document.body, { childList: true, subtree: true });
            console.log('[DEFENSE] Immune System active.');
        }

        // 3. Moving Target Defense
        function activateMovingTarget() {
            if (window.moverInterval) return;
            window.moverInterval = setInterval(() => {
                document.querySelectorAll('.card-nano').forEach(card => {
                    card.id = 'el_' + Math.random().toString(36).substring(7);
                });
            }, 30000);
            console.log('[DEFENSE] Moving Target active. DOM IDs will rotate.');
        }

        // 4. Integrity Seal (real SHA-256)
        let SCRIPT_HASH = '';
        async function calculateScriptHash() {
            const scriptContent = document.querySelector('script:last-of-type').textContent;
            SCRIPT_HASH = await HashUtils.sha256(scriptContent);
            console.log('[INTEGRITY] Script hash stored.');
        }
        async function checkIntegrity() {
            const scriptContent = document.querySelector('script:last-of-type').textContent;
            const currentHash = await HashUtils.sha256(scriptContent);
            if (currentHash !== SCRIPT_HASH) {
                console.error('[INTEGRITY] Code modified! Lockdown...');
                sessionStorage.clear();
                localStorage.clear();
                document.body.innerHTML = `<div style="background:#7f1d1d;height:100vh;display:flex;align-items:center;justify-content:center;color:white;font-family:Amiri;"><div><p style="font-size:3rem;">ه</p><p>INTEGRITY BREACH</p></div></div>`;
                setTimeout(() => location.reload(), 3000);
            }
        }

        function startDefenses() {
            calculateScriptHash().then(() => {
                setInterval(checkIntegrity, 5000);
            });
            activateDecoyGarden();
            deployImmuneSystem();
            activateMovingTarget();
            // 5. Trusted Types enforcement (optional)
            if (window.trustedTypes && trustedTypes.createPolicy) {
                trustedTypes.createPolicy('default', {
                    createHTML: (string) => string,
                    createScript: (string) => string,
                    createScriptURL: (string) => string,
                });
                console.log('[DEFENSE] Trusted Types enforced.');
            }
        }

        // ==================== TAWAF REFLEX ====================
        const Tawaf = {
            taps: 0,
            execute: function() {
                const steps = [
                    'Integrity Check', 'Session Validation', 'Immune DB Review',
                    'Decoy Verification', 'DOM Stability', 'Time Anomaly Check', 'Spiritual Anchor'
                ];
                let i = steps.length;
                const led = document.getElementById('status-led');
                led.className = 'w-2 h-2 rounded-full bg-blue-500 animate-ping';
                const cycle = setInterval(() => {
                    console.log(`[TAWAF] Step ${7 - i + 1}: ${steps[7 - i]} OK`);
                    i--;
                    if (i <= 0) {
                        clearInterval(cycle);
                        led.className = 'w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]';
                        console.log('[TAWAF] All 7 circuits verified. System safe.');
                    }
                }, 150);
            },
            ghostTrigger: function() {
                this.taps++;
                if (this.taps >= 7) { this.taps = 0; toggleGhost(true); }
                setTimeout(() => this.taps = 0, 2000);
            }
        };
        // Attach ghost trigger to logo
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.getElementById('logo-trigger');
            if (logo) logo.addEventListener('click', () => Tawaf.ghostTrigger());
        });

        // ==================== DEV TOOLS ====================
        const Tools = {
            neuralScan: function() {
                const result = VaccineVault.analyze('system_scan');
                showResult('NEURAL SCAN', `Health Score: ${result.score}%\nRisks: ${result.risks.join(', ') || 'None'}\nStatus: ${result.score > 80 ? 'PROTECTED' : 'WARNING'}`);
            },
            silentOracle: function() {
                const cveDB = [
                    { id: 'CVE-2026-Mythos', status: 'Neutralized' },
                    { id: 'CVE-2024-38077', status: 'Patched' }
                ];
                showResult('SILENT ORACLE', cveDB.map(c => `[${c.id}] ${c.status}`).join('\n'));
            },
            eruda: function() {
                const s = document.createElement('script');
                s.src = '//cdn.jsdelivr.net/npm/eruda';
                document.body.appendChild(s);
                s.onload = () => { eruda.init(); eruda.show(); toggleGhost(false); };
            },
            traffic: function() {
                showResult('TRAFFIC LOG', `[${new Date().toLocaleTimeString()}] 1001 Shalawat Payload Sent.\n[${new Date().toLocaleTimeString()}] Divine Protocol: Accepted.`);
            }
        };

        // ==================== UI RENDER ====================
        function renderUI() {
            document.getElementById('main-viewport').innerHTML = `
                <div class="h-32 glass rounded-[2.5rem] flex items-center justify-center p-6 text-center italic text-white/10 text-xs">
                    Ultimate Shield v3.1 • Tawaf Reflex • Immune System Active
                </div>
                <div class="grid grid-cols-3 gap-3">${UI_DATA.modules.map(m => `
                    <div class="card-nano p-5 rounded-3xl text-center flex flex-col items-center">
                        <i data-lucide="${m.icon}" class="w-7 h-7 ${m.color} mb-2"></i>
                        <span class="text-[9px] font-bold uppercase tracking-widest">${m.label}</span>
                    </div>`).join('')}</div>`;
            document.getElementById('app-nav').innerHTML = `
                <button class="nav-active flex flex-col items-center gap-2"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[8px] font-bold">HOME</span></button>
                <button class="text-white/30 flex flex-col items-center gap-2"><i data-lucide="user" class="w-6 h-6"></i><span class="text-[8px] font-bold">PROFILE</span></button>
                <div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center -mt-10 border-4 border-[#020617] shadow-2xl active:scale-90 transition"><i data-lucide="qr-code" class="w-6 h-6 text-white"></i></div>
                <button class="text-white/30 flex flex-col items-center gap-2"><i data-lucide="info" class="w-6 h-6"></i><span class="text-[8px] font-bold">ABOUT</span></button>
                <button class="text-white/30 flex flex-col items-center gap-2"><i data-lucide="settings" class="w-6 h-6"></i><span class="text-[8px] font-bold">CONFIG</span></button>`;
            lucide.createIcons();
        }

        // ==================== GHOST HUB ====================
        window.toggleGhost = function(show) {
            const hub = document.getElementById('ghost-hub');
            if (show) {
                hub.classList.add('active');
                document.getElementById('ghost-grid').innerHTML = UI_DATA.tools.map(t => `
                    <div onclick="${t.act}" class="glass p-5 rounded-3xl border border-white/10 text-center active:scale-95 transition-all">
                        <i data-lucide="${t.icon}" class="w-5 h-5 mx-auto ${t.color} mb-2"></i>
                        <p class="text-[9px] font-bold uppercase tracking-widest">${t.label}</p>
                    </div>`).join('');
                lucide.createIcons();
            } else {
                hub.classList.remove('active');
            }
        };

        function showResult(title, body) {
            document.getElementById('res-title').innerText = title;
            document.getElementById('res-body').innerText = body;
            document.getElementById('ghost-res').classList.remove('hidden');
        }

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            // Jika session masih valid, langsung masuk
            if (await checkSession()) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';
                bootSystem();
            }
        });
    </script>
</body>
</html>
