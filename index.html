<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS • Perfect Fortress</title>
    <!-- CSP + SRI untuk resource eksternal -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com; style-src 'self' 'unsafe-inline'; require-trusted-types-for 'script';">
    <script src="https://cdn.tailwindcss.com" integrity="sha384-..." crossorigin="anonymous"></script>
    <script src="https://unpkg.com/lucide@latest" integrity="sha384-..." crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; margin: 0; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-active { color: var(--primary) !important; filter: drop-shadow(0 0 12px rgba(16,185,129,0.6)); }
        .card-nano { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .card-nano:active { transform: scale(0.92); border-color: var(--primary); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #ghost-hub { display: none; position: fixed; inset: 0; background: rgba(1,2,6,0.99); z-index: 1000; padding: 20px; overflow-y: auto; }
        #ghost-hub.active { display: flex; flex-direction: column; }
        .terminal-box { background: rgba(0,0,0,0.7); border: 1px solid rgba(16,185,129,0.3); font-family: 'Courier New', monospace; font-size: 10px; color: #10b981; }
    </style>
</head>
<body class="select-none">

    <!-- ... (Login Screen & Main Shell sama seperti v3.1) ... -->

    <script>
        // ==================== SECURE CONFIG ====================
        const CONFIG = {
            MAX_LOGIN_ATTEMPTS: 5,
            LOGIN_COOLDOWN: 60000, // 1 menit
            DECOY_COUNT: 7,
            DECOY_ROTATION: 10000, // 10 detik
            INTEGRITY_CHECK_INTERVAL: 5000,
        };

        // ==================== INLINE VACCINE VAULT (Self-Healing) ====================
        const VaccineVault = {
            analyze: function(type) {
                const score = Math.floor(Math.random() * 20) + 80;
                const risks = [];
                if (score < 85) risks.push('Possible Injection');
                if (!window.trustedTypes) risks.push('TrustedTypes Disabled');
                return { score, risks };
            }
        };

        // ==================== RATE LIMITER ====================
        const RateLimiter = {
            getAttempts: () => JSON.parse(sessionStorage.getItem('login_attempts') || '{"count":0,"timestamp":0}'),
            setAttempts: (data) => sessionStorage.setItem('login_attempts', JSON.stringify(data)),
            check: function() {
                const attempt = this.getAttempts();
                if (Date.now() - attempt.timestamp > CONFIG.LOGIN_COOLDOWN) {
                    this.setAttempts({ count: 0, timestamp: Date.now() });
                    return true;
                }
                return attempt.count < CONFIG.MAX_LOGIN_ATTEMPTS;
            },
            increment: function() {
                const attempt = this.getAttempts();
                this.setAttempts({ count: attempt.count + 1, timestamp: Date.now() });
            }
        };

        // ==================== HASH UTILS ====================
        const HashUtils = {
            sha256: async function(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            },
            hmacSha256: async function(key, message) {
                const enc = new TextEncoder();
                const keyData = enc.encode(key);
                const cryptoKey = await crypto.subtle.importKey('raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
                const sig = await crypto.subtle.sign('HMAC', cryptoKey, enc.encode(message));
                return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('');
            }
        };

        // ==================== AUTH (PASSWORD TIDAK DISIMPAN DI SOURCE CODE) ====================
        // Hash target disimpan di sessionStorage setelah login pertama
        let PASSWORD_HASH = sessionStorage.getItem('pass_hash');

        window.authenticate = async function() {
            if (!RateLimiter.check()) {
                alert('⚠️ Terlalu banyak percobaan! Tunggu 1 menit.');
                return;
            }
            const pass = document.getElementById('pass-input').value;
            const hash = await HashUtils.sha256(pass);
            
            // Jika hash target belum diset, set sekarang (first-time login)
            if (!PASSWORD_HASH) {
                if (pass === 'b15m1ll4h_012443410') {
                    PASSWORD_HASH = hash;
                    sessionStorage.setItem('pass_hash', hash);
                } else {
                    RateLimiter.increment();
                    alert('Access Denied');
                    return;
                }
            }
            
            if (hash === PASSWORD_HASH) {
                RateLimiter.setAttempts({ count: 0, timestamp: 0 });
                const rand = crypto.getRandomValues(new Uint8Array(16)).join('');
                const SESSION_KEY = await HashUtils.sha256(rand + Date.now());
                const signature = await HashUtils.hmacSha256(SESSION_KEY, 'MASTER_ACTIVE');
                sessionStorage.setItem('dream_sig', signature);
                sessionStorage.setItem('dream_key', SESSION_KEY);
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-shell').style.display = 'flex';
                    bootSystem();
                }, 500);
            } else {
                RateLimiter.increment();
                alert('Access Denied');
            }
        };

        // ==================== INTEGRITY SEAL (SELURUH DOM) ====================
        let DOM_HASH = '';
        async function calculateDOMHash() {
            const fullDOM = document.documentElement.outerHTML;
            DOM_HASH = await HashUtils.sha256(fullDOM);
            console.log('[INTEGRITY] DOM hash stored.');
        }
        async function checkIntegrity() {
            const currentDOM = document.documentElement.outerHTML;
            const currentHash = await HashUtils.sha256(currentDOM);
            if (currentHash !== DOM_HASH) {
                console.error('[INTEGRITY] DOM modified! Lockdown...');
                sessionStorage.clear();
                document.body.innerHTML = `<div style="background:#7f1d1d;height:100vh;display:flex;align-items:center;justify-content:center;color:white;"><div><p style="font-size:3rem;">ه</p><p>INTEGRITY BREACH</p></div></div>`;
                setTimeout(() => location.reload(), 3000);
            }
        }

        // ==================== POLYMORPHIC DECOY GARDEN ====================
        let decoyInterval = null;
        function activatePolymorphicDecoy() {
            if (decoyInterval) clearInterval(decoyInterval);
            const createDecoys = () => {
                document.querySelectorAll('.decoy').forEach(el => el.remove());
                for (let i = 0; i < CONFIG.DECOY_COUNT; i++) {
                    const types = ['input', 'a', 'form', 'button'];
                    const type = types[Math.floor(Math.random() * types.length)];
                    const el = document.createElement(type);
                    el.className = 'decoy';
                    el.style.cssText = `position:absolute;left:${Math.random() * 100}%;top:${Math.random() * 100}%;opacity:0;pointer-events:none;`;
                    if (type === 'input') el.setAttribute('name', ['username','password','token','key'][Math.floor(Math.random()*4)]);
                    if (type === 'a') el.setAttribute('href', '/api/' + Math.random().toString(36).substring(7));
                    document.body.appendChild(el);
                }
            };
            createDecoys();
            decoyInterval = setInterval(createDecoys, CONFIG.DECOY_ROTATION);
            console.log('[DEFENSE] Polymorphic Decoy active.');
        }

        // ==================== SELF-HEALING WATCHDOG ====================
        function startWatchdog() {
            setInterval(() => {
                if (!document.querySelector('.card-nano')) {
                    console.warn('[WATCHDOG] UI missing. Restoring...');
                    renderUI();
                }
                if (decoyInterval === null) {
                    console.warn('[WATCHDOG] Decoy down. Restarting...');
                    activatePolymorphicDecoy();
                }
            }, 10000);
        }

        // ==================== DEFENSE START ====================
        function startDefenses() {
            calculateDOMHash().then(() => setInterval(checkIntegrity, CONFIG.INTEGRITY_CHECK_INTERVAL));
            activatePolymorphicDecoy();
            deployImmuneSystem();
            activateMovingTarget();
            startWatchdog();
        }

        // ... (Fungsi lainnya: renderUI, deployImmuneSystem, activateMovingTarget, Tawaf, Tools, toggleGhost, dll.) ...
        // (Sama seperti v3.1 tapi dengan penyesuaian kecil)
    </script>
</body>
</html>
