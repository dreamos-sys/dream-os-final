<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS Sovereign</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Reem+Kufi+Fun:wght@400..700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --gold: #d97706; --bg: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; overflow: hidden; color: var(--text); }

        .batik-overlay {
            position: fixed; inset: 0; z-index: -1; opacity: 0.12; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0l50 50-50 50L0 50z' fill='%2310b981'/%3E%3Ccircle cx='50' cy='50' r='12' fill='%23d97706' fill-opacity='0.2'/%3E%3C/svg%3E");
        }

        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 15px; }
        .active { display: flex !important; }

        .card { background: white; padding: 35px 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 340px; margin-top: 10vh; border: 1px solid #f1f5f9; }
        .bismillah-static { font-family: 'Reem Kufi Fun', sans-serif; font-size: 1.6rem; color: var(--gold); font-weight: 700; margin-bottom: 10px; }

        .header-container { display: flex; align-items: center; width: 100%; padding: 10px 5px; }
        .header-logo { width: 55px; height: 55px; -o-object-fit: contain; object-fit: contain; }
        .header-text { flex: 1; text-align: center; margin-right: 55px; }

        .bismillah-dashboard { font-family: 'Reem Kufi Fun', sans-serif; font-size: 1.5rem; color: var(--gold); font-weight: 700; line-height: 1.2; }
        .shalawat-dashboard { font-family: 'Amiri', serif; font-size: 0.9rem; color: var(--emerald); font-weight: 600; line-height: 1.4; margin-top: 4px; }
        .zikir-badge { font-size: 0.6rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-top: 6px; letter-spacing: 1px; border: 1px solid #f1f5f9; padding: 2px 8px; border-radius: 10px; display: inline-block; }

        .carousel { width: 100%; height: 115px; background: rgba(248, 250, 252, 0.9); backdrop-filter: blur(8px); border-radius: 25px; margin: 15px 0; border: 1px solid rgba(16, 185, 129, 0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slide { display: none; padding: 15px; text-align: center; font-size: 0.85rem; font-weight: 600; animation: fadeIn 0.8s; }
        .slide.active { display: block; }

        .grid-9 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .mod { background: white; padding: 18px 5px; border-radius: 24px; text-align: center; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: 0.2s; }
        .mod:active { transform: scale(0.92); }
        .mod i { font-size: 1.5rem; color: var(--emerald); margin-bottom: 6px; display: block; }
        .mod span { font-size: 0.6rem; font-weight: 800; color: #475569; text-transform: uppercase; }

        .nav-5 { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: white; display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #f1f5f9; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #cbd5e1; font-size: 1.3rem; }
        .nav-item.active { color: var(--emerald); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  <script type="module" crossorigin src="./assets/index-DD5eF4Eb.js"></script>
</head>
<body>
    <div class="batik-overlay"></div>

    <section id="login-screen" class="screen active">
        <div class="card">
            <img src="./assets/logo-sultan-t5H7gsFR.png" width="90" style="margin-bottom:15px">
            <div class="bismillah-static">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div style="position:relative; width:100%; margin-bottom:20px">
                <input type="password" id="accessKey" placeholder="Access Key" style="width:100%; padding:18px; border-radius:18px; border:2px solid #f1f5f9; outline:none; background:#f8fafc">
                <i class="fas fa-eye" id="togglePass" style="position:absolute; right:18px; top:50%; transform:translateY(-50%); color:#94a3b8; cursor:pointer"></i>
            </div>
            <button id="loginBtn" style="width:100%; padding:18px; background:var(--emerald); color:white; border:none; border-radius:20px; font-weight:900;">ACCESS SYSTEM</button>
        </div>
    </section>

    <section id="dashboard-screen" class="screen">
        <header class="header-container">
            <img src="./assets/logo-sultan-t5H7gsFR.png" class="header-logo">
            <div class="header-text">
                <div class="bismillah-dashboard">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
                <div class="shalawat-dashboard">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ</div>
                <div id="zikir-dynamic" class="zikir-badge">LOADING...</div>
            </div>
        </header>

        <div class="carousel" id="carousel-box"></div>

        <div class="grid-9">
            <div class="mod"><i class="fas fa-desktop"></i><span>CMD CENTER</span></div>
            <div class="mod"><i class="fas fa-calendar-check"></i><span>BOOKING</span></div>
            <div class="mod"><i class="fas fa-biohazard"></i><span>K3 FORM</span></div>
            <div class="mod"><i class="fas fa-user-shield"></i><span>SEKURITI</span></div>
            <div class="mod"><i class="fas fa-pump-soap"></i><span>JAN INDOOR</span></div>
            <div class="mod"><i class="fas fa-leaf"></i><span>JAN OUTDOOR</span></div>
            <div class="mod"><i class="fas fa-box-open"></i><span>STOK ALAT</span></div>
            <div class="mod"><i class="fas fa-wrench"></i><span>MAINTENANCE</span></div>
            <div class="mod"><i class="fas fa-warehouse"></i><span>INVENTARIS</span></div>
        </div>

        <nav class="nav-5">
            <div class="nav-item active"><i class="fas fa-home"></i></div>
            <div class="nav-item"><i class="fas fa-user"></i></div>
            <div class="nav-item"><i class="fas fa-qrcode" style="font-size:1.8rem; color:var(--emerald)"></i></div>
            <div class="nav-item"><i class="fas fa-info-circle"></i></div>
            <div class="nav-item"><i class="fas fa-cog"></i></div>
        </nav>
    </section>

</body>
</html>
