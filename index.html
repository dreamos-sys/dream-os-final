<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Dream OS v1.0 • Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        spiritual: { 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b' },
                        slate: { 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; background: #020617; }
        .font-arabic { font-family: 'Amiri', serif; }
        .view { display: none; }
        .view.active { display: flex; }
        #auth-view.active { display: flex; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-border { position: relative; }
        .glow-border::after { content:''; position:absolute; inset:-1px; background:linear-gradient(135deg,#fbbf24,#22c55e); border-radius:inherit; z-index:-1; opacity:0.15; transition:opacity 0.2s; }
        .glow-border:active::after { opacity:0.3; }
        .magnet { transition: transform 0.15s cubic-bezier(0.4,0,0.2,1); }
        .magnet:active { transform: scale(0.96); }
        #dream-logo { transition: transform 0.1s; }
        #dream-logo:active { transform: scale(0.93); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .carousel-container { position: relative; overflow: hidden; border-radius: 16px; }
        .carousel-slide { display: none; animation: fadeIn 0.5s; }
        .carousel-slide.active { display: block; }
        .carousel-dots { display: flex; justify-content: center; gap: 6px; margin-top: 12px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.3s; cursor: pointer; }
        .dot.active { background: #fbbf24; width: 24px; border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }    </style>
</head>
<body class="text-slate-200 h-screen overflow-hidden">

    <!-- AUTH SCREEN -->
    <section id="auth-view" class="view active flex-col items-center justify-center h-full p-6 text-center bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950">
        <div id="dream-logo" class="mb-6 cursor-pointer select-none magnet">
            <img src="assets/logo-sultan.png" alt="Dream OS" class="w-28 h-28 rounded-3xl shadow-[0_0_35px_rgba(245,158,11,0.25)] object-cover">
            <p class="text-[10px] text-amber-500 mt-4 font-bold tracking-[0.25em]">DREAM OS <span class="text-emerald-400">v1.0</span></p>
        </div>
        <h1 class="font-arabic text-3xl text-amber-500/90 mb-2">بِسْمِ اللَّهِ</h1>
        <p class="text-[10px] text-emerald-400 mb-8 font-semibold tracking-wide">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
        <div class="w-full max-w-xs glass p-6 rounded-3xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6)] glow-border">
            <div class="relative mb-4">
                <input type="password" id="access-key" placeholder="Access Key" class="w-full px-4 py-3.5 bg-slate-900/70 rounded-2xl border border-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-500/40 text-center tracking-widest pr-12 text-slate-200 placeholder-slate-600 text-sm">
                <button id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-amber-400 p-1">
                    <i data-lucide="eye" class="w-5 h-5" id="eye-off"></i>
                    <i data-lucide="eye-off" class="w-5 h-5 hidden" id="eye-on"></i>
                </button>
            </div>
            <button id="btn-login" class="w-full py-3.5 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white text-xs font-bold uppercase tracking-wider rounded-2xl shadow-[0_12px_24px_-10px_rgba(16,185,129,0.35)] magnet">Access System</button>
            <p class="text-[9px] text-slate-600 mt-4 font-mono">Out of The Box Inside • ISO 27001</p>
        </div>
    </section>

    <!-- MAIN APP -->
    <div id="app-view" class="view flex-col h-full">
        <!-- HEADER (Modular - loaded from modules/header.js) -->
        <header id="app-header" class="px-4 py-3 glass border-b border-slate-800/60 flex justify-between items-center shrink-0 hidden">
            <!-- Content injected by header.js -->
        </header>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden p-3 pb-24 space-y-3 bg-slate-950">
            
            <!-- HOME VIEW -->
            <div id="view-home" class="view-section active space-y-3">
                <!-- 7-SLIDE CAROUSEL (Modular - loaded from modules/carousel.js) -->
                <div id="carousel-container" class="carousel-container glass glow-border p-4 hidden">
                    <!-- Slides injected by carousel.js -->
                </div>

                <!-- 9-GRID MENU (Modular - loaded from modules/grid.js) -->
                <div id="staff-grid" class="grid grid-cols-3 gap-3 hidden"></div>
            </div>

            <!-- COMMAND CENTER VIEW -->
            <div id="view-command" class="view-section hidden space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold text-amber-500" data-i18n="command.title">Command Center</h2>                    <span class="text-[9px] bg-slate-900 border border-slate-800 px-2 py-0.5 rounded text-emerald-400 font-mono">AI Active</span>
                </div>
                <div class="bg-slate-900/60 p-3 rounded-xl border border-slate-800">
                    <input type="text" data-i18n-placeholder="command.search" placeholder="🔍 Cari 'AC 2016'..." class="w-full bg-transparent text-sm text-slate-200 focus:outline-none placeholder-slate-600">
                </div>
                <div id="command-grid" class="grid grid-cols-2 gap-3"></div>
            </div>

            <!-- OTHER VIEWS (User, QR, Info, Config) -->
            <div id="view-user" class="view-section hidden space-y-3"></div>
            <div id="view-qr" class="view-section hidden space-y-3"></div>
            <div id="view-info" class="view-section hidden space-y-3"></div>
            <div id="view-config" class="view-section hidden space-y-3"></div>

        </main>

        <!-- BOTTOM NAVIGATION (Modular - loaded from modules/nav.js) -->
        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800/60 flex justify-around items-center h-16 safe-bottom z-50 hidden">
            <!-- Nav items injected by nav.js -->
        </nav>
    </div>

    <!-- MODULAR SCRIPTS -->
    <script src="config/i18n.js"></script>
    <script src="modules/header.js"></script>
    <script src="modules/carousel.js"></script>
    <script src="modules/grid.js"></script>
    <script src="modules/nav.js"></script>
    <script src="modules/auth.js"></script>
    <script src="modules/app.js"></script>
</body>
</html>
