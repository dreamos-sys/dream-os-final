<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream OS v2.1 - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" crossorigin href="./assets/index-BPw57PxQ.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <div class="logo-glow"></div>
        <div class="logo-placeholder">🏆</div>
      </div>
      <h1 class="title">Dream OS <span class="version">v2.0</span></h1>
      <p class="subtitle">Limited Edition 2026 - Bash Powered</p>
      <div class="bismillah"><span>بِسْمِ اللَّهِ</span></div>
      <form id="loginForm" class="login-form">
        <div class="input-group">
          <input type="password" id="password" placeholder="Enter access code..." autocomplete="off" required>
          <button type="button" class="toggle-password" onclick="togglePassword()">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
        <div id="errorMsg" class="error-message" style="display: none;">
          <i class="fas fa-times-circle"></i> <span>Kode salah · <span id="attempts">4</span> percobaan tersisa</span>
        </div>
        <button type="submit" class="btn-access"><i class="fas fa-sign-in-alt"></i> ACCESS SYSTEM</button>
      </form>
      <div class="footer"><p>Dream Team © 2026 · Limited Edition</p></div>
    </div>
    <div class="bg-pattern"></div>
  </div>  <script src="js/login.js"></script>
</body>
</html>
