<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#10b981">
  <title>Dream OS v2.1.1</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2310b981' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(16, 185, 129, 0.3);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --accent-gold: #d97706;
    }
    body { background-color: var(--bg-primary); background-image: var(--bg-pattern); background-attachment: fixed; color: var(--text-primary); font-family: system-ui, -apple-system, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .glass-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; box-shadow: 0 8px 32px rgba(16, 185, 129, 0.1); width: 100%; max-width: 360px; text-align: center; }
    .logo-glow img { width: 96px; height: 96px; filter: drop-shadow(0 0 12px rgba(217, 119, 6, 0.4)); }
    .bismillah { font-family: 'Amiri', serif; font-size: 1.5rem; color: var(--accent-gold); margin: 12px 0; direction: rtl; }
    h1 { margin: 8px 0; font-size: 1.5rem; font-weight: bold; }
    h1 span { color: var(--accent-gold); font-size: 0.9em; }
    .input-group { position: relative; margin: 20px 0; display: flex; align-items: center; }
    .input-group input { width: 100%; padding: 14px 45px 14px 16px; border: 2px solid var(--glass-border); border-radius: 12px; background: rgba(255,255,255,0.9); font-size: 1rem; box-sizing: border-box; transition: all 0.3s; }
    .input-group input:focus { border-color: #10b981; outline: none; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
    .eye-btn { position: absolute; right: 15px; background: none; border: none; color: #64748b; cursor: pointer; font-size: 1.1rem; padding: 0; display: flex; align-items: center; }
    .btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; letter-spacing: 1px; }
    .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
    footer { margin-top: 24px; color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="logo-glow">
      <img src="assets/icons/icon-192.png" alt="Dream OS" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1041/1041916.png'">
    </div>
    <h1>Dream OS <span>v2.1.1</span></h1>
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    
    <form id="loginForm">
      <div class="input-group">
        <input type="password" placeholder="Enter access key..." id="pwInput" required>
        <button type="button" class="eye-btn" id="togglePw">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">ACCESS SYSTEM</button>
    </form>
    
    <footer>Dream Team © 2026 · Limited Edition</footer>
  </div>

  <script>
    // 🛡️ EMERGENCY BRIDGE SCRIPT (Anti-Heng Logic)
    const pwInput = document.getElementById('pwInput');
    const togglePw = document.getElementById('togglePw');
    const eyeIcon = document.getElementById('eyeIcon');
    const loginForm = document.getElementById('loginForm');

    // 1. Toggle Password Visibility
    togglePw.addEventListener('click', () => {
      const isPw = pwInput.type === 'password';
      pwInput.type = isPw ? 'text' : 'password';
      eyeIcon.className = isPw ? 'fas fa-eye-slash' : 'fas fa-eye';
      console.log('👁️ Password toggled');
    });

    // 2. Submit Logic
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const key = pwInput.value;
      alert('🤲 Bismillah! Mengakses sistem dengan key: ' + key);
      // Di sini nanti Sultan bisa hubungkan ke app.js
    });
  </script>
</body>
</html>
