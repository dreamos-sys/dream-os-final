<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream OS v2.2.2 — Sovereign Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f7fafc;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
        }
        .iso-navbar {
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .mod {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            border: 1px solid #e2e8f0;
            height: 115px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .mod:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #10b981;
        }
        .badge-iso {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            text-transform: uppercase;
        }
        .welcome-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
        }
        .slide-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80px;
            text-align: center;
        }
        .slide {
            display: none;
            width: 100%;
        }
        .slide.active {
            display: block;
            animation: fadeEffect 1s;
        }
        @keyframes fadeEffect {
            from { opacity: .4; }
            to { opacity: 1; }
        }
        .nav-bottom {
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <nav class="iso-navbar sticky top-0 z-50 px-6 py-4 flex justify-between items-center" role="navigation" aria-label="Main navigation">
        <div class="flex items-center gap-3">
            <img src="./assets/logo-sultan.png" alt="Sultan Logo" class="w-8 h-8 object-contain">
            <div>
                <h1 class="text-sm font-extrabold tracking-wide uppercase flex items-center gap-2 text-gray-800">
                    DREAM OS V2.2.2
                    <span class="badge-iso">ISO 27001</span>
                </h1>
                <p class="text-xs text-gray-400 tracking-wider">Bi idznillah — Niat Lurus</p>
            </div>
        </div>
        <div>
            <button id="eye-icon" onclick="toggleVisibility()" class="text-gray-400 hover:text-green-500 transition">
                <i class="fas fa-eye-slash text-base"></i>
            </button>
        </div>
    </nav>

    <main class="dashboard-content flex-grow container mx-auto px-4 py-6 max-w-5xl" role="main">
        <div class="welcome-card p-6 mb-8 text-center flex flex-col items-center justify-center">
            <div class="slide-container">
                <div class="slide active">
                    <h2 class="text-xl font-bold mb-1 tracking-wider" style="color: #0b6623;">بِسْمِ ٱللَّهِ ٱلرَّحْمٰنِ ٱلرَّحِيمِ</h2>
                    <p class="text-xs font-semibold" style="color: #10b981;">
                        اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ
                    </p>
                </div>
                <div class="slide">
                    <h3 class="text-sm font-bold text-gray-800 tracking-wider mb-1">WELCOME, MR. ARCHITECT! ✨</h3>
                    <p class="text-xs text-gray-500 tracking-wider">Sovereign System v2.2.2 is now active.</p>
                    <span class="text-[10px] text-gray-400 uppercase mt-1 block">Zikir: (AS SAMEE') الشميع</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-5 p-2" id="module-grid">
            <button data-modul="cc" class="mod">
                <i class="fas fa-desktop text-2xl" style="color: #3b82f6;"></i>
                <span class="text-xs font-bold tracking-widest text-center" style="color: #2563eb;">CMD CENTER</span>
            </button>
            <button data-modul="booking" class="mod">
                <i class="fas fa-calendar-check text-2xl" style="color: #10b981;"></i>
                <span class="text-xs font-bold tracking-widest text-center" style="color: #059669;">BOOKING</span>
            </button>
            <button data-modul="k3" class="mod">
                <i class="fas fa-biohazard text-2xl" style="color: #f59e0b;"></i>
                <span class="text-xs font-bold tracking-widest text-center" style="color: #d97706;">K3 FORM</span>
            </button>
            <button data-modul="sekuriti" class="mod">
                <i class="fas fa-user-shield text-2xl" style="color: #ef4444;"></i>
                <span class="text-xs font-bold tracking-widest text-center" style="color: #dc2626;">SEKURITI</span>
            </button>
            <button data-modul="jan-indoor" class="mod">
                <i class="fas fa-pump-soap text-2xl" style="color: #06b6d4;"></i>
                <span class="text-xs font-bold tracking-widest text-center" style="color: #0891b2;">JAN INDOOR</span>
            </button>
            <button data-modul="jan-outdoor" class="mod">
                <i class="fas fa-leaf text-2xl" style="color: #84cc16;"></i>
                <span class="text-xs font-bold tracking-widest text-center" style="color: #65a30d;">JAN OUTDOOR</span>
            </button>
            <button data-modul="stok" class="mod">
                <i class="fas fa-box-open text-2xl" style="color: #8b5cf6;"></i>
                <span class="text-xs font-bold tracking-widest text-center" style="color: #7c3aed;">STOK ALAT</span>
            </button>
            <button data-modul="maint" class="mod">
                <i class="fas fa-wrench text-2xl" style="color: #ec4899;"></i>
                <span class="text-xs font-bold tracking-widest text-center" style="color: #db2777;">MAINTENANCE</span>
            </button>
            <button data-modul="inventaris" class="mod">
                <i class="fas fa-warehouse text-2xl" style="color: #14b8a6;"></i>
                <span class="text-xs font-bold tracking-widest text-center" style="color: #0d9488;">INVENTARIS</span>
            </button>
        </div>
    </main>

    <footer class="nav-bottom fixed bottom-0 left-0 right-0 py-4 px-6 flex justify-around items-center z-50 shadow-md">
        <a href="#" class="flex flex-col items-center gap-1 text-green-500">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">Home</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-500">
            <i class="fas fa-user text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">User</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-green-600">
            <i class="fas fa-qrcode text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">Menu</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-500">
            <i class="fas fa-info-circle text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">Info</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-green-500">
            <i class="fas fa-cog text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-wider">Config</span>
        </a>
    </footer>

    <script>
        let slideIndex = 0;
        showSlides();

        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}
            slides[slideIndex-1].classList.add("active");
            setTimeout(showSlides, 7000);
        }
    </script>
    <script src="./app.js?v=3.2.3"></script>
</body>
</html>
