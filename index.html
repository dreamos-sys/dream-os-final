<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dream OS v2.1.1</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ⚪ PILAR VISUAL: PURE WHITE & EMERALD */
      --bg-white: #ffffff;
      --primary-emerald: #10b981;
      --accent-gold: #d97706;
      --text-dark: #1e293b;
      /* Batik Pattern Emerald dengan Opacity super tipis (0.03) agar tetap putih bersih */
      --batik-pattern: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2310b981' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    
    body { 
      background-color: var(--bg-white); 
      background-image: var(--batik-pattern); 
      background-attachment: fixed; 
      color: var(--text-dark); 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 0; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    
    .glass-palace { 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(15px); 
      border: 1px solid rgba(16, 185, 129, 0.2); 
      border-radius: 28px; 
      padding: 32px; 
      width: 100%; 
      max-width: 350px; 
      text-align: center; 
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.04); 
    }
    
    .logo-sultan img { 
      width: 100px; 
      filter: drop-shadow(0 0 10px rgba(217, 119, 6, 0.2)); 
      margin-bottom: 10px;
    }
    
    .bismillah-text { 
      font-family: 'Amiri', serif; 
      font-size: 1.6rem; 
      color: var(--accent-gold); 
      margin: 15px 0; 
      direction: rtl; 
    }
    
    .input-group { position: relative; margin: 25px 0; }
    
    .input-group input { 
      width: 100%; 
      padding: 15px 45px 15px 15px; 
      border: 2px solid #f1f5f9; 
      border-radius: 14px; 
      font-size: 1rem; 
      background: #f8fafc;
      box-sizing: border-box; 
      transition: all 0.3s; 
    }
    
    .input-group input:focus { 
      border-color: var(--primary-emerald); 
      background: #ffffff;
      outline: none; 
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
    }
    
    .eye-toggle { 
      position: absolute; 
      right: 15px; 
      top: 50%; 
      transform: translateY(-50%); 
      cursor: pointer; 
      color: #94a3b8; 
    }
    
    .btn-access { 
      width: 100%; 
      padding: 16px; 
      background: linear-gradient(135deg, #10b981, #059669); 
      color: white; 
      border: none; 
      border-radius: 14px; 
      font-weight: bold; 
      font-size: 1rem; 
      cursor: pointer; 
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
      transition: 0.2s; 
    }
    
    .btn-access:active { transform: scale(0.96); }
    
    footer { 
      margin-top: 30px; 
      font-size: 0.75rem; 
      color: #94a3b8; 
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="glass-palace">
    <div class="logo-sultan">
      <img src="./assets/icons/icon-192.png" alt="Dream OS" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1041/1041916.png'">
    </div>
    <h2 style="margin:0; font-weight: 800;">Dream OS <span style="color:var(--accent-gold)">v2.1.1</span></h2>
    <div class="bismillah-text">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    
    <div class="input-group">
      <input type="password" id="accessKey" placeholder="Enter Access Key">
      <i class="fas fa-eye eye-toggle" id="eyeIcon"></i>
    </div>
    
    <button class="btn-access" id="loginBtn">ACCESS SYSTEM</button>
    
    <footer>The Power Soul of Shalawat © 2026</footer>
  </div>

  <script>
    const keyInput = document.getElementById('accessKey');
    const eyeIcon = document.getElementById('eyeIcon');
    const loginBtn = document.getElementById('loginBtn');

    // 1. Toggle Visibility (Mata)
    eyeIcon.addEventListener('click', () => {
      const isPass = keyInput.type === 'password';
      keyInput.type = isPass ? 'text' : 'password';
      eyeIcon.className = isPass ? 'fas fa-eye-slash eye-toggle' : 'fas fa-eye eye-toggle';
    });

    // 2. Access Logic (Memory Aware)
    loginBtn.addEventListener('click', () => {
      if (keyInput.value === 'Mr.M_Architect_2025') {
        alert('🤲 Bismillah! Akses Diterima. Thuma\'ninah Mode Active.');
      } else {
        alert('❌ Kode Salah, My Bro! Cek Memory lo.');
      }
    });
  </script>
</body>
</html>
