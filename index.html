<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Dream OS • v1.3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); background-size: 400% 400%; animation: gradient 15s ease infinite; min-height: 100vh; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-pearl { background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); }
        .view { display: none; } .view.active { display: flex; }
        .carousel-slide { display: none; animation: fadeIn 0.3s; }
        .carousel-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.3s; cursor: pointer; }
        .dot.active { background: #2dd4bf; width: 24px; border-radius: 4px; }
        #ghost-dashboard { display: none; position: fixed; inset: 0; background: #020617; z-index: 9999; overflow-y: auto; padding: 20px; border-top: 2px solid #2dd4bf; }
        #ghost-dashboard.active { display: block; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .menu-card { transition: all 0.3s ease; background: rgba(45,212,191,0.08); }
        .menu-card:hover { transform: translateY(-3px) scale(1.01); background: rgba(45,212,191,0.15); }
        .nav-btn.active { color: #2dd4bf; }
    </style>
</head>
<body class="text-white h-screen overflow-hidden">

    <section id="login-page" class="view active flex-col items-center justify-center h-full p-6 text-center">
        <div id="dream-logo" class="mb-6 cursor-pointer select-none">
            <img src="assets/logo-sultan.png" alt="Dream OS" class="w-32 h-32 rounded-3xl shadow-[0_0_35px_rgba(245,158,11,0.25)] mb-4">
            <p class="text-sm text-amber-500 font-semibold tracking-[0.3em]">DREAM OS <span class="text-emerald-400">v1.3.2</span></p>
        </div>
        <h1 class="text-3xl text-amber-500/90 mb-2" style="font-family: 'Amiri', serif;">بِسْمِ اللهِ</h1>
        <div class="glass p-6 rounded-3xl w-full max-w-xs">
            <div class="relative mb-4">
                <input type="password" id="access-key" class="w-full p-4 bg-white/10 rounded-2xl text-center border border-white/20 outline-none" placeholder="Access Key">
                <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-amber-500 text-xl">👁️</button>
            </div>
            <button id="btn-login" class="w-full py-3.5 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white text-xs font-bold uppercase rounded-2xl" onclick="handleLogin()">ACCESS SYSTEM</button>
        </div>
    </section>

    <div id="dashboard" class="view flex-col h-full overflow-hidden">
        <header class="px-3 py-2 glass border-b border-white/10 shrink-0">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <img src="assets/logo-sultan.png" class="w-9 h-9 rounded-lg">
                    <h1 class="text-sm font-bold">Dream OS <span class="text-[9px] block text-teal-300">v1.3.2 User</span></h1>
                </div>
                <button onclick="handleLogout()" class="p-1.5 text-white/60"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-3 pb-24 space-y-3" id="main-content-wrapper">
            <div id="home-view" class="space-y-3">
                <div class="glass-pearl rounded-2xl p-4">
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="bg-white/5 p-3 rounded-xl">
                            <p class="text-[10px] text-white/60 mb-1">Total Users</p>
                            <p class="text-xl font-bold">1,450</p>
                        </div>
                        <div class="bg-white/5 p-3 rounded-xl">
                            <p class="text-[10px] text-white/60 mb-1">Uptime</p>
                            <p class="text-xl font-bold text-teal-400">99.98%</p>
                        </div>
                    </div>
                </div>
                <div class="glass rounded-2xl overflow-hidden" id="carousel-container">
                    <div id="carousel-slides" class="p-4 min-h-[140px] text-sm"></div>
                    <div class="carousel-dots flex justify-center gap-2 mt-2 pb-2" id="carousel-dots"></div>
                </div>
                <div class="grid grid-cols-3 gap-3" id="menu-grid"></div>
            </div>

            <div id="command-center" style="display:none;">
                <div class="flex justify-start mb-3">
                    <button onclick="goHome()" class="text-xs bg-emerald-600/20 px-3 py-1.5 rounded-xl border border-emerald-500/30 flex items-center gap-2 text-emerald-400">
                        <i data-lucide="chevron-left" class="w-3 h-3"></i> BACK TO HOME
                    </button>
                </div>
                <div id="command-content-body"></div>
            </div>
        </main>

        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 flex justify-around items-center h-14 z-50 bg-[#0f172a]/95" style="display: none;">
            <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-teal-400" onclick="navClick('home', this)">
                <i data-lucide="home" class="w-4 h-4"></i><span class="text-[9px]">HOME</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-white/60" onclick="navClick('user', this)">
                <i data-lucide="user" class="w-4 h-4"></i><span class="text-[9px]">USER</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-white/60" onclick="navClick('menu', this)">
                <i data-lucide="scan-line" class="w-4 h-4"></i><span class="text-[9px]">MENU</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-white/60" onclick="navClick('info', this)">
                <i data-lucide="info" class="w-4 h-4"></i><span class="text-[9px]">INFO</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center w-full h-full text-white/60" onclick="navClick('config', this)">
                <i data-lucide="settings" class="w-4 h-4"></i><span class="text-[9px]">CONFIG</span>
            </button>
        </nav>
    </div>

    <div id="ghost-dashboard">
        <div class="flex justify-between items-center mb-6 pb-3 border-b border-teal-500/50">
            <h1 class="text-xl font-bold text-teal-400">👻 GHOST MODE</h1>
            <button onclick="closeGhost()" class="text-red-400 text-xs">✕ CLOSE</button>
        </div>
        <div class="grid grid-cols-1 gap-3 pb-20" id="ghost-tools"></div>
    </div>

    <script>
        let tapCount = 0, tapTimer = null, carouselInterval = null;

        function togglePassword() {
            const input = document.getElementById('access-key');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function handleLogin() {
            console.log("🔐 Attempting Login...");
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('bottom-nav').style.display = 'flex';
            setTimeout(initDashboard, 100);
        }

        function handleLogout() { location.reload(); }
        function goHome() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('command-center').style.display = 'none';
        }

        function initDashboard() {
            const slides = [
                { icon: 'hand', title: 'Selamat Datang', text: 'Silakan pilih modul di bawah.' },
                { icon: 'calendar', title: 'Jadwal Booking', text: 'Hari Ini: Rapat Koordinasi 09:00\nBesok: Kunjungan Yayasan 13:00' },
                { icon: 'activity', title: 'Progress K3', text: 'AC Ruang Rapat: 60% (Proses)\nKebersihan Lobby: 100% (Selesai)' },
                { icon: 'cloud-rain', title: 'Cuaca & AI', text: 'Cerah Berawan - 32°C\nPrediksi hujan 15:00 WIB' },
                { icon: 'building-2', title: 'Info Management', text: 'Rapat CEO & Yayasan\nPukul 09:00 WIB di Ruang Rapat SMA' },
                { icon: 'users', title: 'Info Team Umum', text: 'Rapat Mingguan\nJam 09:00 WIB di R. Koord Bagian Umum' },
                { icon: 'gift', title: 'Ucapan', text: '🎂 Selamat Ultah Pak Budi!' }
            ];
            
            document.getElementById('carousel-slides').innerHTML = slides.map((s,i) => `
                <div class="carousel-slide ${i===0?'active':''}">
                    <div class="flex items-center gap-2 mb-1 text-teal-400">
                        <i data-lucide="${s.icon}" class="w-4 h-4"></i>
                        <span class="font-bold text-xs uppercase">${s.title}</span>
                    </div>
                    <p class="text-xs text-white/60 whitespace-pre-line">${s.text}</p>
                </div>`).join('');
            document.getElementById('carousel-dots').innerHTML = slides.map((_,i) => `
                <div class="dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('');

            const items = [
                { icon: '🌍', label: 'Command' }, { icon: '📅', label: 'Booking' }, { icon: '⚠️', label: 'K3' },
                { icon: '🔒', label: 'Security' }, { icon: '🧹', label: 'Janitor In' }, { icon: '🍃', label: 'Janitor Out' },
                { icon: '📦', label: 'Stok' }, { icon: '🔧', label: 'Maintenance' }, { icon: '🏢', label: 'Asset' }
            ];
            document.getElementById('menu-grid').innerHTML = items.map(m => `
                <div class="menu-card p-3 rounded-xl flex flex-col items-center justify-center glass cursor-pointer min-h-[90px]" onclick="handleMenuClick('${m.label}')">
                    <div class="text-2xl mb-1">${m.icon}</div>
                    <div class="text-[10px] font-bold text-white text-center">${m.label}</div>
                </div>`).join('');

            if(window.lucide) lucide.createIcons();
            if(carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(() => {
                let current = [...document.querySelectorAll('.carousel-slide')].findIndex(s => s.classList.contains('active'));
                if(current !== -1) goToSlide((current + 1) % slides.length);
            }, 7000);
        }

        function goToSlide(i) {
            document.querySelectorAll('.carousel-slide').forEach((s,idx) => s.classList.toggle('active', idx === i));
            document.querySelectorAll('.dot').forEach((d,idx) => d.classList.toggle('active', idx === i));
        }

        function handleMenuClick(label) {
            if(label === 'Command') {
                const body = document.getElementById('command-content-body');
                const container = document.getElementById('command-center');
                const homeView = document.getElementById('home-view');
                fetch('js/modules/command.html').then(r => r.text()).then(html => {
                    body.innerHTML = html;
                    homeView.style.display = 'none';
                    container.style.display = 'block';
                    body.querySelectorAll('script').forEach(s => {
                        const ns = document.createElement('script');
                        ns.textContent = s.textContent;
                        document.body.appendChild(ns);
                        s.remove();
                    });
                    if(window.lucide) lucide.createIcons();
                });
            } else { alert(label + ' ready!'); }
        }

        function navClick(target, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('text-teal-400'); b.classList.add('text-white/60'); });
            if(btn) btn.classList.add('text-teal-400');
            if(target === 'home') goHome();
        }

        document.getElementById('dream-logo').addEventListener('click', () => {
            tapCount++;
            if(tapTimer) clearTimeout(tapTimer);
            tapTimer = setTimeout(() => tapCount = 0, 2000);
            if(tapCount >= 7) { tapCount = 0; openGhost(); }
        });

        function openGhost() {
            document.getElementById('ghost-dashboard').classList.add('active');
            document.getElementById('ghost-tools').innerHTML = `
                <div class="glass p-4 rounded-xl border border-teal-500/20 mb-2 flex justify-between" onclick="toggleEruda()">
                    <div><div class="font-bold text-teal-400">🔍 ERUDA CONSOLE</div><div class="text-[9px] text-white/40">Toggle dev tools</div></div>
                    <div class="text-teal-400 text-xs">OPEN</div>
                </div>
                <div class="glass p-4 rounded-xl border border-red-500/20 mb-2 flex justify-between" onclick="localStorage.clear();location.reload();">
                    <div><div class="font-bold text-red-400">🗑️ WIPE DATA</div><div class="text-[9px] text-red-400/40">Reset System</div></div>
                    <div class="text-red-400 text-xs">CLEAR</div>
                </div>`;
        }
        function closeGhost() { document.getElementById('ghost-dashboard').classList.remove('active'); }
        function toggleEruda() { if(!window.eruda) { const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/eruda'; s.onload=()=>{ eruda.init(); eruda.show(); }; document.body.appendChild(s); } else eruda[eruda._isShow ? 'hide' : 'show'](); }
        
        console.log('✅ Dream OS v1.3.2 Modular Ready');
    </script>
</body>
</html>
