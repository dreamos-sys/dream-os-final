<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b132b">
  <title>Dream OS v2.1</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- LOGIN SCREEN -->
  <section id="login-screen" class="screen active">
    <div class="glass-card">
      <div class="logo-glow">
        <img src="assets/logo.png" alt="Dream OS" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>'">
      </div>
      <h1>Dream OS <span>v2.1</span></h1>
      <div class="bismillah">بِسْمِ اللَّهِ</div>
      
      <form id="login-form">
        <div class="input-group">
          <input type="password" id="password" placeholder="Access Key" required autocomplete="current-password">
          <button type="button" id="toggle-pw" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
        </div>
        <div id="login-error" class="error-msg">Kode salah. Sisa percobaan: <span id="attempts">4</span></div>
        <button type="submit" class="btn-primary">ACCESS SYSTEM</button>
      </form>
      <footer>Dream Team © 2026 · Bi idznillah</footer>
    </div>
  </section>

  <!-- DASHBOARD SHELL -->
  <section id="dashboard-screen" class="screen">
    <header class="app-header">
      <div class="header-left">
        <img src="assets/logo.png" alt="Icon" class="header-icon" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>'">
        <div class="bismillah-shalawat">
          <p class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</p>
          <p class="shalawat">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
        </div>
      </div>
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
    </header>

    <main id="module-container" class="content-area">
      <!-- Dynamic modules injected here by router -->
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-route="#home" aria-label="Home"><i class="fas fa-home"></i><span>Home</span></button>
      <button class="nav-btn" data-route="#profile" aria-label="Profile"><i class="fas fa-user"></i><span>Profile</span></button>
      <button class="nav-btn center" data-route="#qr" aria-label="QR Scanner"><i class="fas fa-qrcode"></i><span>QR</span></button>
      <button class="nav-btn" data-route="#about" aria-label="About"><i class="fas fa-info-circle"></i><span>About</span></button>
      <button class="nav-btn" data-route="#setting" aria-label="Settings"><i class="fas fa-cog"></i><span>Setting</span></button>
    </nav>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
