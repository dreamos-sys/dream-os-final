<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Dream OS • v1.3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); background-size: 400% 400%; animation: gradient 15s ease infinite; min-height: 100vh; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-pearl { background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); }
        .view { display: none; } .view.active { display: flex; }
        .carousel-slide { display: none; animation: fadeIn 0.3s; }
        .carousel-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.3s; cursor: pointer; }
        .dot.active { background: #2dd4bf; width: 24px; border-radius: 4px; }
        #ghost-dashboard { display: none; position: fixed; inset: 0; background: #020617; z-index: 9999; overflow-y: auto; padding: 20px; border-top: 2px solid #2dd4bf; }
        #ghost-dashboard.active { display: block; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .menu-card { transition: all 0.3s ease; background: rgba(45,212,191,0.08); }
        .menu-card:hover { transform: translateY(-3px) scale(1.01); background: rgba(45,212,191,0.15); }
        .nav-btn.active { color: #2dd4bf; }
    </style>
</head>
<body class="text-white h-screen overflow-hidden">

    <section id="login-page" class="view active flex-col items-center justify-center h-full p-6 text-center">
        <div id="dream-logo" class="mb-6 cursor-pointer select-none group relative">
            <img src="assets/logo-sultan.png" class="w-32 h-32 rounded-3xl shadow-[0_0_35px_rgba(245,158,11,0.25)] mb-4">
            <p class="text-sm text-amber-500 font-semibold tracking-[0.3em]">DREAM OS <span class="text-emerald-400">v1.3.3</span></p>
            <div id="tap-feedback" class="absolute -top-4 left-1/2 -translate-x-1/2 text-[10px] text-teal-400 font-mono opacity-0">TAP</div>
        </div>
        <h1 class="text-3xl text-amber-500/90 mb-2" style="font-family: 'Amiri', serif;">بِسْمِ اللهِ</h1>
        <div class="glass p-6 rounded-3xl w-full max-w-xs">
            <div class="relative mb-4">
                <input type="password" id="access-key" class="w-full p-4 bg-white/10 rounded-2xl text-center border border-white/20 outline-none" placeholder="Access Key">
                <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-amber-500 text-xl">👁️</button>
            </div>
            <button class="w-full py-3.5 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white text-xs font-bold uppercase rounded-2xl" onclick="handleLogin()">ACCESS SYSTEM</button>
        </div>
    </section>

    <div id="dashboard" class="view flex-col h-full overflow-hidden" style="display:none;">
        <header class="px-3 py-2 glass border-b border-white/10 shrink-0 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="assets/logo-sultan.png" class="w-9 h-9 rounded-lg">
                <h1 class="text-sm font-bold">Dream OS <span class="text-[9px] block text-teal-300">Sultan Edition</span></h1>
            </div>
            <button onclick="handleLogout()" class="p-1.5 text-white/60"><i data-lucide="log-out" class="w-4 h-4"></i></button>
        </header>

        <main class="flex-1 overflow-y-auto p-3 pb-24" id="main-content-wrapper">
            <div id="home-view" class="space-y-3">
                <div class="glass-pearl rounded-2xl p-4 grid grid-cols-2 gap-3 text-center">
                    <div class="bg-white/5 p-3 rounded-xl">
                        <p class="text-[10px] text-white/60 mb-1 uppercase">Sultan Assets</p>
                        <p class="text-xl font-bold text-emerald-400 tracking-tighter">Rp 5.0M</p>
                    </div>
                    <div class="bg-white/5 p-3 rounded-xl">
                        <p class="text-[10px] text-white/60 mb-1 uppercase">System</p>
                        <p class="text-xl font-bold text-teal-400 tracking-tighter">ONLINE</p>
                    </div>
                </div>
                <div class="glass rounded-2xl overflow-hidden" id="carousel-container">
                    <div id="carousel-slides" class="p-4 min-h-[140px] text-sm"></div>
                    <div class="carousel-dots flex justify-center gap-2 mt-2 pb-2" id="carousel-dots"></div>
                </div>
                <div class="grid grid-cols-3 gap-3" id="menu-grid"></div>
            </div>
            <div id="command-center" style="display:none;">
                <button onclick="goHome()" class="mb-3 text-[10px] bg-emerald-600/20 px-3 py-2 rounded-xl text-emerald-400 border border-emerald-500/20">← BACK TO HOME</button>
                <div id="command-content-body"></div>
            </div>
        </main>

        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass flex justify-around items-center h-14 z-50 bg-[#0f172a]/95" style="display: none;">
            <button class="nav-btn text-teal-400" onclick="navClick('home', this)"><i data-lucide="home" class="w-5 h-5"></i></button>
            <button class="nav-btn text-white/40" onclick="navClick('menu', this)"><i data-lucide="layout-grid" class="w-5 h-5"></i></button>
            <button class="nav-btn text-white/40" onclick="navClick('config', this)"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </nav>
    </div>

    <div id="ghost-dashboard">
        <div class="flex justify-between items-center mb-6 pb-2 border-b border-teal-500/30">
            <h1 class="text-lg font-bold text-teal-400 uppercase tracking-tighter italic">Ghost Intelligence Hub</h1>
            <button onclick="closeGhost()" class="text-xs text-red-400">✕ CLOSE</button>
        </div>
        <div id="ghost-tools" class="space-y-2"></div>
    </div>

    <script>
        let tapCount = 0, tapTimer = null, carouselInterval = null;

        // --- AUTH ---
        window.togglePassword = () => { const i = document.getElementById('access-key'); i.type = i.type === 'password' ? 'text' : 'password'; };
        window.handleLogin = () => {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('bottom-nav').style.display = 'flex';
            initDashboard();
        };
        window.handleLogout = () => location.reload();

        // --- DASHBOARD ---
        function initDashboard() {
            const slides = [
                { icon: 'hand', title: 'SULTAN COMMAND', text: 'Sistem operasional siap dijalankan.' },
                { icon: 'shield-check', title: 'SECURITY STATUS', text: 'All encrypted. Ghost mode active.' },
                { icon: 'gift', title: 'HARI INI', text: '🎂 Selamat Ultah Pak Budi!' }
            ];
            document.getElementById('carousel-slides').innerHTML = slides.map((s,i) => `
                <div class="carousel-slide ${i===0?'active':''}">
                    <div class="flex items-center gap-2 mb-1 text-teal-400 font-bold text-[10px] uppercase">
                        <i data-lucide="${s.icon}" class="w-3 h-3"></i><span>${s.title}</span>
                    </div>
                    <p class="text-xs text-white/60">${s.text}</p>
                </div>`).join('');
            
            const items = ['Command', 'Booking', 'K3', 'Security', 'Janitor', 'Asset'];
            document.getElementById('menu-grid').innerHTML = items.map(m => `
                <div class="menu-card glass p-4 rounded-2xl text-center" onclick="handleMenuClick('${m}')">
                    <div class="text-[10px] font-bold uppercase tracking-widest">${m}</div>
                </div>`).join('');
            if(window.lucide) lucide.createIcons();
        }

        window.handleMenuClick = (l) => {
            if(l === 'Command') {
                fetch('js/modules/command.html').then(r => r.text()).then(h => {
                    document.getElementById('command-content-body').innerHTML = h;
                    document.getElementById('home-view').style.display = 'none';
                    document.getElementById('command-center').style.display = 'block';
                    // Re-run script in modular file
                    const scripts = document.getElementById('command-content-body').querySelectorAll('script');
                    scripts.forEach(s => { const n = document.createElement('script'); n.textContent = s.textContent; document.body.appendChild(n); });
                });
            } else alert(l + " Ready!");
        };

        window.goHome = () => {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('command-center').style.display = 'none';
        };

        // --- GHOST ENGINE (REAL LOGIC) ---
        document.getElementById('dream-logo').addEventListener('click', () => {
            tapCount++;
            const fb = document.getElementById('tap-feedback');
            fb.innerText = `TAP ${tapCount}/7`; fb.style.opacity = '1';
            if(tapTimer) clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; fb.style.opacity = '0'; }, 2000);
            if(tapCount >= 7) { tapCount = 0; openGhost(); }
        });

        window.openGhost = () => {
            document.getElementById('ghost-dashboard').classList.add('active');
            const tools = [
                { id: 'exif', title: '📸 METADATA INTEL', desc: 'Read GPS & Device Info', action: 'triggerExif()', color: 'purple' },
                { id: 'sherlock', title: '👤 SHERLOCK', desc: 'Copy OSINT command', action: 'promptSherlock()', color: 'blue' },
                { id: 'nmap', title: '🌐 NMAP', desc: 'Copy Network Scanner', action: 'promptNmap()', color: 'emerald' },
                { id: 'dork', title: '🔎 DORKING', desc: 'Google Search Intelligence', action: 'promptDorking()', color: 'amber' }
            ];
            document.getElementById('ghost-tools').innerHTML = tools.map(t => `
                <div class="glass p-3 rounded-xl border border-${t.color}-500/20 flex justify-between items-center" onclick="${t.action}">
                    <div><div class="font-bold text-${t.color}-400 text-xs">${t.title}</div><div class="text-[9px] text-white/40">${t.desc}</div></div>
                    <div class="text-[10px] text-${t.color}-300 uppercase">Run</div>
                </div>`).join('');
        };

        window.closeGhost = () => document.getElementById('ghost-dashboard').classList.remove('active');

        // REAL EXIF LOGIC
        window.triggerExif = () => {
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0]; if(!file) return;
                console.log("Processing:", file.name);
                EXIF.getData(file, function() {
                    const tags = EXIF.getAllTags(this);
                    if(Object.keys(tags).length === 0) return alert("❌ No Metadata Found! (File may be stripped)");
                    alert(`🔍 INTEL FOUND:\nDevice: ${tags.Model || 'N/A'}\nDateTime: ${tags.DateTime || 'N/A'}\nResolution: ${tags.PixelXDimension}x${tags.PixelYDimension}\nGPS: ${tags.GPSLatitude ? 'DETECTED' : 'NONE'}`);
                    console.table(tags);
                });
            };
            input.click();
        };

        window.promptSherlock = () => {
            const u = prompt("Username:"); if(u) { navigator.clipboard.writeText(`sherlock ${u}`); alert("Copied!"); }
        };
        window.promptNmap = () => {
            const i = prompt("Target IP:"); if(i) { navigator.clipboard.writeText(`nmap -sV ${i}`); alert("Copied!"); }
        };
        window.promptDorking = () => {
            const d = prompt("Domain:"); if(d) window.open(`https://www.google.com/search?q=site:${d}+filetype:log`, '_blank');
        };

        console.log("✅ Dream OS v1.3.3.1 - Zero Dummy Policy");
    </script>
</body>
</html>
