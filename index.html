<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS Sovereign</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --gold: #d97706; --bg: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; overflow: hidden; color: var(--text); }
        .batik { position: fixed; inset: 0; opacity: 0.03; z-index: -1; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z' fill='%2310b981'/%3E%3C/svg%3E"); }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 15px; }
        .active { display: flex !important; }
        .card { background: white; padding: 35px 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 340px; margin-top: 10vh; }
        .pass-box { position: relative; width: 100%; margin: 20px 0; }
        input { width: 100%; padding: 18px; padding-right: 50px; border: 2px solid #f1f5f9; border-radius: 18px; background: #f8fafc; outline: none; font-size: 1rem; }
        .eye-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; cursor: pointer; }
        .header-container { display: flex; align-items: center; width: 100%; padding: 10px 5px; }
        .header-logo { width: 50px; height: 50px; -o-object-fit: contain; object-fit: contain; }
        .header-text { flex: 1; text-align: center; margin-right: 50px; }
        .bismillah { font-family: 'Amiri', serif; font-size: 1.6rem; color: var(--gold); line-height: 1; }
        .shalawat { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
        .carousel { width: 100%; height: 110px; background: #f8fafc; border-radius: 25px; margin: 10px 0; overflow: hidden; border: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .slide { display: none; padding: 20px; text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--emerald); animation: slideIn 0.5s; }
        .slide.active { display: block; }
        .grid-9 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .mod { background: white; padding: 15px 5px; border-radius: 22px; text-align: center; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .mod i { font-size: 1.4rem; color: var(--emerald); margin-bottom: 6px; display: block; }
        .mod span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; display: block; }
        .nav-5 { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: white; display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #f1f5f9; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #cbd5e1; font-size: 1.2rem; }
        .nav-item.active { color: var(--emerald); }
        @keyframes slideIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
  <script type="module" crossorigin src="./assets/index-Dxes3MGL.js"></script>
</head>
<body>
    <div class="batik"></div>
    <section id="login-screen" class="screen active">
        <div class="card">
            <img src="./assets/logo-sultan-t5H7gsFR.png" width="90">
            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div class="pass-box">
                <input type="password" id="accessKey" placeholder="Access Key">
                <i class="fas fa-eye eye-icon" id="togglePass"></i>
            </div>
            <button id="loginBtn" style="width:100%; padding:18px; background:var(--emerald); color:white; border:none; border-radius:18px; font-weight:900;">ACCESS SYSTEM</button>
        </div>
    </section>
    <section id="dashboard-screen" class="screen">
        <header class="header-container">
            <img src="./assets/logo-sultan-t5H7gsFR.png" class="header-logo">
            <div class="header-text">
                <div class="bismillah" id="zikir-title">بِسْمِ اللَّهِ</div>
                <div class="shalawat">Allahumma Sholli Ala Muhammad</div>
            </div>
        </header>
        <div class="carousel" id="carousel-box"></div>
        <div class="grid-9">
            <div class="mod"><i class="fas fa-desktop"></i><span>CMD CENTER</span></div>
            <div class="mod"><i class="fas fa-calendar-check"></i><span>BOOKING</span></div>
            <div class="mod"><i class="fas fa-biohazard"></i><span>K3 FORM</span></div>
            <div class="mod"><i class="fas fa-user-shield"></i><span>SEKURITI</span></div>
            <div class="mod"><i class="fas fa-pump-soap"></i><span>JAN INDOOR</span></div>
            <div class="mod"><i class="fas fa-leaf"></i><span>JAN OUTDOOR</span></div>
            <div class="mod"><i class="fas fa-box-open"></i><span>STOK ALAT</span></div>
            <div class="mod"><i class="fas fa-wrench"></i><span>MAINTENANCE</span></div>
            <div class="mod"><i class="fas fa-warehouse"></i><span>INVENTARIS</span></div>
        </div>
        <nav class="nav-5">
            <div class="nav-item active"><i class="fas fa-home"></i></div>
            <div class="nav-item"><i class="fas fa-user"></i></div>
            <div class="nav-item"><i class="fas fa-qrcode" style="font-size:1.8rem; color:var(--emerald)"></i></div>
            <div class="nav-item"><i class="fas fa-info-circle"></i></div>
            <div class="nav-item"><i class="fas fa-cog"></i></div>
        </nav>
    </section>
</body>
</html>
