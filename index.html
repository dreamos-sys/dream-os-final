<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <title>Dream OS • Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        teal: { 400: '#2dd4bf', 500: '#14b8a6' },
                        emerald: { 400: '#34d399', 500: '#10b981' },
                        slate: { 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; background-color: #020617; }
        .font-arabic { font-family: 'Amiri', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .view { display: none; }
        .view.active { display: flex; }
        .glass-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
        }
        .magnet { transition: transform 0.12s cubic-bezier(0.4, 0, 0.2, 1); }
        .magnet:active { transform: scale(0.96); }
        .ghost-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(16px); z-index: 1000; display: none; flex-direction: column; }
        .ghost-overlay.active { display: flex; }
    </style>
</head>
<body class="text-slate-200 h-screen overflow-hidden flex flex-col bg-slate-950">
    <div id="app-root" class="h-full w-full flex flex-col"></div>
    <script src="core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Memuat part Authentication secara asynchronous
            fetch('modules/auth.html')
                .then(response => response.text())
                .then(html => {
                    document.getElementById('app-root').innerHTML = html;
                    lucide.createIcons();
                    
                    // Bind Logic Login yang terpisah
                    document.getElementById('btn-login').onclick = () => {
                        const key = document.getElementById('access-key').value;
                        if (!key) return alert('Masukkan Access Key!');
                        
                        // Load Dashboard Part
                        fetch('modules/dashboard.html')
                            .then(res => res.text())
                            .then(dashHtml => {
                                document.getElementById('app-root').innerHTML = dashHtml;
                                lucide.createIcons();
                                
                                // Memuat Grid Part
                                fetch('modules/grid.html')
                                    .then(rGrid => rGrid.text())
                                    .then(gridHtml => {
                                        document.getElementById('staff-grid-wrapper').innerHTML = gridHtml;
                                        window.renderMainGrid();
                                        lucide.createIcons();
                                    });
                                    
                                // Event Logout
                                document.getElementById('btn-logout').onclick = () => {
                                    window.location.reload();
                                };
                            });
                    };
                    
                    // Ghost Monitoring 7 Taps Trigger
                    document.getElementById('dream-logo').addEventListener('pointerdown', () => {
                        state.ghostTaps++;
                        if (state.ghostTaps === 1) state.ghostTimer = setTimeout(() => state.ghostTaps = 0, 2000);
                        
                        if (state.ghostTaps >= 7) {
                            clearTimeout(state.ghostTimer);
                            state.ghostTaps = 0;
                            fetch('modules/ghost.html')
                                .then(res => res.text())
                                .then(ghostHtml => {
                                    document.body.insertAdjacentHTML('beforeend', ghostHtml);
                                    document.getElementById('ghost-overlay').classList.add('active');
                                    lucide.createIcons();
                                    document.getElementById('ghost-close').onclick = () => {
                                        document.getElementById('ghost-overlay').remove();
                                    };
                                });
                        }
                    });
                });
        });
    </script>
</body>
</html>
