<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS • The Soul v4.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #010409; --glass: rgba(255,255,255,0.03); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .arabic-glow { text-shadow: 0 0 25px rgba(16,185,129,0.4); }
        .card-hover { transition: all 0.2s ease; cursor: pointer; }
        .card-hover:active { transform: scale(0.95); border-color: var(--primary); }
        
        /* Sentinel & LED Pulse */
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); } 50% { box-shadow: 0 0 0 15px rgba(16,185,129,0); } }
        
        /* 7-Second Nav Slide RESTORED */
        .nav-slide { animation: slideNav 7s infinite linear; }
        @keyframes slideNav { 0% { transform: translateX(-8%); } 50% { transform: translateX(8%); } 100% { transform: translateX(-8%); } }
        
        .slide-up { animation: slideUp 0.4s ease-out forwards; opacity: 0; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        #lockdown { position: fixed; inset: 0; background: rgba(1,2,6,0.98); z-index: 9999; display: none; align-items: center; justify-content: center; text-align: center; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none">

    <div id="lockdown" class="flex-col p-8">
        <div class="text-6xl mb-6 arabic-glow text-emerald-500">ه</div>
        <h1 id="lockdown-msg" class="text-xl font-bold text-rose-400 uppercase tracking-wider mb-4">GEOFENCE BREACH</h1>
        <p class="text-[10px] text-white/50 mb-8 tracking-widest uppercase">Off-Grid Area Detected</p>
        <button onclick="location.reload()" class="px-6 py-3 glass rounded-full text-xs font-bold tracking-widest active:scale-95 transition">RE-VERIFY</button>
    </div>

    <section id="login" class="fixed inset-0 z-50 bg-[#010409] flex flex-col items-center justify-center p-6 transition-opacity duration-500">
        <div class="text-center mb-10 slide-up">
            <img src="assets/logo-sultan.png" class="w-24 h-24 mx-auto rounded-3xl border border-amber-500/20 shadow-2xl mb-6" onerror="this.style.display='none'">
            <p class="text-4xl font-bold text-white arabic-glow" style="font-family:'Amiri',serif">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
            <p class="text-sm text-emerald-500/70 mt-2 italic" style="font-family:'Amiri',serif">اَللّٰهُمَّ صَلِّ عَلٰى سَيِّدِنَا مُحَمَّدٍ</p>
        </div>
        <div class="w-full max-w-xs space-y-4 slide-up" style="animation-delay:0.1s">
            <div class="glass rounded-2xl p-1 flex items-center pr-3">
                <input type="password" id="pass" class="flex-1 p-4 bg-transparent text-center outline-none font-mono tracking-[0.5em] text-emerald-400 placeholder-white/20" placeholder="••••">
                <button onclick="togglePass()" class="p-2 text-white/30 hover:text-emerald-400 transition"><i id="eye" data-lucide="eye"></i></button>
            </div>
            <button onclick="login()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 font-bold rounded-xl shadow-lg transition active:scale-95 text-[10px] tracking-widest uppercase">Access Core</button>
            <p class="text-[9px] text-white/30 text-center uppercase tracking-widest">Demo UI • Local Auth</p>
        </div>
    </section>

    <div id="ghost" class="fixed inset-0 bg-[#010206] z-[9999] p-6 overflow-y-auto hidden flex-col slide-up" style="animation-duration: 0.3s;">
        <div class="flex justify-between items-center mb-8 pb-4 border-b border-teal-500/20 mt-4">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-rose-500 animate-ping"></div>
                <h2 class="text-[10px] font-black text-teal-400 tracking-[0.5em] uppercase">Stealth Hub</h2>
            </div>
            <button onclick="toggleGhost()" class="text-white/40 text-[10px] font-bold uppercase tracking-widest active:scale-90 transition">Close</button>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="wipeLogs()" class="glass p-5 rounded-2xl text-center active:scale-95 transition card-hover">
                <i data-lucide="trash-2" class="w-6 h-6 mx-auto text-rose-400 mb-3"></i>
                <p class="text-[9px] font-bold uppercase text-white/70">Clear Logs</p>
            </button>
            <button onclick="spoofId()" class="glass p-5 rounded-2xl text-center active:scale-95 transition card-hover">
                <i data-lucide="shield-alert" class="w-6 h-6 mx-auto text-amber-400 mb-3"></i>
                <p class="text-[9px] font-bold uppercase text-white/70">Spoof ID</p>
            </button>
        </div>
        <div id="log" class="glass rounded-xl p-4 font-mono text-[10px] text-emerald-400 leading-relaxed whitespace-pre-wrap flex-1 overflow-y-auto bg-black/50"></div>
    </div>

    <div id="app" class="hidden flex-col h-full bg-[#010409]">
        <header class="pt-12 pb-6 px-6 text-center space-y-2 relative z-40 bg-gradient-to-b from-[#010409] to-transparent">
            <h1 class="text-4xl font-bold text-white arabic-glow" style="font-family: 'Amiri', serif;">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</h1>
            <p class="text-sm text-emerald-500 italic opacity-80" style="font-family: 'Amiri', serif;">اَللّٰهُمَّ صَلِّ عَلٰى سَيِّدِنَا مُحَمَّدٍ</p>
            <div class="absolute top-6 right-6 flex items-center gap-2">
                <p id="geo" class="text-[8px] text-white/30 uppercase font-bold tracking-widest">Scanning</p>
                <div id="led" class="w-2 h-2 rounded-full bg-emerald-500 pulse"></div>
            </div>
        </header>

        <main id="viewport" class="flex-1 overflow-y-auto px-6 pb-32 space-y-6 hide-scroll">
            
            <div class="glass rounded-2xl p-4 slide-up" style="animation-delay:0.1s">
                <p class="text-[9px] text-white/50 leading-relaxed text-center uppercase tracking-widest font-bold">
                    <span class="text-emerald-400">Status:</span> UI Prototype • Client-Side Only
                </p>
            </div>

            <div id="grid" class="grid grid-cols-3 gap-3 slide-up" style="animation-delay:0.2s"></div>
        </main>

        <nav class="fixed bottom-0 inset-x-0 h-28 px-4 flex justify-between items-center z-40 bg-gradient-to-t from-[#010409] via-[#010409]/90 to-transparent">
            <div class="flex w-full justify-between items-center nav-slide">
                <button onclick="navAlert('HOME')" class="text-emerald-400 flex flex-col items-center gap-1.5 active:scale-90 transition">
                    <i data-lucide="home" class="w-5 h-5"></i><span class="text-[8px] font-bold">HOME</span>
                </button>
                <button onclick="navAlert('PROFILE')" class="text-white/40 flex flex-col items-center gap-1.5 active:scale-90 transition">
                    <i data-lucide="user" class="w-5 h-5"></i><span class="text-[8px] font-bold">PROFILE</span>
                </button>
                
                <div id="sentinel" onclick="tapLogo()" class="relative z-50 w-16 h-16 -mt-12 bg-emerald-600 rounded-full flex items-center justify-center border-[5px] border-[#010409] shadow-[0_0_15px_#10b981] pulse cursor-pointer active:scale-90 transition mx-2">
                    <span class="text-3xl font-bold text-white arabic-glow select-none" style="font-family: 'Amiri', serif;">ه</span>
                </div>

                <button onclick="navAlert('ABOUT')" class="text-white/40 flex flex-col items-center gap-1.5 active:scale-90 transition">
                    <i data-lucide="info" class="w-5 h-5"></i><span class="text-[8px] font-bold">ABOUT</span>
                </button>
                <button onclick="navAlert('CONFIG')" class="text-white/40 flex flex-col items-center gap-1.5 active:scale-90 transition">
                    <i data-lucide="settings" class="w-5 h-5"></i><span class="text-[8px] font-bold">CONFIG</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        const HQ = { lat: -6.4172, lon: 106.8302 }; // GDC Depok
        const RADIUS_KM = 2.0;
        const MODULES = [
            { id: 'cmd', label: 'CMD', icon: 'terminal' },
            { id: 'book', label: 'BOOK', icon: 'calendar' },
            { id: 'k3', label: 'K3', icon: 'shield-alert' },
            { id: 'sec', label: 'SEC', icon: 'lock' },
            { id: 'in', label: 'IN', icon: 'log-in' },
            { id: 'out', label: 'OUT', icon: 'log-out' },
            { id: 'stok', label: 'STOK', icon: 'package' },
            { id: 'maint', label: 'MAINT', icon: 'wrench' },
            { id: 'asset', label: 'ASSET', icon: 'building' }
        ];

        const haversine = (lat1, lon1, lat2, lon2) => {
            const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        const log = (msg) => {
            const el = document.getElementById('log');
            if(el) { el.innerHTML += `> ${new Date().toLocaleTimeString()} | ${msg}\n`; el.scrollTop = el.scrollHeight; }
        };

        window.togglePass = () => {
            const inp = document.getElementById('pass'), eye = document.getElementById('eye');
            const isPass = inp.type === 'password';
            inp.type = isPass ? 'text' : 'password';
            eye.setAttribute('data-lucide', isPass ? 'eye-off' : 'eye');
            lucide.createIcons();
        };

        window.login = async () => {
            const pass = document.getElementById('pass').value;
            if(pass !== 'b15m1ll4h_012443410') { alert('Password Salah'); return; }
            
            if(!navigator.geolocation) { lockdown('GPS Terblokir'); return; }
            
            document.getElementById('login').style.opacity = '0';
            setTimeout(async () => {
                const safe = await verifyGeo();
                if(!safe) return;
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                initApp();
            }, 500);
        };

        const verifyGeo = () => new Promise(resolve => {
            navigator.geolocation.getCurrentPosition(pos => {
                const dist = haversine(pos.coords.latitude, pos.coords.longitude, HQ.lat, HQ.lon);
                if(dist <= RADIUS_KM) {
                    document.getElementById('geo').textContent = `SACRED • ${dist.toFixed(1)}KM`;
                    resolve(true);
                } else {
                    lockdown(`OFF-GRID: ${dist.toFixed(1)}KM`);
                    resolve(false);
                }
            }, () => { lockdown('GPS ERROR'); resolve(false); }, { enableHighAccuracy: true });
        });

        const lockdown = (msg) => {
            document.getElementById('lockdown-msg').textContent = msg;
            document.getElementById('lockdown').style.display = 'flex';
        };

        const initApp = () => {
            document.getElementById('grid').innerHTML = MODULES.map(m => `
                <div class="glass p-5 rounded-2xl text-center flex flex-col items-center justify-center aspect-square card-hover cursor-pointer" onclick="openModule('${m.id}')">
                    <i data-lucide="${m.icon}" class="w-6 h-6 text-emerald-400/80 mb-3"></i>
                    <span class="text-[9px] font-bold tracking-widest text-white/80">${m.label}</span>
                </div>
            `).join('');
            lucide.createIcons();
            log('Soul of Dream OS v4.3 Restored.');
        };

        window.openModule = (id) => {
            log(`Module accessed: ${id.toUpperCase()}`);
            alert(`Membuka Modul: ${id.toUpperCase()}\n(Mode UI Demo)`);
        };

        window.navAlert = (name) => {
            log(`Nav clicked: ${name}`);
            alert(`Navigasi ke: ${name}\n(Mode UI Demo)`);
        };

        // GHOST HUB (7-TAP PADA SENTINEL TENGAH)
        let taps = 0, tapTimer;
        window.tapLogo = () => {
            taps++;
            if(taps >= 7) {
                taps = 0;
                toggleGhost();
                log('Stealth Hub Override (7-Tap) Accepted.');
            }
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => taps = 0, 2000);
        };

        window.toggleGhost = () => {
            const hub = document.getElementById('ghost');
            hub.classList.toggle('hidden');
            if(!hub.classList.contains('hidden')) lucide.createIcons();
        };

        window.wipeLogs = () => {
            log('Purging logs...');
            setTimeout(() => { document.getElementById('log').innerHTML = ''; alert('Logs Cleared!'); }, 500);
        };

        window.spoofId = () => {
            const id = Math.random().toString(16).slice(2,14).toUpperCase();
            log(`Identity Spoofed: ${id}`);
            alert(`Identity Spoofed!\nVirtual MAC: ${id}`);
        };

        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
