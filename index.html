<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v2.1.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --gold: #d97706; --bg: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; min-height: 100vh; overflow: hidden; }
        .batik-overlay { position: fixed; inset: 0; opacity: 0.03; pointer-events: none; z-index: -1; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z' fill='%2310b981'/%3E%3C/svg%3E"); }
        
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex !important; }

        /* Login Card */
        .card { background: rgba(255,255,255,0.9); padding: 32px; border-radius: 28px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 340px; border: 1px solid rgba(16,185,129,0.1); }
        .bismillah { font-family: 'Amiri', serif; font-size: 1.8rem; color: var(--gold); margin: 15px 0; }
        input { width: 100%; padding: 16px; margin: 15px 0; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 1rem; outline: none; transition: 0.3s; background: #f8fafc; }
        input:focus { border-color: var(--emerald); background: #fff; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }

        /* Dashboard Grid */
        #dashboard-content { width: 100%; max-width: 400px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        .mod-card { background: white; padding: 20px 10px; border-radius: 20px; text-align: center; border: 1px solid #f1f5f9; box-shadow: 0 8px 15px rgba(0,0,0,0.02); }
        .mod-card i { font-size: 1.5rem; color: var(--emerald); margin-bottom: 8px; }
        .mod-card span { font-size: 0.7rem; font-weight: 800; color: #1e293b; display: block; }
    </style>
  <script type="module" crossorigin src="./assets/index-BDXduKD5.js"></script>
</head>
<body>
    <div class="batik-overlay"></div>

    <section id="login-screen" class="screen active">
        <div class="card">
            <img src="assets/icons/icon-192.png" width="80" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3003/3003211.png'">
            <h2 style="margin:5px 0 0 0; font-size: 1.4rem;">Dream OS <span style="color:var(--gold)">v2.1.2</span></h2>
            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <input type="password" id="accessKey" placeholder="Enter Access Key">
            <button id="loginBtn">ACCESS SYSTEM</button>
            <p style="font-size:0.6rem; color:#94a3b8; margin-top:20px;">The Power Soul of Shalawat © 2026</p>
        </div>
    </section>

    <section id="dashboard-screen" class="screen">
        <div id="dashboard-content">
            </div>
    </section>

</body>
</html>
