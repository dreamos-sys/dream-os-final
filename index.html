<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS • v1.9.5 Sacred</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/vaccineVault.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #0f172a; --glass: rgba(255,255,255,0.03); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-active { color: var(--primary) !important; filter: drop-shadow(0 0 10px rgba(16,185,129,0.5)); }
        .card-nano { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); transition: 0.2s; }
        .card-nano:active { transform: scale(0.92); background: rgba(16,185,129,0.1); border-color: var(--primary); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #boot-splash { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        #boot-splash.hidden { opacity: 0; pointer-events: none; }
        #ghost-hub { display: none; position: fixed; inset: 0; background: rgba(2,6,23,0.99); z-index: 1000; padding: 25px; overflow-y: auto; }
        #ghost-hub.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="select-none">

    <div id="boot-splash">
        <img src="assets/logo-sultan.png" class="w-20 h-20 rounded-[2rem] animate-pulse">
        <p class="text-xl mt-6 font-bold text-amber-500 italic" style="font-family: 'Amiri', serif;">Dream OS • Neural Boot</p>
    </div>

    <section id="login-screen" class="fixed inset-0 z-[100] bg-[#0f172a] flex flex-col items-center justify-center p-8 transition-all duration-700">
        <div id="logo-trigger" class="mb-8 cursor-pointer active:scale-95 transition-all relative">
            <div id="ghost-glow" class="absolute inset-0 bg-amber-500/0 rounded-full blur-2xl transition-all"></div>
            <img src="assets/logo-sultan.png" class="w-24 h-24 mx-auto rounded-[2rem] shadow-2xl border border-amber-500/20 relative z-10">
            <p class="text-2xl mt-6 font-bold text-center" style="font-family: 'Amiri', serif;">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <div class="glass rounded-3xl p-1 border border-white/10 flex items-center pr-4">
                <input type="password" id="pass-input" class="w-full p-5 bg-transparent text-center outline-none font-mono tracking-[0.3em] text-emerald-400" placeholder="KEY ACCESS">
                <button onclick="togglePass()" class="text-white/20 hover:text-emerald-400 transition"><i id="eye-icon" data-lucide="eye"></i></button>
            </div>
            <button onclick="authenticate()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 font-bold rounded-2xl shadow-xl transition-all active:scale-95 text-[10px] tracking-widest uppercase">Unlock System</button>
        </div>
    </section>

    <div id="app-shell" class="hidden flex-col h-full">
        <header id="app-header" class="p-5 border-b border-white/5 bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50"></header>
        <main id="main-viewport" class="flex-1 overflow-y-auto p-5 pb-32 hide-scrollbar space-y-8"></main>
        <nav id="app-nav" class="fixed bottom-0 inset-x-0 glass border-t border-white/5 h-24 px-8 flex justify-between items-center z-40 bg-[#0f172a]/95 backdrop-blur-3xl"></nav>
    </div>

    <div id="ghost-hub">
        <div class="flex justify-between items-center mb-8 border-b border-teal-500/20 pb-4">
            <h2 class="text-xs font-black text-teal-400 tracking-[0.3em] uppercase italic">Stealth War Room</h2>
            <button onclick="toggleGhost(false)" class="text-red-500 font-bold text-[10px]">✕ CLOSE</button>
        </div>
        <div id="ghost-grid" class="grid grid-cols-2 gap-4"></div>
        <div id="ghost-res" class="hidden mt-6 glass p-6 rounded-2xl border border-teal-500/20">
            <p id="res-title" class="text-[10px] font-bold text-pink-400 mb-2 uppercase border-b border-white/5 pb-1"></p>
            <div id="res-body" class="text-[10px] font-mono text-white/50 overflow-x-auto max-h-60 leading-relaxed"></div>
        </div>
    </div>

    <script>
        const SACRED_PASS = "b15m1ll4h_012443410";
        const SESSION_KEY = "shalawat_nur";
        let ghostTap = 0, ghostTimer = null;

        // Configuration
        const UI_DATA = {
            stats: [
                { icon: 'activity', val: '128', color: 'text-blue-400' },
                { icon: 'calendar', val: '45', color: 'text-emerald-400' },
                { icon: 'archive', val: '890', color: 'text-amber-400' },
                { icon: 'shield', val: 'MAX', color: 'text-rose-400' }
            ],
            modules: [
                { id: 'cmd', label: 'CMD', icon: 'layout-dashboard', color: 'text-blue-400' },
                { id: 'book', label: 'BOOK', icon: 'calendar', color: 'text-emerald-400' },
                { id: 'k3', label: 'K3', icon: 'shield-alert', color: 'text-rose-400' },
                { id: 'sec', label: 'SEC', icon: 'lock', color: 'text-amber-400' },
                { id: 'janin', label: 'JAN-IN', icon: 'droplet', color: 'text-cyan-400' },
                { id: 'janout', label: 'JAN-OUT', icon: 'wind', color: 'text-teal-400' },
                { id: 'stok', label: 'STOK', icon: 'box', color: 'text-orange-400' },
                { id: 'maint', label: 'MAINT', icon: 'wrench', color: 'text-blue-300' },
                { id: 'asset', label: 'ASSET', icon: 'building', color: 'text-slate-400' }
            ]
        };

        function encrypt(t) { return btoa(t.split('').map((c,i) => String.fromCharCode(c.charCodeAt(0) ^ SESSION_KEY.charCodeAt(i % SESSION_KEY.length))).join('')); }
        function decrypt(e) { return atob(e).split('').map((c,i) => String.fromCharCode(c.charCodeAt(0) ^ SESSION_KEY.charCodeAt(i % SESSION_KEY.length))).join(''); }

        function bootSystem() {
            const lock = localStorage.getItem('dream_lock');
            if (lock && decrypt(lock).startsWith('MASTER_ACTIVE_')) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';
                renderDashboard();
            }
            setTimeout(() => document.getElementById('boot-splash').classList.add('hidden'), 800);
        }

        window.togglePass = () => {
            const i = document.getElementById('pass-input'), e = document.getElementById('eye-icon');
            const isP = i.type === 'password'; i.type = isP ? 'text' : 'password';
            e.setAttribute('data-lucide', isP ? 'eye-off' : 'eye'); lucide.createIcons();
        };

        window.authenticate = () => {
            if (document.getElementById('pass-input').value === SACRED_PASS) {
                localStorage.setItem('dream_lock', encrypt('MASTER_ACTIVE_' + Date.now()));
                location.reload();
            } else { alert('Access Denied'); }
        };

        function renderDashboard() {
            document.getElementById('app-header').innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-3"><img src="assets/logo-sultan.png" class="w-10 h-10 rounded-xl border border-amber-500/10 shadow-lg"><div><span class="text-[10px] font-black text-amber-500 uppercase italic">Dream OS</span><p class="text-[8px] text-white/30 uppercase">Master M • v1.9.5</p></div></div>
                    <button onclick="localStorage.removeItem('dream_lock'); location.reload();" class="text-white/20 hover:text-red-400 text-[8px] font-bold">LOGOUT</button>
                </div>
                <div class="text-center py-2 bg-white/5 rounded-2xl border border-white/5"><p class="text-sm font-bold text-white" style="font-family: 'Amiri', serif;">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p></div>`;
            
            document.getElementById('main-viewport').innerHTML = `
                <div class="grid grid-cols-4 gap-2">${UI_DATA.stats.map(s => `<div class="glass p-3 rounded-2xl text-center"><i data-lucide="${s.icon}" class="w-4 h-4 mx-auto ${s.color} mb-1"></i><span class="text-[9px] font-bold block">${s.val}</span></div>`).join('')}</div>
                <div class="h-32 glass rounded-[2rem] flex items-center justify-center italic text-white/20 text-xs">Dynamic Intel Feed Active</div>
                <div class="grid grid-cols-3 gap-3">${UI_DATA.modules.map(m => `<div class="card-nano p-5 rounded-3xl text-center flex flex-col items-center"><i data-lucide="${m.icon}" class="w-7 h-7 ${m.color} mb-2"></i><span class="text-[9px] font-bold uppercase tracking-tight">${m.label}</span></div>`).join('')}</div>`;

            document.getElementById('app-nav').innerHTML = `
                <button class="nav-active flex flex-col items-center gap-2"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[8px] font-bold uppercase">Home</span></button>
                <button class="text-white/30 flex flex-col items-center gap-2"><i data-lucide="user" class="w-6 h-6"></i><span class="text-[8px] font-bold uppercase">User</span></button>
                <div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center -mt-10 border-4 border-[#0f172a] shadow-2xl active:scale-90 transition"><i data-lucide="qr-code" class="w-6 h-6 text-white"></i></div>
                <button class="text-white/30 flex flex-col items-center gap-2"><i data-lucide="info" class="w-6 h-6"></i><span class="text-[8px] font-bold uppercase">Info</span></button>
                <button class="text-white/30 flex flex-col items-center gap-2"><i data-lucide="settings" class="w-6 h-6"></i><span class="text-[8px] font-bold uppercase">Config</span></button>`;
            lucide.createIcons();
        }

        document.getElementById('logo-trigger').addEventListener('click', () => {
            ghostTap++; const g = document.getElementById('ghost-glow'); g.style.background = `rgba(245, 158, 11, ${ghostTap * 0.15})`;
            if(ghostTap >= 7) { ghostTap = 0; g.style.background = 'none'; toggleGhost(true); }
            clearTimeout(ghostTimer); ghostTimer = setTimeout(() => { ghostTap = 0; g.style.background = 'none'; }, 2000);
        });

        window.toggleGhost = (s) => {
            const h = document.getElementById('ghost-hub'); h.classList.toggle('active', s);
            if(s) {
                const tools = [
                    { t: 'Live CVE Intel', c: 'amber', exec: async () => { 
                        const data = await VaccineVault.fetchCVE();
                        showRes('CVE INTEL', data ? data.map(c => `[${c.id}] ${c.summary}`).join('\n\n') : 'Error Connect');
                    }},
                    { t: 'Risk Analyzer', c: 'rose', exec: () => { 
                        const p = prompt("Payload:"); if(p) { const r = VaccineVault.analyze(p); showRes('NEURAL REPORT', `Score: ${r.score}%\nSigs: ${r.risks.join(', ')}`); }
                    }},
                    { t: 'Vaccine Lab', c: 'emerald', exec: () => { showRes('VACCINE', 'Engine Active v1.0'); }},
                    { t: 'Exif Intel', c: 'purple', exec: () => { showRes('EXIF', 'Forensic Ready'); }}
                ];
                document.getElementById('ghost-grid').innerHTML = tools.map(t => `<div onclick="(${t.exec.toString()})()" class="glass p-6 rounded-3xl border border-${t.c}-500/20 text-center active:scale-95"><p class="text-[10px] font-black text-${t.c}-400 uppercase">${t.t}</p></div>`).join('');
                document.getElementById('ghost-res').classList.add('hidden');
            }
        };

        function showRes(t, b) { document.getElementById('res-title').innerText = t; document.getElementById('res-body').innerText = b; document.getElementById('ghost-res').classList.remove('hidden'); }

        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); bootSystem(); });
    </script>
</body>
</html>
