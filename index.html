<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream OS - Fallback Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: linear-gradient(135deg, #f0f9ff 0%, #f0fdf4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #1e293b;
    }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 24px;
      padding: 2rem;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(16,185,129,0.15);
    }
    .logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    h1 {
      background: linear-gradient(135deg, #10b981, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.75rem;
      font-weight: 800;
      margin: 0.5rem 0;
    }
    .status {
      margin-top: 1.5rem;
      padding: 0.75rem 1.25rem;
      background: #ecfdf5;
      border: 2px solid #10b981;
      border-radius: 12px;
      color: #065f46;
      font-weight: 600;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .grid-item {
      padding: 0.75rem;
      background: #fff;
      border-radius: 12px;
      font-size: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    footer {
      margin-top: 1.5rem;
      color: #64748b;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🕌</div>
    <h1>Dream OS</h1>
    <p style="color:#64748b;margin:0.5rem 0;">Crystal Glassmorphism UI</p>
    
    <div class="status">✅ FALLBACK TEST SUCCESSFUL!</div>
    
    <div class="grid">
      <div class="grid-item">📊</div>
      <div class="grid-item">📅</div>
      <div class="grid-item">👷</div>
      <div class="grid-item">🛡️</div>
      <div class="grid-item">🧹</div>
      <div class="grid-item">🌿</div>
    </div>
    
    <footer>
      <p>If you see this, GitHub Pages + CSS work!</p>
      <p style="margin-top:0.5rem;font-size:0.75rem;">Next: Re-enable Svelte</p>
    </footer>
  </div>
  
  <script>
    console.log('✅✅✅ FALLBACK PAGE LOADED ✅✅✅');
    console.log('URL:', location.href);
    console.log('User Agent:', navigator.userAgent);
  </script>
</body>
</html>
