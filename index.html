<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v2.1.3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --gold: #d97706; --bg: #ffffff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; overflow: hidden; }
        .batik { position: fixed; inset: 0; opacity: 0.03; z-index: -1; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z' fill='%2310b981'/%3E%3C/svg%3E"); }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .active { display: flex !important; }
        .card { background: white; padding: 30px; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 340px; border: 1px solid #f1f5f9; }
        .bismillah { font-family: 'Amiri', serif; font-size: 1.8rem; color: var(--gold); margin: 10px 0; }
        input { width: 100%; padding: 16px; margin: 15px 0; border: 2px solid #f1f5f9; border-radius: 14px; background: #f8fafc; outline: none; }
        button { width: 100%; padding: 16px; background: var(--emerald); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 400px; margin-top: 20px; }
        .mod { background: white; padding: 15px 5px; border-radius: 18px; text-align: center; border: 1px solid #f1f5f9; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .mod i { font-size: 1.3rem; color: var(--emerald); margin-bottom: 5px; display: block; }
        .mod span { font-size: 0.65rem; font-weight: 800; color: #1e293b; }
    </style>
  <script type="module" crossorigin src="./assets/index-CFQGl5Hh.js"></script>
</head>
<body>
    <div class="batik"></div>

    <section id="login-screen" class="screen active">
        <div class="card">
            <img src="assets/icons/icon-192.png" width="70" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3003/3003211.png'">
            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <input type="password" id="accessKey" placeholder="Access Key">
            <button id="loginBtn">ACCESS SYSTEM</button>
        </div>
    </section>

    <section id="dashboard-screen" class="screen">
        <div id="zikir-ui" class="bismillah">بِسْمِ اللَّهِ</div>
        <div id="loc-ui" style="font-size: 0.8rem; color: var(--emerald); font-weight: 800; margin-bottom: 20px;">Syncing...</div>
        
        <div class="grid">
            <div class="mod"><i class="fas fa-terminal"></i><span>CMD</span></div>
            <div class="mod"><i class="fas fa-hard-hat"></i><span>K3</span></div>
            <div class="mod"><i class="fas fa-shield-alt"></i><span>SEC</span></div>
            <div class="mod"><i class="fas fa-broom"></i><span>JAN</span></div>
            <div class="mod"><i class="fas fa-tools"></i><span>ENG</span></div>
            <div class="mod"><i class="fas fa-bolt"></i><span>POW</span></div>
            <div class="mod"><i class="fas fa-tint"></i><span>WTR</span></div>
            <div class="mod"><i class="fas fa-wifi"></i><span>NET</span></div>
            <div class="mod"><i class="fas fa-cog"></i><span>SET</span></div>
        </div>
    </section>

</body>
</html>
