<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Dream OS v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        spiritual: { 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b' },
                        slate: { 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-arabic { font-family: 'Amiri', serif; }
        .view { display: none; }
        .view.active { display: flex; }
        #auth-view.active { display: flex; }
        .grid-item:active { transform: scale(0.95); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 h-screen overflow-hidden">

    <!-- AUTH SCREEN -->
    <section id="auth-view" class="view active flex-col items-center justify-center h-full p-6 text-center bg-gradient-to-b from-slate-50 to-slate-100 dark:from-slate-900 dark:to-slate-950">
        <div id="dream-logo" class="mb-6 cursor-pointer">
            <img src="assets/logo-sultan.png" alt="Dream OS" class="w-28 h-28 rounded-3xl shadow-2xl shadow-gold-500/40 object-cover">
            <p class="text-xs text-gold-500 mt-3 font-semibold tracking-widest">DREAM OS</p>
        </div>
        <h1 class="font-arabic text-3xl text-gold-600 mb-2">بِسْمِ اللَّهِ</h1>
        <p class="text-xs text-spiritual-500 mb-6">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
        
        <div class="w-full max-w-xs bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl p-6 rounded-3xl shadow-2xl border border-white/20 dark:border-slate-700/50">
            <div class="relative mb-4">
                <input type="password" id="access-key" placeholder="Access Key"                     class="w-full px-4 py-3.5 bg-slate-100/50 dark:bg-slate-900/50 rounded-2xl border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-gold-500 text-center tracking-widest pr-12">
                <button id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-gold-500 p-1">
                    <i data-lucide="eye" class="w-5 h-5" id="eye-off"></i>
                    <i data-lucide="eye-off" class="w-5 h-5 hidden" id="eye-on"></i>
                </button>
            </div>
            <button id="btn-login" class="w-full py-3.5 bg-gradient-to-r from-spiritual-500 to-spiritual-600 text-white font-bold rounded-2xl shadow-lg shadow-spiritual-500/30 active:scale-95 transition-transform">ACCESS SYSTEM</button>
        </div>
    </section>

    <!-- MAIN APP -->
    <div id="app-view" class="view flex-col h-full">
        <!-- Header -->
        <header class="px-4 py-3 bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl border-b border-slate-200/50 dark:border-slate-700/50 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <img src="assets/logo-sultan.png" alt="Dream OS" class="w-10 h-10 rounded-xl shadow-lg object-cover">
                <div>
                    <h1 class="text-base font-bold text-slate-800 dark:text-white leading-tight">Dream OS</h1>
                    <span class="text-[10px] text-slate-500">v1.0 • Genesis</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="role-badge" class="px-2.5 py-1 bg-slate-100 dark:bg-slate-700 text-[10px] font-bold rounded-lg uppercase text-slate-600 dark:text-slate-300">STAFF</span>
                <button id="btn-logout" class="p-2 text-slate-400 hover:text-red-500 active:scale-90 transition-transform">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Scrollable Content -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden p-3 pb-24 space-y-3 bg-gradient-to-b from-slate-50 to-slate-100/50 dark:from-slate-900 dark:to-slate-950">
            
            <!-- Greeting Card -->
            <div class="bg-gradient-to-r from-spiritual-500 to-spiritual-600 p-4 rounded-2xl text-white shadow-lg shadow-spiritual-500/20">
                <p class="text-sm opacity-90">Selamat Pagi, Saudara.</p>
                <h2 class="text-lg font-bold mt-0.5">Siap Melayani.</h2>
            </div>

            <!-- 9-GRID MENU -->
            <div class="grid grid-cols-3 gap-2.5" id="staff-grid">
                <!-- Grid items injected here -->
            </div>

            <!-- Command Center (Hidden by default) -->
            <div id="view-command" class="hidden space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gold-500">Command Center</h2>
                    <span class="text-xs bg-slate-700 px-2 py-1 rounded-lg text-white">AI Ready</span>
                </div>
                <div class="grid grid-cols-2 gap-2.5" id="command-grid"></div>            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl border-t border-slate-200/50 dark:border-slate-700/50 flex justify-around items-center h-16 safe-bottom z-50">
            <button class="nav-btn active flex flex-col items-center justify-center gap-1 w-16 h-full text-gold-500" data-target="dashboard">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">Home</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-400" data-target="profile">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">User</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-400" data-target="qr">
                <i data-lucide="scan-line" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">QR</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-400" data-target="info">
                <i data-lucide="info" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">Info</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-16 h-full text-slate-400" data-target="config">
                <i data-lucide="settings" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">Config</span>
            </button>
        </nav>
    </div>

    <script>
        const state = { role: 'STAFF', ghostTaps: 0, ghostTimer: null };
        
        const grids = {
            staff: [
                {icon: 'calendar', label: 'Booking', desc: 'Pemesanan'},
                {icon: 'alert-triangle', label: 'K3 Form', desc: 'Laporan'},
                {icon: 'wrench', label: 'Maintenance', desc: 'Perbaikan'},
                {icon: 'shield', label: 'Sekuriti', desc: 'Keamanan'},
                {icon: 'sparkles', label: 'Janitor In', desc: 'Indoor'},
                {icon: 'leaf', label: 'Janitor Out', desc: 'Outdoor'},
                {icon: 'package', label: 'Stok Alat', desc: 'Inventaris'},
                {icon: 'clipboard-list', label: 'Laporan', desc: 'Harian'},
                {icon: 'building-2', label: 'Inventaris', desc: 'Aset'}
            ],
            command: [
                {icon: 'bar-chart-3', label: 'Kinerja', desc: 'Global'},
                {icon: 'wallet', label: 'Keuangan', desc: 'SPJ'},
                {icon: 'database', label: 'Inventaris', desc: 'Aset'},
                {icon: 'users', label: 'Vendor', desc: 'Tracker'},
                {icon: 'user-check', label: 'SDM', desc: 'Tugas'},
                {icon: 'file-text', label: 'Laporan', desc: 'Bulanan'},                {icon: 'search', label: 'Audit', desc: 'Trail'},
                {icon: 'sliders', label: 'Config', desc: 'System'}
            ]
        };

        const $ = id => document.getElementById(id);
        
        const renderGrid = (containerId, data) => {
            const container = $(containerId);
            if (!container) return;
            
            container.innerHTML = data.map(item => `
                <div class="grid-item bg-white/80 dark:bg-slate-800/80 backdrop-blur p-3 rounded-xl border border-slate-200/50 dark:border-slate-700/50 flex flex-col items-center justify-center gap-1.5 min-h-[100px] active:scale-95 transition-transform cursor-pointer shadow-sm" onclick="handleGridClick('${item.label}')">
                    <i data-lucide="${item.icon}" class="w-7 h-7 text-gold-500"></i>
                    <span class="text-[11px] font-semibold text-slate-700 dark:text-slate-200 text-center leading-tight">${item.label}</span>
                    <span class="text-[9px] text-slate-400">${item.desc}</span>
                </div>
            `).join('');
            
            setTimeout(() => lucide.createIcons(), 50);
        };

        const handleGridClick = (label) => {
            alert(`🔧 Modul ${label}\n\nReady for v1.1`);
        };

        const showView = (id) => {
            ['view-dashboard', 'view-command'].forEach(v => {
                const el = $(v);
                if (el) el.classList.add('hidden');
            });
            const target = $(id);
            if (target) target.classList.remove('hidden');
        };

        window.addEventListener('DOMContentLoaded', () => {
            console.log('✅ Dream OS v1.0 Mobile Loaded');
            
            // Render grids
            renderGrid('staff-grid', grids.staff);
            renderGrid('command-grid', grids.command);
            
            // Show/Hide Password - FIXED
            const toggleBtn = $('toggle-pw');
            const eyeOff = $('eye-off');
            const eyeOn = $('eye-on');
            const input = $('access-key');
            
            toggleBtn.onclick = () => {
                const isPass = input.type === 'password';                input.type = isPass ? 'text' : 'password';
                eyeOff.classList.toggle('hidden', !isPass);
                eyeOn.classList.toggle('hidden', isPass);
            };
            
            // Login
            $('btn-login').onclick = () => {
                const key = $('access-key').value;
                if(!key) return alert('Masukkan Access Key!');
                
                state.role = key.includes('admin') || key.includes('kepala') ? 'KEPALA_BAGIAN' : 'STAFF';
                $('role-badge').textContent = state.role.replace('_', ' ');
                
                $('auth-view').classList.remove('active');
                $('app-view').classList.add('active');
                
                if(state.role === 'KEPALA_BAGIAN') {
                    $('view-command').classList.remove('hidden');
                }
                
                setTimeout(() => lucide.createIcons(), 100);
            };

            $('btn-logout').onclick = () => {
                $('app-view').classList.remove('active');
                $('auth-view').classList.add('active');
                $('access-key').value = '';
                state.role = 'STAFF';
            };

            // Bottom Nav
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.nav-btn').forEach(b => {
                        b.classList.remove('active', 'text-gold-500');
                        b.classList.add('text-slate-400');
                    });
                    btn.classList.add('active', 'text-gold-500');
                    btn.classList.remove('text-slate-400');
                    
                    const target = btn.dataset.target;
                    if(target === 'dashboard') {
                        showView('staff-grid').parentElement.classList.remove('hidden');
                        $('view-command').classList.add('hidden');
                    } else if(target === 'config' && state.role === 'KEPALA_BAGIAN') {
                        showView('view-command');
                    } else {
                        alert(`📱 ${target.toUpperCase()}\nReady for v1.1`);
                    }
                };            });

            // Ghost Mode
            $('dream-logo').addEventListener('pointerdown', () => {
                state.ghostTaps++;
                if(state.ghostTaps === 1) state.ghostTimer = setTimeout(() => state.ghostTaps = 0, 2000);
                if(state.ghostTaps >= 7) {
                    clearTimeout(state.ghostTimer);
                    state.ghostTaps = 0;
                    alert('👻 GHOST MODE ACTIVATED');
                }
            });
            
            lucide.createIcons();
        });
    </script>
</body>
</html>
