<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Dream OS v1.0 • Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        spiritual: { 500: '#22c55e', 600: '#16a34a', 700: '#15803d' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b' },
                        slate: { 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; background: #020617; }
        .font-arabic { font-family: 'Amiri', serif; }
        .view { display: none; }
        .view.active { display: flex; }
        #auth-view.active { display: flex; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-border { position: relative; }
        .glow-border::after { content:''; position:absolute; inset:-1px; background:linear-gradient(135deg,#fbbf24,#22c55e); border-radius:inherit; z-index:-1; opacity:0.15; transition:opacity 0.2s; }
        .glow-border:active::after { opacity:0.3; }
        .magnet { transition: transform 0.15s cubic-bezier(0.4,0,0.2,1); }
        .magnet:active { transform: scale(0.96); }
        #dream-logo { transition: transform 0.1s; cursor: pointer; }
        #dream-logo:active { transform: scale(0.93); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head><body class="text-slate-200 h-screen overflow-hidden">

    <!-- AUTH SCREEN -->
    <section id="auth-view" class="view active flex-col items-center justify-center h-full p-6 text-center bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950">
        <div id="dream-logo" class="mb-6 cursor-pointer select-none magnet">
            <img src="assets/logo-sultan.png" alt="Dream OS" class="w-28 h-28 rounded-3xl shadow-[0_0_35px_rgba(245,158,11,0.25)] object-cover">
            <p class="text-[10px] text-amber-500 mt-4 font-bold tracking-[0.25em]">DREAM OS <span class="text-emerald-400">v1.0</span></p>
        </div>
        <h1 class="font-arabic text-3xl text-amber-500/90 mb-2">بِسْمِ اللَّهِ</h1>
        <p class="text-[10px] text-emerald-400 mb-8 font-semibold tracking-wide">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
        
        <div class="w-full max-w-xs glass p-6 rounded-3xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6)] glow-border">
            <div class="relative mb-4">
                <input type="password" id="access-key" placeholder="Access Key" 
                    class="w-full px-4 py-3.5 bg-slate-900/70 rounded-2xl border border-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-500/40 text-center tracking-widest pr-12 text-slate-200 placeholder-slate-600 text-sm">
                <button id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-amber-400 p-1 z-10">
                    <i data-lucide="eye" class="w-5 h-5" id="eye-off"></i>
                    <i data-lucide="eye-off" class="w-5 h-5 hidden" id="eye-on"></i>
                </button>
            </div>
            <button id="btn-login" class="w-full py-3.5 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white text-xs font-bold uppercase tracking-wider rounded-2xl shadow-[0_12px_24px_-10px_rgba(16,185,129,0.35)] magnet">ACCESS SYSTEM</button>
            <p class="text-[9px] text-slate-600 mt-4 font-mono">Out of The Box Inside • ISO 27001</p>
        </div>
    </section>

    <!-- MAIN APP (Hidden until login) -->
    <div id="app-view" class="view flex-col h-full">
        <header id="app-header" class="px-4 py-3 glass border-b border-slate-800/60 flex justify-between items-center shrink-0 hidden">
            <div class="flex items-center gap-3">
                <img src="assets/logo-sultan.png" alt="Dream OS" class="w-9 h-9 rounded-xl shadow-lg object-cover">
                <div>
                    <h1 class="text-sm font-bold text-slate-100 leading-tight">Dream OS</h1>
                    <span class="text-[9px] text-emerald-400 font-mono">v1.0 Genesis</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="role-badge" class="px-2.5 py-0.5 bg-slate-900/80 border border-slate-800 text-[9px] font-bold rounded uppercase tracking-wider text-emerald-400">STAFF</span>
                <button id="btn-logout" class="p-2 text-slate-500 hover:text-red-400 magnet">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto overflow-x-hidden p-3 pb-24 space-y-3 bg-slate-950">
            <div id="view-home" class="view-section active space-y-3">
                <div class="bg-gradient-to-r from-emerald-600 to-emerald-700 p-4 rounded-2xl text-white shadow-lg">
                    <p class="text-sm opacity-90">Selamat Pagi, Saudara.</p>
                    <h2 class="text-lg font-bold mt-0.5">Siap Melayani.</h2>
                </div>
                <div class="grid grid-cols-3 gap-3" id="staff-grid"></div>            </div>
        </main>

        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800/60 flex justify-around items-center h-16 safe-bottom z-50 hidden">
            <button class="nav-btn active flex flex-col items-center justify-center gap-1 w-full h-full text-amber-400" data-target="home">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[9px] font-medium tracking-wide">HOME</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full text-slate-500" data-target="user">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="text-[9px] font-medium tracking-wide">USER</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full text-slate-500" data-target="qr">
                <i data-lucide="scan-line" class="w-5 h-5"></i>
                <span class="text-[9px] font-medium tracking-wide">MENU</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full text-slate-500" data-target="info">
                <i data-lucide="info" class="w-5 h-5"></i>
                <span class="text-[9px] font-medium tracking-wide">INFO</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full text-slate-500" data-target="config">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-[9px] font-medium tracking-wide">CONFIG</span>
            </button>
        </nav>
    </div>

    <!-- INLINE SCRIPT FOR RELIABILITY (Fallback jika modular gagal) -->
    <script>
        console.log('✅ Dream OS v1.0 Loading...');
        
        // State management
        const state = { 
            role: 'STAFF', 
            ghostTaps: 0, 
            ghostTimer: null 
        };
        
        // Grid menu data
        const gridData = [
            {icon:'calendar',label:'Booking',desc:'Pemesanan'},
            {icon:'alert-triangle',label:'K3 Form',desc:'Laporan'},
            {icon:'wrench',label:'Maintenance',desc:'Perbaikan'},
            {icon:'shield',label:'Sekuriti',desc:'Keamanan'},
            {icon:'sparkles',label:'Janitor In',desc:'Indoor'},
            {icon:'leaf',label:'Janitor Out',desc:'Outdoor'},
            {icon:'package',label:'Stok Alat',desc:'Inventaris'},
            {icon:'clipboard-list',label:'Laporan',desc:'Harian'},
            {icon:'building-2',label:'Inventaris',desc:'Aset'}
        ];        
        // Render grid
        function renderGrid() {
            const container = document.getElementById('staff-grid');
            if (!container) return;
            
            container.innerHTML = gridData.map(item => `
                <div class="magnet bg-slate-900/70 border border-slate-800 p-3 rounded-2xl flex flex-col items-center justify-center gap-2 min-h-[96px] glow-border cursor-pointer">
                    <i data-lucide="${item.icon}" class="w-6 h-6 text-amber-400"></i>
                    <span class="text-[10px] font-bold text-slate-300 text-center leading-tight">${item.label}</span>
                    <span class="text-[8px] text-slate-500">${item.desc}</span>
                </div>
            `).join('');
            
            setTimeout(() => lucide.createIcons(), 50);
        }
        
        // Show/Hide Password
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🔧 DOM Loaded, initializing...');
            
            const toggleBtn = document.getElementById('toggle-pw');
            const eyeOff = document.getElementById('eye-off');
            const eyeOn = document.getElementById('eye-on');
            const input = document.getElementById('access-key');
            
            if (toggleBtn) {
                console.log('✅ Toggle button found');
                toggleBtn.addEventListener('click', () => {
                    console.log('👁️ Toggle password clicked');
                    const isPass = input.type === 'password';
                    input.type = isPass ? 'text' : 'password';
                    eyeOff.classList.toggle('hidden', !isPass);
                    eyeOn.classList.toggle('hidden', isPass);
                });
            } else {
                console.error('❌ Toggle button NOT found!');
            }
            
            // Login handler
            const loginBtn = document.getElementById('btn-login');
            if (loginBtn) {
                loginBtn.addEventListener('click', () => {
                    const key = input.value;
                    console.log('🔑 Login attempt with key:', key);
                    
                    if (!key) {
                        alert('Masukkan Access Key!');
                        return;
                    }                    
                    // Detect role
                    state.role = key.includes('admin') || key.includes('kepala') ? 'KEPALA_BAGIAN' : 'STAFF';
                    document.getElementById('role-badge').textContent = state.role.replace('_', ' ');
                    
                    // Switch views
                    document.getElementById('auth-view').classList.remove('active');
                    document.getElementById('app-view').classList.add('active');
                    document.getElementById('app-header').classList.remove('hidden');
                    document.getElementById('bottom-nav').classList.remove('hidden');
                    
                    // Render grid
                    renderGrid();
                    
                    console.log('✅ Login successful, role:', state.role);
                });
            }
            
            // Ghost Mode (7x tap)
            const logo = document.getElementById('dream-logo');
            if (logo) {
                logo.addEventListener('pointerdown', () => {
                    state.ghostTaps++;
                    console.log('👻 Ghost tap:', state.ghostTaps);
                    
                    if (state.ghostTaps === 1) {
                        state.ghostTimer = setTimeout(() => {
                            state.ghostTaps = 0;
                        }, 2000);
                    }
                    
                    if (state.ghostTaps >= 7) {
                        clearTimeout(state.ghostTimer);
                        state.ghostTaps = 0;
                        alert('👻 GHOST PROTOCOL ACTIVATED\n\nStealth Mode Ready');
                        console.log('👻 Ghost Mode Activated!');
                    }
                });
            }
            
            // Bottom nav
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.nav-btn').forEach(b => {
                        b.classList.remove('active', 'text-amber-400');
                        b.classList.add('text-slate-500');
                    });
                    btn.classList.add('active', 'text-amber-400');
                    btn.classList.remove('text-slate-500');
                });            });
            
            // Initialize Lucide icons
            lucide.createIcons();
            console.log('✅ Dream OS initialized successfully');
        });
    </script>
</body>
</html>
