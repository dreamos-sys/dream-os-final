<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS Sovereign</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Reem+Kufi+Fun:wght@400..700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --gold: #d97706; --bg: #fcfdfd; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; overflow: hidden; color: var(--text); }

        /* 🎨 REAL PARANG SOVEREIGN (Batik Nenek v2.0 - More Dense) */
        .batik-overlay {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(16, 185, 129, 0.08), transparent),
                /* Motif Parang S-Curve yang lebih rapat & bervolume */
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 80 C 20 80, 20 40, 40 40 C 60 40, 60 0, 80 0 v 15 C 60 15, 60 55, 40 55 C 20 55, 20 95, 0 95 Z' fill='%2310b981' fill-opacity='0.05'/%3E%3Cpath d='M-40 80 C -20 80, -20 40, 0 40 C 20 40, 20 0, 40 0 v 15 C 20 15, 20 55, 0 55 C -20 55, -20 95, -40 95 Z' fill='%2310b981' fill-opacity='0.05'/%3E%3C/svg%3E");
            background-size: 100% 100%, 80px 80px;
        }

        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; padding: 15px; }
        .active { display: flex !important; }

        /* Card Login */
        .card-login { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            padding: 40px 25px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 20px 60px rgba(0,0,0,0.03); margin-top: 15vh; text-align: center; width: 100%; max-width: 320px;
        }

        /* Dashboard Header */
        .header-container { display: flex; align-items: center; width: 100%; padding: 10px 5px; }
        .header-logo { width: 55px; height: 55px; }
        .header-text { flex: 1; text-align: center; margin-right: 55px; }
        .bismillah-dashboard { font-family: 'Reem Kufi Fun', sans-serif; font-size: 1.5rem; color: var(--gold); font-weight: 700; }
        .shalawat-dashboard { font-family: 'Amiri', serif; font-size: 0.9rem; color: var(--emerald); font-weight: 600; margin-top: 4px; }

        /* 🔄 CAROUSEL RESTORED (Slide 7-7) */
        .carousel { 
            width: 100%; height: 110px; 
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 28px; margin: 15px 0; 
            border: 1px solid rgba(16, 185, 129, 0.1); 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }
        .slide { display: none; padding: 15px; text-align: center; font-size: 0.82rem; font-weight: 600; color: #334155; line-height: 1.4; animation: fadeIn 0.8s; }
        .slide.active { display: block; }

        .grid-9 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .mod { background: white; padding: 18px 5px; border-radius: 24px; text-align: center; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: 0.2s; }
        .mod:active { transform: scale(0.92); }
        .mod i { font-size: 1.5rem; color: var(--emerald); margin-bottom: 6px; display: block; }
        .mod span { font-size: 0.6rem; font-weight: 800; color: #475569; text-transform: uppercase; }

        .nav-5 { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #f1f5f9; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #cbd5e1; font-size: 1.3rem; }
        .nav-item.active { color: var(--emerald); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
  <script type="module" crossorigin src="./assets/index-DrH_u4-E.js"></script>
</head>
<body>
    <div class="batik-overlay"></div>
    <section id="login-screen" class="screen active">
        <div class="card-login">
            <img src="./assets/logo-sultan-t5H7gsFR.png" width="80">
            <div class="bismillah-dashboard" style="margin-top:20px">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
            <div style="position:relative; width:100%; max-width:280px; margin: 25px auto 0;">
                <input type="password" id="accessKey" placeholder="Access Key" style="width:100%; padding:18px; border-radius:20px; border:2px solid #f1f5f9; outline:none; text-align:center">
                <i class="fas fa-eye" id="togglePass" style="position:absolute; right:18px; top:50%; transform:translateY(-50%); color:#94a3b8; cursor:pointer"></i>
            </div>
            <button id="loginBtn" style="width:100%; max-width:280px; padding:18px; background:var(--emerald); color:white; border:none; border-radius:20px; font-weight:900; margin-top:15px">ACCESS SYSTEM</button>
        </div>
    </section>

    <section id="dashboard-screen" class="screen">
        <header class="header-container">
            <img src="./assets/logo-sultan-t5H7gsFR.png" class="header-logo">
            <div class="header-text">
                <div class="bismillah-dashboard">بِسْمِ اللَّهِ</div>
                <div class="shalawat-dashboard">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</div>
            </div>
        </header>

        <div class="carousel" id="carousel-box"></div>

        <div class="grid-9">
            <div class="mod"><i class="fas fa-desktop"></i><span>CMD CENTER</span></div>
            <div class="mod"><i class="fas fa-calendar-check"></i><span>BOOKING</span></div>
            <div class="mod"><i class="fas fa-biohazard"></i><span>K3 FORM</span></div>
            <div class="mod"><i class="fas fa-user-shield"></i><span>SEKURITI</span></div>
            <div class="mod"><i class="fas fa-pump-soap"></i><span>JAN INDOOR</span></div>
            <div class="mod"><i class="fas fa-leaf"></i><span>JAN OUTDOOR</span></div>
            <div class="mod"><i class="fas fa-box-open"></i><span>STOK ALAT</span></div>
            <div class="mod"><i class="fas fa-wrench"></i><span>MAINTENANCE</span></div>
            <div class="mod"><i class="fas fa-warehouse"></i><span>INVENTARIS</span></div>
        </div>

        <nav class="nav-5">
            <div class="nav-item active"><i class="fas fa-home"></i></div>
            <div class="nav-item"><i class="fas fa-user"></i></div>
            <div class="nav-item"><i class="fas fa-qrcode" style="font-size:1.8rem; color:var(--emerald)"></i></div>
            <div class="nav-item"><i class="fas fa-info-circle"></i></div>
            <div class="nav-item"><i class="fas fa-cog"></i></div>
        </nav>
    </section>
</body>
</html>
