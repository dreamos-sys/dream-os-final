<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream OS v2.1.2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-white: #ffffff;
      --primary-emerald: #10b981;
      --accent-gold: #d97706;
      --text-dark: #1e293b;
      /* Batik Betawi Motif (Emerald tipis di atas putih) */
      --batik-pattern: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2310b981' fill-opacity='0.03'%3E%3Cpath d='M40 40c0-11 9-20 20-20s20 9 20 20-9 20-20 20-20-9-20-20zm-40 0c0-11 9-20 20-20s20 9 20 20-9 20-20 20-20-9-20-20zM40 0c0 11-9 20-20 20S0 11 0 0s9-20 20-20 20 9 20 20zm0 80c0-11 9-20 20-20s20 9 20 20-9 20-20 20-20-9-20-20z'/%3E%3C/g%3E%3C/svg%3E");
    }

    body {
      background-color: var(--bg-white);
      background-image: var(--batik-pattern);
      background-attachment: fixed;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-dark);
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(16, 185, 129, 0.1);
      border-radius: 32px;
      padding: 40px 30px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }

    /* 🔥 ICON EMAS SULTAN */
    .icon-sultan {
      width: 90px;
      height: 90px;
      margin-bottom: 20px;
      filter: drop-shadow(0 5px 15px rgba(217, 119, 6, 0.3));
    }

    .bismillah {
      font-family: 'Amiri', serif;
      font-size: 1.8rem;
      color: var(--accent-gold);
      margin: 15px 0;
    }

    .input-group {
      position: relative;
      margin: 25px 0;
    }

    .input-group input {
      width: 100%;
      padding: 16px 50px 16px 20px;
      border: 2px solid #f1f5f9;
      border-radius: 16px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.3s;
      background: #f8fafc;
    }

    .input-group input:focus {
      border-color: var(--primary-emerald);
      outline: none;
      background: #fff;
    }

    /* 🔥 FITUR MATA (SHOW/HIDE) */
    .eye-toggle {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      cursor: pointer;
      font-size: 1.1rem;
      z-index: 10;
    }

    .btn-access {
      width: 100%;
      padding: 18px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
    }

    .btn-access:active { transform: scale(0.97); }

    footer {
      margin-top: 30px;
      font-size: 0.75rem;
      color: #94a3b8;
      opacity: 0.8;
    }
    
    .screen { display: none; }
    .screen.active { display: flex; }
  </style>
</head>
<body>

  <section id="login-screen" class="screen active">
    <div class="login-card">
      <img src="assets/icons/icon-192.png" class="icon-sultan" alt="Dream OS" onerror="this.src='https://i.ibb.co/L6V2M5p/gold-d.png'">
      
      <h2 style="margin:0; font-weight: 800;">Dream OS <span style="color:var(--accent-gold)">v2.1.2</span></h2>
      <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
      
      <div class="input-group">
        <input type="password" id="accessKey" placeholder="••••••••••••••">
        <i class="fas fa-eye eye-toggle" id="togglePw"></i>
      </div>
      
      <button class="btn-access" id="loginBtn">ACCESS SYSTEM</button>
      
      <footer>The Power Soul of Shalawat © 2026</footer>
    </div>
  </section>

  <section id="dashboard-screen" class="screen">
      <h1 style="color:var(--primary-emerald)">Dashboard Active</h1>
  </section>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const pwInput = document.getElementById('accessKey');
    const togglePw = document.getElementById('togglePw');
    const loginScreen = document.getElementById('login-screen');
    const dashboardScreen = document.getElementById('dashboard-screen');

    // 1. Fungsi Show/Hide Mata
    togglePw.addEventListener('click', () => {
      const isPass = pwInput.type === 'password';
      pwInput.type = isPass ? 'text' : 'password';
      togglePw.classList.toggle('fa-eye');
      togglePw.classList.toggle('fa-eye-slash');
    });

    // 2. Fungsi Submit (Logic Tombol)
    loginBtn.addEventListener('click', () => {
      if (pwInput.value === 'Mr.M_Architect_2025') {
        alert('🤲 Bismillah! Akses Diterima. Thuma\'ninah Mode Active.');
        loginScreen.style.display = 'none';
        dashboardScreen.classList.add('active');
      } else {
        alert('❌ Kode Salah, My Bro! Cek Memory lo.');
      }
    });
  </script>
</body>
</html>
