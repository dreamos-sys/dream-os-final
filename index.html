<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS • Sacred Reflex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-active { color: var(--primary) !important; filter: drop-shadow(0 0 10px rgba(16,185,129,0.5)); }
        .arabic-glow { text-shadow: 0 0 20px rgba(16,185,129,0.4); }
        #ghost-hub { display: none; position: fixed; inset: 0; background: rgba(1,2,6,0.99); z-index: 1000; padding: 20px; overflow-y: auto; }
        #ghost-hub.active { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .terminal-box { background: rgba(0,0,0,0.8); border: 1px solid rgba(16,185,129,0.2); font-family: monospace; font-size: 10px; color: #10b981; }
    </style>
</head>
<body class="select-none">

    <div id="app-shell" class="flex flex-col h-full bg-[#020617]">
        <header class="p-6 border-b border-white/5 bg-[#020617]/95 backdrop-blur-3xl sticky top-0 z-50 text-center">
            <p class="text-4xl font-bold text-white arabic-glow mb-2" style="font-family: 'Amiri', serif;">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
            <p class="text-[14px] text-emerald-400 italic mb-5" style="font-family: 'Amiri', serif;">اَللّٰهُمَّ صَلِّ عَلٰى سَيِّدِنَا مُحَمَّدٍ</p>
            
            <div class="flex justify-between items-center pt-5 border-t border-white/5">
                <div id="logo-trigger" onclick="Reflex.ghostTrigger()" class="flex items-center gap-3 cursor-pointer group">
                    <img src="assets/logo-sultan.png" class="w-12 h-12 rounded-2xl border border-amber-500/20 shadow-2xl group-active:rotate-12 transition-all">
                    <div class="text-left leading-none">
                        <span class="text-[11px] font-black text-amber-500 uppercase italic tracking-widest">Dream OS</span>
                        <p id="geo-status" class="text-[8px] text-white/30 uppercase mt-1 tracking-widest">Locating Neural Circle...</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div id="reflex-led" class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.8)] animate-pulse"></div>
                    <button onclick="lockdown()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-red-500"><i data-lucide="power" class="w-4 h-4"></i></button>
                </div>
            </div>
        </header>

        <main id="main-viewport" class="flex-1 overflow-y-auto p-5 pb-32 space-y-8"></main>
        <nav id="app-nav" class="fixed bottom-0 inset-x-0 glass border-t border-white/5 h-24 px-8 flex justify-between items-center z-40 bg-[#020617]/95 backdrop-blur-3xl"></nav>
    </div>

    <div id="ghost-hub">
        <div class="flex justify-between items-center mb-8 border-b border-teal-500/20 pb-4">
            <h2 class="text-[10px] font-black text-teal-400 tracking-[0.5em] uppercase italic">Stealth Armory v2.8</h2>
            <button onclick="toggleGhost(false)" class="text-white/20 font-bold text-[10px] uppercase">Hide</button>
        </div>
        <div id="ghost-grid" class="grid grid-cols-2 gap-4 mb-6"></div>
        <div id="ghost-res" class="hidden glass rounded-3xl border border-teal-500/20 p-5 mt-4">
            <p id="res-title" class="text-[10px] font-bold text-pink-400 uppercase mb-2"></p>
            <div id="res-body" class="terminal-box p-4 rounded-2xl max-h-48 overflow-y-auto whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        // ========== CONFIG & SACRED CONSTANTS ==========
        const HQ = { lat: -6.2, lon: 106.8, threshold: 0.01 }; // Ganti dengan koordinat Master
        const SACRED_WINDOW = [2, 4, 4, 3, 4]; // Rakaat Shalat
        
        // ========== NEURAL REFLEX ENGINE ==========
        const Reflex = {
            taps: 0,
            isParanoid: false,
            
            init: function() {
                this.checkGeo();
                this.applyChronoAnomali();
                setInterval(() => this.checkGeo(), 60000); // Re-check tiap menit
            },

            checkGeo: function() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        const dist = Math.sqrt(Math.pow(pos.coords.latitude - HQ.lat, 2) + Math.pow(pos.coords.longitude - HQ.lon, 2));
                        if (dist > HQ.threshold) {
                            this.isParanoid = true;
                            document.getElementById('geo-status').innerText = "WAR ZONE • PARANOID ON";
                            document.getElementById('geo-status').classList.replace('text-white/30', 'text-rose-500');
                        } else {
                            this.isParanoid = false;
                            document.getElementById('geo-status').innerText = "SACRED CIRCLE • SAFE";
                            document.getElementById('geo-status').classList.replace('text-rose-500', 'text-white/30');
                        }
                    }, () => {
                        this.isParanoid = true; // No GPS = Paranoid
                        document.getElementById('geo-status').innerText = "GEO BLOCKED • PARANOID ON";
                    });
                }
            },

            applyChronoAnomali: function() {
                const now = new Date();
                const jitter = Math.floor(Math.random() * 15) - 7; // Anomali +/- 7 menit
                console.log(`[CHRONO] Sacred Anomali Applied: ${jitter}m`);
                // Logic ini bisa disambungkan ke jendela akses login atau fitur sensitif
            },

            ghostTrigger: function() {
                this.taps++;
                if(this.taps >= 7) { this.taps = 0; toggleGhost(true); }
                setTimeout(() => this.taps = 0, 2000);
            }
        };

        // ========== RENDER DASHBOARD ==========
        function renderUI() {
            const status = Reflex.isParanoid ? "SENSITIVE PROTECTION ACTIVE" : "STANDARD PROTECTION";
            document.getElementById('main-viewport').innerHTML = `
                <div class="h-32 glass rounded-[2.5rem] flex items-center justify-center p-6 text-center italic text-white/10 text-[9px] border border-white/5">
                    ${status} • SACRED REFLEX v2.8.0
                </div>
                <div class="grid grid-cols-3 gap-3">
                    ${['CMD','BOOK','K3','SEC','JAN-IN','JAN-OUT','STOK','MAINT','ASSET'].map(m => `
                        <div class="card-nano p-5 rounded-3xl text-center flex flex-col items-center">
                            <i data-lucide="box" class="w-7 h-7 text-emerald-400 mb-2"></i>
                            <span class="text-[9px] font-bold uppercase tracking-widest">${m}</span>
                        </div>
                    `).join('')}
                </div>`;
            
            document.getElementById('app-nav').innerHTML = `
                <button class="nav-active flex flex-col items-center gap-2"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[8px] font-bold">HOME</span></button>
                <div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center -mt-10 border-4 border-[#020617] shadow-2xl"><i data-lucide="qr-code" class="w-6 h-6 text-white"></i></div>
                <button class="text-white/30 flex flex-col items-center gap-2"><i data-lucide="settings" class="w-6 h-6"></i><span class="text-[8px] font-bold">CONFIG</span></button>`;
            lucide.createIcons();
        }

        // ========== CORE ACTIONS ==========
        window.toggleGhost = (s) => {
            const h = document.getElementById('ghost-hub'); h.classList.toggle('active', s);
            if(s) {
                const tools = [
                    { t: 'NEURAL SCAN', a: 'alert("Scanning...")' },
                    { t: 'GEO DECEPTION', a: 'alert("Ghosting Location...")' },
                    { t: 'ERUDA DEBUG', a: 'alert("Console Ready")' },
                    { t: 'IMMUNE DB', a: 'alert("Database Secure")' }
                ];
                document.getElementById('ghost-grid').innerHTML = tools.map(t => `
                    <div onclick="${t.a}" class="glass p-5 rounded-3xl border border-white/10 text-center active:scale-95">
                        <p class="text-[9px] font-bold uppercase">${t.t}</p>
                    </div>`).join('');
            }
        };

        function lockdown() { 
            localStorage.clear(); 
            document.body.innerHTML = "<div style='background:#7f1d1d; height:100vh; display:flex; align-items:center; justify-content:center; color:white; font-family:Amiri; text-align:center;'><div><p style='font-size:3rem;'>ه</p><p>GEOPANCING TRIGGERED<br>Sanctuary Locked</p></div></div>"; 
            setTimeout(() => location.reload(), 3000); 
        }

        document.addEventListener('DOMContentLoaded', () => { Reflex.init(); renderUI(); });
    </script>
</body>
</html>
