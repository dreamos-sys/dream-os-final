<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream OS • Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 1rem; }
        .menu-card:hover { transform: scale(1.02); transition: 0.2s; background: rgba(45,212,191,0.2); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center">
    <div id="app" class="w-full max-w-md p-4">
        <div id="login-view" class="text-center">
                        <img src="assets/logo-sultan.png" class="w-28 h-28 rounded-3xl mx-auto mb-4 shadow-xl border border-emerald-500/30" alt="Dream OS">
            <h1 class="text-2xl font-bold mb-1">Dream OS</h1>
            <div class="text-emerald-400 text-sm font-arabic mb-1">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم</div>
            <div class="text-amber-500 text-xs font-arabic mb-6">اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِ مُحَمَّدٍ</div>
            <div class="glass p-6">
                <input type="password" id="accessKey" placeholder="Access Key" class="w-full p-3 rounded-xl bg-black/30 border border-white/20 mb-4 text-center">
                <button onclick="login()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">ACCESS SYSTEM</button>
            </div>
        </div>
                <div id="dashboard-view" style="display:none;">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <img src="assets/logo-sultan.png" class="w-10 h-10 rounded-lg shadow-md" alt="Dream OS">
                    <div>
                        <h1 class="text-xl font-bold">Dream OS</h1>
                        <div class="text-[10px] text-emerald-400 font-arabic">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم</div>
                        <div class="text-[9px] text-amber-500 font-arabic">اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَآلِ مُحَمَّدٍ</div>
                    </div>
                </div>
                <button onclick="logout()" class="text-red-400 text-sm bg-white/10 px-3 py-1 rounded-full">Logout</button>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="menu-card glass p-3 text-center cursor-pointer" onclick="alert('Command')">🌍 Command</div>
                <div class="menu-card glass p-3 text-center cursor-pointer" onclick="alert('Booking')">📅 Booking</div>
                <div class="menu-card glass p-3 text-center cursor-pointer" onclick="alert('K3')">⚠️ K3</div>
                <div class="menu-card glass p-3 text-center cursor-pointer" onclick="alert('Security')">🔒 Security</div>
                <div class="menu-card glass p-3 text-center cursor-pointer" onclick="alert('Janitor In')">🧹 Janitor In</div>
                <div class="menu-card glass p-3 text-center cursor-pointer" onclick="alert('Janitor Out')">🍃 Janitor Out</div>
                <div class="menu-card glass p-3 text-center cursor-pointer" onclick="alert('Stok')">📦 Stok</div>
                <div class="menu-card glass p-3 text-center cursor-pointer" onclick="alert('Maintenance')">🔧 Maintenance</div>
                <div class="menu-card glass p-3 text-center cursor-pointer" onclick="alert('Asset')">🏢 Asset</div>
            </div>
        </div>
    </div>
    <script>
        function login() {
            let key = document.getElementById('accessKey').value;
            if(key === 'dreamos') {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('dashboard-view').style.display = 'block';
            } else { alert('Access key salah'); }
        }
        function logout() {
            document.getElementById('login-view').style.display = 'block';
            document.getElementById('dashboard-view').style.display = 'none';
        }
    </script>
</body>
</html>
