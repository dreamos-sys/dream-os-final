<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Dream OS • Nano Quantum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        teal: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488' },
                        emerald: { 400: '#34d399', 500: '#10b981' },
                        ghost: { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; background: #020617; }
        .font-arabic { font-family: 'Amiri', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .view { display: none; }
        .view.active { display: flex; }
        #auth-view.active { display: flex; }
        .glass-nano { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.04); }
        .magnet { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .magnet:active { transform: scale(0.96); }
        #dream-logo { transition: transform 0.1s; cursor: pointer; }
        #dream-logo:active { transform: scale(0.93); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .carousel-slide { display: none; animation: fadeIn 0.3s; }
        .carousel-slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(5px); } to { opacity: 1; transform: translateX(0); } }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.3s; cursor: pointer; }
        .dot.active { background: #14b8a6; width: 24px; border-radius: 4px; }
        .ghost-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(12px); z-index: 1000; display: none; flex-direction: column; }
        .ghost-overlay.active { display: flex; }
    </style>
</head>
<body class="text-slate-200 h-screen overflow-hidden flex flex-col bg-slate-950">

    <section id="auth-view" class="view active flex-col items-center justify-center h-full p-6 text-center">
        <div id="dream-logo" class="mb-6 select-none magnet flex flex-col items-center">
            <img src="assets/logo-sultan.png" alt="Dream OS" class="w-28 h-28 rounded-3xl shadow-[0_0_30px_rgba(245,158,11,0.2)] object-cover mb-4">
            <p class="text-[10px] text-teal-400/80 font-mono tracking-[0.25em]">DREAM OS <span class="text-emerald-400">v1.2</span></p>
        </div>
        
        <div class="glass-nano p-6 rounded-3xl w-full max-w-xs shadow-2xl border border-white/5 mb-6">
            <div class="relative mb-4">
                <input type="password" id="access-key" placeholder="Access Key" 
                    class="w-full px-4 py-3 bg-slate-900/80 text-sm text-center tracking-widest rounded-2xl border border-slate-800 focus:outline-none focus:ring-2 focus:ring-teal-500/40 text-slate-200 placeholder-slate-600">
                <button id="toggle-pw" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-teal-400 p-1 z-20">
                    <i data-lucide="eye" class="w-4 h-4" id="eye-off"></i>
                    <i data-lucide="eye-off" class="w-4 h-4 hidden" id="eye-on"></i>
                </button>
            </div>
            <button id="btn-login" class="w-full py-3 bg-gradient-to-r from-teal-600 to-emerald-600 text-white text-xs font-bold uppercase tracking-wider rounded-xl shadow-lg shadow-emerald-500/20 magnet">
                ACCESS SYSTEM
            </button>
        </div>
        
        <p class="text-[9px] text-slate-600 font-mono">Bi idznillah • ISO 27001 & 9001 Compliant</p>
    </section>

    <div id="app-view" class="view flex-col h-full flex-1">
        <header id="app-header" class="hidden px-4 py-3 glass-nano border-b border-white/5 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <img src="assets/logo-sultan.png" alt="Dream OS" class="w-9 h-9 rounded-xl shadow-lg object-cover">
                <div>
                    <h1 class="text-xs font-bold text-slate-100 leading-tight">Dream OS</h1>
                    <span class="text-[9px] text-teal-400 font-mono">Nano-Quantum</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="role-badge" class="px-2 py-0.5 bg-slate-900 border border-slate-800 text-[9px] font-bold rounded uppercase tracking-wider text-teal-400">STAFF</span>
                <button id="btn-logout" class="p-2 text-slate-500 hover:text-red-400 magnet">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-3 pb-24 space-y-4 bg-slate-950">
            <div id="view-home" class="view-section active space-y-4">
                <div id="carousel-container" class="glass-nano p-4 rounded-2xl hidden">
                    <div id="carousel-slides"></div>
                    <div class="carousel-dots flex justify-center gap-2 mt-4" id="carousel-dots"></div>
                </div>
                <div id="staff-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 hidden"></div>
            </div>

            <div id="view-command" class="view-section hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold text-teal-400" data-i18n="command.title">Command Center</h2>
                    <span class="text-[9px] bg-slate-900 border border-slate-800 px-2 py-0.5 rounded text-emerald-400 font-mono">AI Active</span>
                </div>
                <div class="glass-nano p-3 rounded-xl border border-slate-900">
                    <input type="text" data-i18n-placeholder="command.search" placeholder="Cari data..." 
                        class="w-full bg-transparent text-xs text-slate-300 focus:outline-none placeholder-slate-600">
                </div>
                <div id="command-results" class="hidden space-y-2"></div>
                <div id="command-grid" class="grid grid-cols-2 gap-3"></div>
            </div>

            <div id="view-user" class="view-section hidden space-y-3">
                <div class="glass-nano p-6 rounded-2xl text-center">
                    <h3 class="text-sm font-bold text-white mb-1">User Profile</h3>
                    <p class="text-[9px] text-teal-400 mb-4">Role: <span id="profile-role">STAFF</span></p>
                    <button id="btn-logout-profile" class="w-full py-2.5 bg-red-600/30 border border-red-500/20 text-xs font-bold rounded-xl magnet">Logout</button>
                </div>
            </div>

            <div id="view-qr" class="view-section hidden space-y-3">
                <div class="glass-nano p-6 rounded-2xl text-center">
                    <h3 class="text-sm font-bold text-white mb-2">Smart Scanner</h3>
                    <button onclick="alert('Camera Ready')" class="w-full py-2.5 bg-gradient-to-r from-teal-500 to-emerald-500 text-xs font-bold rounded-xl text-white">Open Scanner</button>
                </div>
            </div>
            
            <div id="view-info" class="view-section hidden space-y-3">
                <div class="glass-nano p-6 rounded-2xl text-center">
                    <h3 class="text-sm font-bold text-teal-400">Dream OS v1.2</h3>
                    <p class="text-[9px] text-slate-500 mt-1">Nano-Quantum Architecture</p>
                </div>
            </div>

            <div id="view-config" class="view-section hidden space-y-3">
                <div class="glass-nano p-4 rounded-2xl">
                    <h3 class="text-xs font-bold text-teal-400 mb-3">Settings</h3>
                </div>
            </div>
        </main>

        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass-nano border-t border-white/5 flex justify-around items-center h-16 safe-bottom z-40 hidden">
            <button class="nav-btn active flex flex-col items-center justify-center gap-1 w-full h-full text-teal-400" data-target="home">
                <i data-lucide="home" class="w-5 h-5"></i><span class="text-[9px]">HOME</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full text-slate-500" data-target="user">
                <i data-lucide="user" class="w-5 h-5"></i><span class="text-[9px]">USER</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full text-slate-500" data-target="qr">
                <i data-lucide="scan-line" class="w-5 h-5"></i><span class="text-[9px]">MENU</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full text-slate-500" data-target="info">
                <i data-lucide="info" class="w-5 h-5"></i><span class="text-[9px]">INFO</span>
            </button>
            <button class="nav-btn flex flex-col items-center justify-center gap-1 w-full h-full text-slate-500" data-target="config">
                <i data-lucide="settings" class="w-5 h-5"></i><span class="text-[9px]">CONFIG</span>
            </button>
        </nav>
    </div>

    <div id="ghost-overlay" class="ghost-overlay">
        <div class="p-3 border-b border-white/10 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="ghost" class="w-4 h-4 text-ghost-500"></i>
                <span class="text-xs font-bold text-ghost-400">GHOST MONITORING</span>
            </div>
            <button id="ghost-close" class="p-1 text-slate-400 hover:text-white">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="p-3 grid grid-cols-2 gap-2 overflow-y-auto max-h-[70vh]" id="ghost-tools"></div>
        <div class="p-3 border-t border-white/5">
            <p class="text-[8px] text-slate-500 font-mono">
                <span id="ghost-status">● Termux Ready</span> • Audit: <span id="ghost-audit">0</span>
            </p>
        </div>
    </div>

    <script src="config/i18n.js"></script>
    <script src="modules/header.js"></script>
    <script src="modules/auth.js"></script>
    <script src="modules/carousel.js"></script>
    <script src="modules/grid.js"></script>
    <script src="modules/nav.js"></script>
    <script src="modules/ai-service.js"></script>
    <script src="modules/command.js"></script>
    <script src="modules/ghost.js"></script>
</body>
</html>
