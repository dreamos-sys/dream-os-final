<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Dream OS v1.3.1 • Stealth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* PASSWORD TOGGLE - PASTI MUNCUL! */
        .password-container {
            position: relative;
            width: 100%;
        }
        .password-input {
            width: 100%;
            padding: 14px 50px 14px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            color: white;
            text-align: center;
            letter-spacing: 0.2em;
            outline: none;
        }
        .password-input:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251,191,36,0.2);
        }
        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #fbbf24;
            cursor: pointer;
            padding: 8px;
            z-index: 9999;            pointer-events: all;
        }
        .toggle-btn:hover { color: #fcd34d; }
    </style>
</head>
<body class="text-white h-screen overflow-hidden">

    <!-- LOGIN PAGE -->
    <div id="login-page" class="flex flex-col items-center justify-center h-full p-6 text-center">
        <div id="dream-logo" class="mb-6 cursor-pointer">
            <img src="assets/logo-sultan.png" alt="Dream OS" class="w-32 h-32 rounded-3xl shadow-[0_0_35px_rgba(245,158,11,0.25)] object-cover mb-4">
            <p class="text-sm text-amber-500 font-semibold tracking-[0.3em]">DREAM OS <span class="text-emerald-400">v1.3.1</span></p>
        </div>
        <h1 class="text-3xl text-amber-500/90 mb-2" style="font-family: 'Scheherazade New', serif;">بِسْمِ اللَّهِ</h1>
        <p class="text-[10px] text-emerald-400 mb-8">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
        
        <div class="glass p-6 rounded-3xl w-full max-w-xs">
            <!-- PASSWORD INPUT DENGAN ICON -->
            <div class="password-container mb-4">
                <input type="password" id="access-key" class="password-input" placeholder="Access Key">
                <button type="button" id="toggle-pw" class="toggle-btn" onclick="togglePassword()">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            
            <button onclick="doLogin()" class="w-full py-3.5 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white text-xs font-bold uppercase tracking-wider rounded-2xl shadow-lg shadow-emerald-500/30">ACCESS SYSTEM</button>
            <p class="text-[9px] text-white/40 mt-4 font-mono">Out of The Box Inside • ISO 27001</p>
        </div>
    </div>

    <!-- DASHBOARD (Hidden by default) -->
    <div id="dashboard" class="hidden flex-col h-full">
        <header class="px-3 py-2 glass border-b border-white/10">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <img src="assets/logo-sultan.png" class="w-9 h-9 rounded-lg">
                    <div>
                        <h1 class="text-sm font-bold">Dream OS</h1>
                        <span class="text-[9px] text-teal-300">v1.3.1 Stealth</span>
                    </div>
                </div>
                <button onclick="doLogout()" class="p-1.5 text-white/60 hover:text-red-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                </button>
            </div>
        </header>
        
        <main class="flex-1 overflow-y-auto p-3">
            <div class="glass p-4 rounded-2xl mb-4">
                <h2 class="text-lg font-bold mb-2">Selamat Datang!</h2>                <p class="text-sm text-white/70">Dashboard Dream OS v1.3.1</p>
            </div>
            
            <div class="grid grid-cols-3 gap-3">
                <div class="glass p-4 rounded-xl text-center cursor-pointer" onclick="alert('Command Center')">
                    <div class="text-3xl mb-2">🌍</div>
                    <div class="text-xs font-bold">Command</div>
                </div>
                <div class="glass p-4 rounded-xl text-center cursor-pointer" onclick="alert('Booking')">
                    <div class="text-3xl mb-2">📅</div>
                    <div class="text-xs font-bold">Booking</div>
                </div>
                <div class="glass p-4 rounded-xl text-center cursor-pointer" onclick="alert('K3')">
                    <div class="text-3xl mb-2">⚠️</div>
                    <div class="text-xs font-bold">K3</div>
                </div>
            </div>
        </main>
    </div>

    <!-- JAVASCRIPT INLINE -->
    <script>
        let userRole = 'STAFF';
        let tapCount = 0;
        let tapTimer = null;
        
        // Password Toggle Function
        function togglePassword() {
            console.log('👁️ Toggle password clicked!');
            const input = document.getElementById('access-key');
            const icon = document.getElementById('eye-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                // Change to eye-off icon
                icon.innerHTML = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.163 13.163 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>';
            } else {
                input.type = 'password';
                // Change to eye icon
                icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
            }
            console.log('✅ Password type:', input.type);
        }
        
        // Login Function
        function doLogin() {
            const key = document.getElementById('access-key').value;
            if (!key) return alert('Masukkan Access Key!');
            
            console.log('🔑 Login:', key);            userRole = (key.includes('admin') || key.includes('kepala')) ? 'KEPALA_BAGIAN' : 'STAFF';
            
            // Switch to dashboard
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('dashboard').style.display = 'flex';
            
            console.log('✅ Login successful, role:', userRole);
        }
        
        // Logout Function
        function doLogout() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('access-key').value = '';
            userRole = 'STAFF';
        }
        
        // Ghost Mode (7x tap)
        document.getElementById('dream-logo').addEventListener('pointerdown', function() {
            tapCount++;
            console.log('👻 Ghost tap:', tapCount);
            
            if (tapCount === 1) {
                tapTimer = setTimeout(() => tapCount = 0, 2000);
            }
            
            if (tapCount >= 7) {
                clearTimeout(tapTimer);
                tapCount = 0;
                alert('👻 GHOST MODE ACTIVATED\n\nStealth tools ready!');
                console.log('👻 Ghost Mode Activated!');
            }
        });
        
        console.log('✅ Dream OS v1.3.1 Loaded!');
        console.log('👁️ Password toggle ready');
        console.log('👻 Tap logo 7x for Ghost Mode');
    </script>
</body>
</html>
