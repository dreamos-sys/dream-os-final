<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream OS Debug</title>
</head>
<body style="padding:2rem;font-family:system-ui">
  <h1>✅ Vanilla JS Test</h1>
  <p>If you see this, HTML/CSS/JS basic execution is working.</p>
  <div id="test-output" style="margin-top:1rem;padding:1rem;background:#f0fdf4;border-radius:8px"></div>
  
  <script>
    console.log('🧪 Vanilla test executing');
    document.getElementById('test-output').innerHTML = `
      <strong>Debug Info:</strong><br>
      • Time: ${new Date().toLocaleTimeString()}<br>
      • URL: ${location.href}<br>
      • User Agent: ${navigator.userAgent.slice(0, 50)}...<br>
      • localStorage: ${typeof localStorage !== 'undefined' ? '✅' : '❌'}<br>
      • fetch: ${typeof fetch !== 'undefined' ? '✅' : '❌'}
    `;
    console.log('🧪 Vanilla test complete');
  </script>
</body>
</html>
